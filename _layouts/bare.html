<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Joe Rowing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <script>
    (function() {
      var t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
    function toggleTheme() {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>

  <!-- MathJax for LaTeX rendering -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        packages: {'[+]': ['ams']}
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>

<nav>
  <a href="{{ '/' | relative_url }}" class="nav-logo">J. <em>Rowing</em></a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}#about">about</a></li>
    <li><a href="{{ '/resources/' | relative_url }}">resources</a></li>
    <li><a href="{{ '/planner/' | relative_url }}">planner</a></li>
    <li><a href="{{ '/blog/' | relative_url }}">blog</a></li>
    <li><a href="{{ '/cv/' | relative_url }}">cv</a></li>
    <li><a href="https://jrowing.substack.com" target="_blank" rel="noopener">substack ↗</a></li>
    <li><button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><span class="icon-moon">☽</span><span class="icon-sun">☀</span></button></li>
  </ul>
</nav>

{{ content }}

<footer>
  <span class="footer-copy">© {{ 'now' | date: "%Y" }} Joe Rowing</span>
  <div class="footer-links">
    <a href="https://www.linkedin.com/in/jrowing/">linkedin</a>
    <a href="https://jrowing.substack.com">substack</a>
    <a href="https://github.com/jrowing">github</a>
  </div>
</footer>

</body>
</html>
