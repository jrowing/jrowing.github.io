es, fuses, and other consumables. Cycle stock proactively.","reflection":"Test your bulb and LED stocks at the start of the next half-term. Replace blown ones before students discover them mid-demo."},{"day":254,"date":"11th September","pearl":"When in doubt, draw a triangle. Mechanics, optics, and circuits all yield to triangle thinking.","exposition":"Triangles unify mechanics (forces on inclined planes), optics (geometry of refraction), and circuits (impedance phasors). The triangle is a unit of reasoning students can deploy across topics. When stuck, suggest drawing the triangle; the algebra often follows for free.","reflection":"In tomorrow's hard problem, when stuck, suggest 'draw the triangle'. See which students reach for the geometry and which keep grinding the algebra."},{"day":255,"date":"12th September","pearl":"Liquid nitrogen demos: thick gloves, eye protection, no sealed containers, ever. Frostbite is silent.","exposition":"Liquid nitrogen at 77 K causes instant frostbite to bare skin and shatters sealed containers as the gas expands. Thick gloves, eye protection, ventilation, and absolutely no sealed vessels. The demos with LN₂ are spectacular and should be done; the protocols are absolute and should not be improvised.","reflection":"If you're running a liquid nitrogen demo next term, write the protocol now — gloves, goggles, no sealed containers, ventilation — and rehearse it."},{"day":256,"date":"13th September","pearl":"Diagrams before equations. Equations before numbers. Numbers before conclusions.","exposition":"Diagrams reveal geometry. Equations reveal relationships. Numbers reveal magnitudes. Conclusions reveal what it means. Following the sequence prevents the common error of substituting numbers into a misremembered equation and writing a wrong answer with confidence. Build the order into your teaching of every problem.","reflection":"After tomorrow's problem, check yourself: diagram first, equation second, numbers third, conclusion last. If not in that order, redo the working."},{"day":257,"date":"14th September","pearl":"Take your weekends. The work expands to fill the time you give it.","exposition":"A teacher who works seven days a week becomes a worse teacher by Friday. Weekends are not luxuries; they are part of the professional life that sustains the work. The lessons you plan on Sunday afternoon at half-strength would have been better had you planned them on Tuesday at full. Defend the weekend.","reflection":"Did you work last weekend? Was the work better for it, or thinner? The honest answer matters."},{"day":258,"date":"15th September","pearl":"Talk about your own physics journey occasionally. Honest stories about struggle and discovery model what learning looks like.","exposition":"Talking about how you came to physics — the moment you saw a curve fit, the teacher who made it click, the topic that hooked you — humanises the work. Students see physics as something people choose and grow into rather than something they are or are not. Honest stories of your own discovery are rare gifts.","reflection":"Tell your class one story this fortnight about how you came to physics. Make it honest — including the struggle, not just the triumph."},{"day":259,"date":"16th September","pearl":"Percentage uncertainty is a habit. Build it from year one.","exposition":"Percentage uncertainty — 'this measurement is good to about 5%' — gives a sense of where the real margins are. Building it into every reading, every calculation, from Year 7 onwards, makes it second nature. By Year 12, students who have done it for years know without thinking what '5% uncertainty' looks like.","reflection":"After the next reading, ask students to estimate the percentage uncertainty. If they cannot, build it in from Year 7 onwards."},{"day":260,"date":"17th September","pearl":"Wonder is the foundation. Build on it, not around it.","exposition":"Wonder is not optional, not decorative. It is the foundation of physics motivation. Build on it; do not paper over it. The student who looked at the night sky once and asked 'what are those?' is the student you have. Keep that question alive through whatever curriculum demands.","reflection":"What is the last moment of wonder you witnessed in your lab? Was it a coincidence, or could you cultivate them deliberately?"},{"day":261,"date":"18th September","pearl":"An investigation needs a question. \"Do an experiment on springs\" is not a question.","exposition":"'Do an experiment on springs' is a task. 'Does the period of a spring-mass oscillator depend on the amplitude?' is a question. Real investigations have questions; tasks without questions become routines. Force students to formulate a question before they design. The formulation is half the investigation.","reflection":"For your next investigation, demand a question in writing before any apparatus is touched. 'Do an experiment on X' is not a question."},{"day":262,"date":"19th September","pearl":"Pressure demos (collapsing can, magdeburg hemispheres): inspect glassware for cracks. Pressure finds flaws.","exposition":"Pressure demonstrations — the collapsing can, Magdeburg hemispheres — apply substantial force to glassware. A crack invisible from outside can become a sharp implosion in front of students. Inspect every piece before use; replace anything chipped. Pressure finds flaws ruthlessly; the inspection finds them first.","reflection":"Before your next pressure demo, inspect glassware for chips and cracks. Pressure finds flaws ruthlessly; the inspection finds them first."},{"day":263,"date":"20th September","pearl":"Area under a graph also has units, and often a physical meaning. Force × distance is work; velocity × time is displacement.","exposition":"Area under a velocity-time graph is displacement. Area under a force-distance graph is work. Area under a current-time graph is charge. The 'area under' is not a mathematical trick; it has physical meaning in every case. Train students to ask 'what does this area mean?' as routinely as 'what does this gradient mean?'","reflection":"After the next graph, ask: what is the area under it, and what does it mean? Make the question routine."},{"day":264,"date":"21st September","pearl":"Sig figs aren't pedantry; they signal what you know and what you don't.","exposition":"A measurement reported as 2.347 m suggests precision to the nearest millimetre. If the ruler reads in centimetres, the reporting is dishonest. Significant figures communicate the measurement's quality. Drill this until students stop writing calculator output verbatim. It is professional practice, not pedantry.","reflection":"Look at the last calculation in students' books. Were sig figs consistent? If they ranged from 2 to 9 in the same answer, that is the next teaching point."},{"day":265,"date":"22nd September","pearl":"Trigonometry resolves vectors. Vector resolution applies trigonometry. Teach both in conversation, not separately.","exposition":"A vector decomposed by sines and cosines, a triangle solved by tan, a phasor sum by Pythagoras — trigonometry and vectors interweave. Teaching them separately produces students who can do each in isolation and neither together. Weave them: every vector problem is also a trig problem, every trig problem is also a vector picture.","reflection":"Plan tomorrow's vector lesson with explicit trigonometry, or your trig lesson with explicit vectors. Do not teach them separately again."},{"day":266,"date":"23rd September","pearl":"A 'do now' on the desk before the bell rings is worth a minute of behaviour management.","exposition":"A 'do now' task on the desk before students arrive — a quick recall question, a starter calculation, a diagram to interpret — starts the lesson before the bell. Students who arrive into a structured beginning settle faster, talk less, and engage sooner. The cost is small; the behavioural dividend is large.","reflection":"Prepare a 'do now' for tomorrow's lesson — on the desk before students arrive. Notice the behavioural shift in the first three minutes."},{"day":267,"date":"24th September","pearl":"If you take something from the prep room mid-lesson, leave a note. Items vanish otherwise.","exposition":"Taking a piece of kit from the prep room without a note creates a mystery: the technician cannot find it, you cannot remember which lab it went to. A sticky note on the shelf — 'in Room 12 till 3 pm' — solves it. The discipline is trivial; the time it saves is real.","reflection":"When did you last take kit from the prep room without a note? If 'recently', start the sticky-note habit this week."},{"day":268,"date":"25th September","pearl":"Don't let video become passive watching. Pause, predict, discuss.","exposition":"Passive watching does not engage. Pause-predict-discuss turns a video into an interactive lesson: 'before we see what happens, what's your prediction?' Students commit, observe, and discuss the discrepancy. The same video that bored them at home becomes a tool. The active framing is everything.","reflection":"Plan tomorrow's video clip to be paused twice — once for a prediction, once for a discussion. Passive watching teaches nothing."},{"day":269,"date":"26th September","pearl":"Stand-up rule for hot apparatus or chemicals: students stand while pouring, heating, transferring. Sitting hides what hands are doing.","exposition":"Standing while pouring or transferring hot or hazardous materials gives you a clear line of sight to what hands are doing, and lets you intervene faster. Sitting hides movement under the bench. Build the stand-up rule for these moments; students obey it readily once they understand the safety logic.","reflection":"In your next pour-and-heat practical, brief students: stand to transfer, stand to heat. Sitting hides what hands are doing."},{"day":270,"date":"27th September","pearl":"Anomalous results are data, not mistakes. Investigate them out loud.","exposition":"An anomaly in the data is data, not error. Investigating it out loud — 'why might this point be different?' — models real scientific reasoning. The temptation to discard and move on teaches students that real science is tidy. It is not; anomalies are how new physics has historically been found.","reflection":"Next time an anomaly appears in student data, investigate it out loud rather than discarding it. Real science is full of anomalies; teach the response."},{"day":271,"date":"28th September","pearl":"Include the technician in departmental meetings whenever practical matters are on the agenda.","exposition":"Departmental meetings that decide on a new practical without the technician present are meetings that will have to be re-run later. The technician knows what is feasible, what is in stock, what takes time. Include them in the agenda. Their hour at the meeting saves their day repairing the consequences of decisions made without them.","reflection":"Is the technician on your department meeting agenda next time practical matters arise? If absent, invite them before the meeting is set."},{"day":272,"date":"29th September","pearl":"Show students model answers in their own age group, not perfection. Aspiration with realism.","exposition":"Show students model answers from peers at their own age and level. A perfect undergraduate-style write-up demoralises; a Year 11 answer that scored 14 out of 15 is aspirational. The realism is what makes the target feel reachable. Keep an anonymised file of strong student work as ongoing exemplars.","reflection":"Show your class one student-written answer at their own level that scored highly. Aspiration with realism beats unattainable perfection."},{"day":273,"date":"30th September","pearl":"Resolution of an instrument is not its accuracy. Make this distinction explicit.","exposition":"A ruler has a resolution of 1 mm and an accuracy that may be much worse — depending on how the zero aligns, how parallax is handled, how the ruler has aged. Resolution is what the instrument can in principle resolve; accuracy is how close to truth its readings actually are. The distinction matters; teach it explicitly.","reflection":"After the next measurement, ask: what is the resolution of this instrument? What is its accuracy? Most students will conflate the two; that conflation is the teaching point."},{"day":274,"date":"1st October","pearl":"Calibrate before you measure. A zero error caught at the start saves an hour of confusion.","exposition":"Calibrating before measuring catches systematic errors at the start, not after a lesson of mysterious results. Zero the ammeter; check the level of the bench; confirm the thermometer reads 0 °C in ice water. The minute spent on calibration is the minute that saves an hour of confusion. Make it routine.","reflection":"Plan one minute of calibration into tomorrow's first measurement. The minute saves an hour of confusion later."},{"day":275,"date":"2nd October","pearl":"When you feel imposter syndrome, remember: everyone in front of a class today feels something like it.","exposition":"Imposter syndrome among teachers is universal and rarely discussed. Everyone in front of a class feels, at moments, that they are about to be exposed. The feeling is not evidence; the evidence is the years of work, the students who have left better than they arrived, the colleagues who respect you. Hold the evidence against the feeling.","reflection":"When did imposter feelings last visit you? Hold them up against the evidence of your career. The feeling is not a verdict."},{"day":276,"date":"3rd October","pearl":"When safety is involved, your tone goes from teacher to instructor. Students notice the shift and respond.","exposition":"When students hear 'goggles on' delivered in a slightly different tone — firmer, more measured, with eye contact — they know safety is in play. The shift from teacher to instructor is subtle but unmistakable. Use it deliberately for safety moments; do not waste the register on routine instructions or it loses force.","reflection":"In tomorrow's lesson, shift your tone for one safety instruction. From teacher to instructor. Notice students notice."},{"day":277,"date":"4th October","pearl":"Springs and elastic bands: cycle stock. A 20% replacement every year keeps a workable kit.","exposition":"Springs and elastic bands wear out. A spring that has been stretched past its elastic limit reads differently from a new one. Replacing 20% of the kit each year, on a planned rotation, keeps the kit reliable and the budget manageable. Without the rotation, you reach a point where everything needs replacing at once.","reflection":"Audit your springs and elastic bands. Replace 20% this year. Plan the rotation now — without it, everything wears out at once."},{"day":278,"date":"5th October","pearl":"Allergens (latex, nuts in plant material, certain dyes): check medical records before the lesson, not during.","exposition":"Latex gloves, nut traces in plant material, certain dyes — these provoke allergic reactions ranging from mild to anaphylactic. Check medical records and confidential pastoral notes before the lesson; substitute alternatives where needed. The conversation in advance is private; the response in the lesson would be public.","reflection":"Before any lesson with latex, plant material, or unusual dyes, check medical records for allergies. The conversation in advance is private; the response in the lesson would be public."},{"day":279,"date":"6th October","pearl":"Codes save your wrists: U for units, S for significant figures, D for definition, M for missing method.","exposition":"Margin codes — U for units, S for sig figs, D for definition, M for missing method — let you mark a class of books in a third of the time with the same information density. Students learn the codes within a fortnight. The code becomes a feedback dialect the class shares; the feedback throughput increases dramatically.","reflection":"Pick three margin codes — U, S, D, M — and teach them to your next class. Mark with codes; watch your marking time fall and feedback density rise."},{"day":280,"date":"7th October","pearl":"Speak about physics as a place students belong, not a club they're trying to join.","exposition":"'Physics is for clever people' is heard as 'physics is not for me'. Frame physics as a place students belong rather than a club selecting members. The signal is in tone, examples, expectations, and the way you respond to wrong answers. Belonging is the precondition of learning, not its reward.","reflection":"Listen for yourself tomorrow. Did anything you said suggest physics is for clever people? If so, replace it with language of belonging."},{"day":281,"date":"8th October","pearl":"Heatproof mats live with the Bunsens, not in another cupboard. Convenience drives compliance.","exposition":"Heatproof mats in a cupboard at the far end of the lab are heatproof mats that do not get used. Co-locating them with Bunsens — same drawer, same shelf, same area — converts intention into action. Convenience drives compliance; design the room for the behaviour you want.","reflection":"Walk to where the heatproof mats live. Are they with the Bunsens, or in another cupboard? Move them today."},{"day":282,"date":"9th October","pearl":"Always rehearse a demo before the lesson. \"It worked last year\" is not preparation.","exposition":"Demonstrations rehearsed the day before behave differently from demonstrations attempted live. The bulb is dim, the wire has corroded, the wave generator has lost its battery. Rehearse the morning of: five minutes saves ten minutes of mid-lesson confusion. 'It worked last year' is not rehearsal.","reflection":"Rehearse tomorrow's demo this afternoon. Don't trust last year's notes. The bulb has aged; the wire has corroded; the lesson will go better."},{"day":283,"date":"10th October","pearl":"Eat lunch with humans, not screens.","exposition":"Lunch is a meal, not a continuation of the day's work. Eating with colleagues — conversation that is not about students — restores some of what teaching depletes. Eating at a desk over emails depletes more than it restores. Defend the lunch break; the afternoon is better for it.","reflection":"Will you eat lunch with colleagues tomorrow, or at your desk over email? Choose the first this week."},{"day":284,"date":"11th October","pearl":"Force students to draw the apparatus from memory at the end of the practical. It's revising and assessing in one move.","exposition":"Drawing the apparatus from memory at the end of a practical is revising and assessing in one move. Students who could not have done so an hour earlier have built a mental model. Those who cannot still draw it are flagged for follow-up. The exercise takes three minutes and reveals more than a written test.","reflection":"At the end of the next practical, have students draw the apparatus from memory. Three minutes; reveals more than a written test."},{"day":285,"date":"12th October","pearl":"Always give feedback on calculation layout, not just the final answer. Layout is reasoning made visible.","exposition":"Layout is reasoning made visible. Students who arrange working clearly — equation on one line, substitution on the next, units throughout, answer boxed — are easier to mark and easier to follow. Layout taught is reasoning taught. Praise good layout publicly; pull up sloppy layout privately.","reflection":"Look at how students laid out their last calculation. Is the reasoning visible — equation, substitution, unit, answer? If not, that is next week's focus."},{"day":286,"date":"13th October","pearl":"Bags off chairs and under desks. The first risk in a lab is a person tripping, not a chemical reacting.","exposition":"A bag on a chair becomes a snare for the next person to sit down or walk past. The first injury in any lab is a trip, not a chemical reaction. Bags under the bench, coats on hooks, walkways clear. The physical environment is the first safety system; treat it that way.","reflection":"Walk the lab. Are bags on chairs? Coats on chairs? Tripping hazards everywhere? Brief students before the next lesson: bags under benches, coats on hooks."},{"day":287,"date":"14th October","pearl":"\"What would you measure?\" is a better question than \"What is the equation?\"","exposition":"'What is the equation?' invites memory retrieval. 'What would you measure?' invites design thinking. The latter is closer to what physicists do. Build the experimental design question into routine questioning; the equation can come once the measurement is defined. The order matters.","reflection":"Replace one 'what's the equation' question with 'what would you measure' tomorrow. Notice which students design and which retrieve."},{"day":288,"date":"15th October","pearl":"Treat the prep room as the technician's office. Knock, don't barge.","exposition":"The prep room is a working space, not a corridor. Knocking before entering, respecting the technician's flow, asking before disturbing — these courtesies acknowledge the prep room as the technician's domain. Teachers who treat the room as theirs to wander find that prep requests are answered with less goodwill.","reflection":"Do you knock before entering the prep room? If you barge in, you are signalling something about whose space it is. Knock from now on."},{"day":289,"date":"16th October","pearl":"Volunteer for the things that interest you; decline the rest politely and early.","exposition":"Volunteering for what interests you keeps you fresh; saying yes to everything depletes you. Decline politely and early — 'I'd love to, but I can't take this on this term' — rather than over-committing and producing thin work. The school benefits more from one piece of good work than five mediocre ones.","reflection":"Have you said yes to something this term that you regret? Plan how you will decline the next one — politely, early, and without apology."},{"day":290,"date":"17th October","pearl":"Ammeters and voltmeters: separate trays, clearly labelled. Students will pick the first meter they see.","exposition":"Ammeters in one labelled tray, voltmeters in another. Students at speed will pick the first meter they see and try to make it work. Separation by tray, by colour, by labelled position, prevents the in-lesson 'this isn't reading right' that turns out to be the wrong instrument entirely.","reflection":"Walk to where the meters live. Are ammeters and voltmeters in separate, clearly labelled trays? Or do students grab the first meter they see?"},{"day":291,"date":"18th October","pearl":"Tell students why they are doing what they are doing. The reasons matter as much as the rules.","exposition":"Telling students why they are doing what they are doing — why this practical, this calculation, this homework — gives the work meaning. Rules without reasons feel arbitrary; reasons given convert compliance into cooperation. The two-minute explanation is often the difference between a class that engages and a class that endures.","reflection":"After explaining a rule tomorrow, also explain its reason. Try it for one week; notice how compliance shifts to cooperation."},{"day":292,"date":"19th October","pearl":"Plan to be interrupted. The best lesson is the one that bends to a brilliant student question.","exposition":"A brilliant question from a student that bends the lesson off plan is the best thing that can happen to a lesson. The plan is a starting point; the question is real engagement. Have flexibility built in — a spare ten minutes you can spend, a question you can return to next time. Plan to be interrupted by genuine thinking.","reflection":"Did a brilliant student question disrupt your last lesson? Did you follow it or shut it down? Plan the next time to follow."},{"day":293,"date":"20th October","pearl":"Audit your lab at the end of every term. Three boxes: keep, mend, bin. Be ruthless with bin.","exposition":"An end-of-term audit with three categorical boxes — keep, mend, bin — clears the accumulation that otherwise compounds. Be ruthless with bin; the 'might fix it someday' pile is the slowest accumulating disaster in any prep room. The technician usually leads this; teachers participate. The space recovered is real.","reflection":"Diary an end-of-term audit: keep, mend, bin. Three boxes. Be ruthless with bin. The prep room will thank you."},{"day":294,"date":"21st October","pearl":"Submit prep requests at least one full working week ahead. \"Tomorrow morning\" is a relationship-destroyer.","exposition":"A prep request submitted the morning of the lesson is a request that cannot be met. A week's lead time lets the technician check stock, order missing items, prepare solutions, and warn you of conflicts. The lead time is also a courtesy; the technician's schedule deserves respect. Build the discipline; it pays back daily.","reflection":"Look at your prep requests this fortnight. Were any submitted with less than a week's lead time? If yes, set a calendar reminder for next term."},{"day":295,"date":"22nd October","pearl":"When you ask a question, scan the room for thinking faces, not just the keenest hand.","exposition":"When you ask the class a question, the keenest hand goes up first. Scan past it. Look for the thinking faces — the ones with furrowed brows, the ones with the calculator in hand, the ones with the half-raised hand. Call on these. They are doing the work the room needs to see.","reflection":"Tomorrow, after each question, scan deliberately past the first hand. Look for furrowed brows. Call on the thinking face."},{"day":296,"date":"23rd October","pearl":"Chemical store ventilated, locked, separate from the main lab. Inventory updated termly.","exposition":"Chemicals stored in the main lab are chemicals stored where students can access them — an invitation to misuse. A separate, ventilated, locked chemical store is the standard. The inventory should be current; quantities should be limited to immediate need. Build the discipline of returning chemicals to the store at the end of every lesson.","reflection":"When did you last walk into the chemical store yourself? If you treat it as the technician's domain entirely, you have lost a piece of your own safety oversight."},{"day":297,"date":"24th October","pearl":"Show students real published data — Millikan's oil drop, Eddington's eclipse, COBE's blackbody curve. Show them the messiness behind the textbook.","exposition":"Millikan's plotted oil drop measurements are not perfectly straight lines. Eddington's eclipse data is sparse and noisy. The COBE blackbody curve is one of the cleanest results in physics, but its noise is visible. Showing real data alongside the textbook version reveals what science actually looks like. The textbook lies by omission of noise.","reflection":"Show one set of real, noisy data this term — Millikan's drops, Eddington's eclipse, COBE's curve. Show what science actually looks like."},{"day":298,"date":"25th October","pearl":"Track misconceptions, not marks. Marks are summative; misconceptions are formative.","exposition":"Tracking marks tells you what students achieved last week. Tracking misconceptions tells you what to teach next week. The latter is formative — the data informs your future teaching. Build a simple system: a running list of misconceptions per class, addressed as they accumulate. The improvement is faster than via marks alone.","reflection":"Start a running list of class misconceptions this week — one line per misconception. By half-term you will have a teaching plan you would not otherwise have built."},{"day":299,"date":"26th October","pearl":"Best fit line by judgment, then ask: \"What would the worst acceptable line look like?\" That's how you get gradient uncertainty.","exposition":"A best-fit line by judgement is part of the practical skill. Asking 'what would the worst-acceptable line look like?' — the steepest and shallowest lines still consistent with the data — gives a graphical estimate of gradient uncertainty. The method is a useful entry point into uncertainty analysis without heavy formalism.","reflection":"After the next graph, ask: what is the worst acceptable best-fit line? That question opens uncertainty without heavy formalism."},{"day":300,"date":"27th October","pearl":"Sharps: needle nose pliers, not fingers. Sharps bin, not the regular bin.","exposition":"Sharps — broken glass, cut wire ends, scalpel blades — are handled with pliers or tweezers, never with bare fingers. Sharps go into a designated sharps bin, never into a general waste bin where they can cut a cleaner's hand later. The protocols are simple and life-saving; rehearse them with students before any practical that produces sharps.","reflection":"Walk to your sharps bin. Is it accessible from the bench, or buried? Move it if you have to think about where it is."},{"day":301,"date":"28th October","pearl":"Big effects should be visible from the back row. Small effects need a visualiser or a camera.","exposition":"A demo visible only to the front row engages only the front row. The thirty students at the back disengage, fairly. Big effects (visible motion, bright light, audible sound) are designed to carry; small effects (a needle deflection, a small flame) need a visualiser, a webcam, or staging on a stand. Plan for the back row.","reflection":"Sit at the back of your own lab tomorrow during the demo. Could you see everything? If not, the back row had a worse lesson than the front."},{"day":302,"date":"29th October","pearl":"Symmetry first. If you spot the symmetry, the algebra often disappears.","exposition":"If you spot the symmetry of a problem — left-right, top-bottom, before-after — the algebra often disappears. Two students walking towards each other? Symmetric. A pendulum? Symmetric about the lowest point. Teach students to look for symmetry before reaching for equations. It is one of the most powerful problem-solving habits in physics.","reflection":"In tomorrow's problem, before reaching for algebra, ask: is there a symmetry? If yes, the algebra often disappears. Teach students to look."},{"day":303,"date":"30th October","pearl":"Highlight unresolved problems. Dark matter, dark energy, quantum gravity. Physics is not finished.","exposition":"Physics is not finished. Dark matter and dark energy account for 95% of the universe and we do not know what they are. Quantum gravity has no accepted theory. The hierarchy problem persists. Mentioning these unsolved problems regularly reminds students that physics is a living frontier — and that they might be the ones who solve them.","reflection":"Tell your class about one unresolved physics problem this fortnight — dark matter, dark energy, quantum gravity. Physics is not finished."},{"day":304,"date":"31st October","pearl":"Long hair near rotating shafts is a hazard, not a fashion comment. Be plain about it.","exposition":"Long hair near a rotating shaft has caused scalping injuries. The hazard is not theoretical; it is documented. Be plain with students: hair must be tied back near rotating apparatus. There is no diplomatic way to soften this; the consequences are real and visible. Treat it as you would any other absolute safety rule.","reflection":"Before your next rotating-shaft practical, brief: hair tied back. Mean it. The hazard is documented; the failure mode is severe."},{"day":305,"date":"1st November","pearl":"Establish the 'stop' command on day one: when you raise your hand and say 'stop', all hands come off all apparatus immediately. Drill it.","exposition":"A practised 'stop' command — raised hand, single word — lets you halt all apparatus instantly when needed. Drill it before any complex practical: raise your hand, say 'stop', and confirm that every hand is off every piece of kit. The drill takes a minute and is exactly what you need when a real situation requires it.","reflection":"Practise the 'stop' command before your next complex practical: raised hand, single word, hands off everything. Drill it; it will save you when it matters."},{"day":306,"date":"2nd November","pearl":"Visit places of physics where you can: planetariums, science museums, particle physics public lectures. Field trips are formative.","exposition":"A planetarium show, a particle-physics public lecture, a science museum gallery — these are physics in environments students do not usually see physics. The trip is formative: students return with images, memories, and (often) ambitions. The bureaucratic effort is worth it. Aim for at least one significant external visit per year.","reflection":"Diarise one planetarium, museum, or lecture visit for this academic year. Field trips are formative in ways classroom lessons cannot replicate."},{"day":307,"date":"3rd November","pearl":"Plan the questions, not just the answers. The shape of a lesson is the shape of its questioning.","exposition":"A lesson is structured by the questions you ask in it. Plan the questions before the answers; sequence them; vary the cognitive demand. The flow of the lesson is the flow of the questions. Lessons planned around content delivery sound like monologues; lessons planned around questions sound like dialogues.","reflection":"Plan tomorrow's lesson around its questions, not its content. Which questions? In which order? Of what difficulty?"},{"day":308,"date":"4th November","pearl":"Plan the table of results before touching the apparatus. The table reveals the experiment.","exposition":"A blank results table — with columns labelled for the right variables, units in the headers, rows for repeats — before the apparatus is even touched tells the student what they are about to do. The table is the experiment, made visible. Once the table is right, the practical practically writes itself.","reflection":"Before the next practical, have students draw the empty results table — columns, units, rows for repeats — before any apparatus is out. The table is the experiment."},{"day":309,"date":"5th November","pearl":"The classroom is a lab; the lab is also a classroom. The rules of both apply at all times.","exposition":"Whether the room is labelled 'classroom' or 'lab', the rules of both apply: think before you act, listen for safety instructions, respect the apparatus and the chemicals. Students who internalise this carry the discipline across rooms. The boundary between classroom and lab in a physics teacher's life is often blurred; treat both as places of careful work.","reflection":"Are the rules of the lab in force during the classroom phase of the lesson, and vice versa? If not, you have two cultures where there should be one."},{"day":310,"date":"6th November","pearl":"Lasers: never aim above eye level, never let students walk through the beam path, and have the key with you at all times.","exposition":"Lasers misused at eye level can cause retinal damage in milliseconds. Never above eye height; never directly into eyes; key kept on your person; warning signs on the door. Class 2 lasers (≤1 mW) rely on the blink reflex, which a stationary curious child can defeat. Treat all lasers as serious; the rules are not about class but about geometry.","reflection":"Before your next laser demo, run through: above eye level (no), beam path through students (no), key with you (yes). If any are uncertain, redesign the lesson."},{"day":311,"date":"7th November","pearl":"Apply for grants. The Ogden Trust, the IOP, the Royal Society fund a remarkable amount.","exposition":"The Ogden Trust funds physics outreach, equipment, and teacher development; the Institute of Physics has multiple funding streams; the Royal Society funds school partnerships. Together they pay for far more than most schools realise. Applications take a few hours; the resources they unlock can transform a department.","reflection":"Have you applied for any external funding this year? The Ogden Trust, the IOP, the Royal Society — they fund a remarkable amount."},{"day":312,"date":"8th November","pearl":"Praise the quiet ones who do the right thing without prompting. They notice less than the loud, but they hear.","exposition":"The loud students dominate attention; the quiet ones who do everything right go unnoticed. They notice the imbalance. A specific quiet word of praise — 'I noticed how you helped Maya set up' — costs nothing and signals that doing the right thing matters even when no one is shouting. The whole-class behaviour improves.","reflection":"Identify the quiet student who consistently does the right thing without prompting. Praise them specifically this week — perhaps after the lesson, privately."},{"day":313,"date":"9th November","pearl":"Charging trolleys for student laptops/tablets: in line of sight, not in a cupboard.","exposition":"A trolley of laptops or tablets parked in a cupboard out of sight gets borrowed without record, returned without check, and slowly depleted. Charging in line of sight — in the lab, monitored, with a quick login check — preserves the kit and surfaces problems early. Visibility is half of inventory management.","reflection":"Walk to your charging trolley. Is it in line of sight or hidden in a cupboard? If hidden, expect attrition."},{"day":314,"date":"10th November","pearl":"Free body diagrams are non-negotiable. No FBD, no marks — and no understanding.","exposition":"A mechanics problem without a free-body diagram is a problem worked by hope. The diagram forces the student to identify every force, label its direction, and check whether it should be there at all. No FBD, no marks is harsh but instructive. Make the discipline absolute; the understanding follows the discipline.","reflection":"Mark your next mechanics homework. How many answers came with free-body diagrams? If fewer than all, that is the next teaching battle."},{"day":315,"date":"11th November","pearl":"If half the class got it wrong, you taught it wrong. Reteach, don't reprimand.","exposition":"When half the class gets a question wrong, the failure is teaching, not student. Reteach — perhaps with a different approach — rather than blame. Students who experience reteaching as routine rather than punishment engage with the second pass; students who experience it as a reprimand disengage. The framing is yours to choose.","reflection":"When half your class got the last topic wrong, did you reteach or move on? If 'move on', plan the reteach for next week."},{"day":316,"date":"12th November","pearl":"Mark less, but mark better.","exposition":"Marking less but better is hard advice to act on because the volume feels obligatory. But thirty superficial marks on thirty books teach almost nothing. Five deep marks teach those five students substantially. Combine with whole-class feedback. The total effort drops; the impact rises.","reflection":"Pick five books for deep marking this week and thirty for whole-class feedback. Notice how much faster — and more useful — the latter is."},{"day":317,"date":"13th November","pearl":"Practical work order: bring in, set up, distribute, run, collect, count, return. Never skip count.","exposition":"The seven-stage routine — bring in, set up, distribute, run, collect, count, return — is what makes a practical efficient. Skipping count is the most common failure; missing items are then a mystery rather than a known absence. Practising the routine with students until it is automatic is one of the highest-leverage uses of early lesson time.","reflection":"Run through the seven-stage practical routine: bring in, set up, distribute, run, collect, count, return. Where do you usually skip? Reinstate it."},{"day":318,"date":"14th November","pearl":"Radians not degrees in any equation involving derivatives or oscillations. Make the switch loud.","exposition":"Calculus expects radians. The derivative of sin(x) is cos(x) only in radians. The period of a pendulum is 2π√(L/g) in radians. Switching from degrees to radians when oscillations or derivatives enter is non-negotiable. Make the switch loud; train students to set their calculators to RAD whenever angular dynamics appear.","reflection":"When was the last time you switched a calculator to radians in front of the class and explained why? If not this term, build it in."},{"day":319,"date":"15th November","pearl":"Cells and batteries: store the same way up, in shallow trays, with terminals separated. Fires start from carelessness.","exposition":"Cells stored on their sides can leak; cells with mixed polarities can short. Shallow trays with terminals separated, all cells the same way up, is the standard. Reports of school fires from cell storage have appeared in safety literature. The discipline is small; the failure mode is severe.","reflection":"Walk to your battery store. Same way up, in trays, terminals separated? If not, reorganise this week."},{"day":320,"date":"16th November","pearl":"Long-term experiments (germinating seeds, evaporating crystals, decaying samples) need a calendar shared with the technician.","exposition":"Germinating seeds, evaporating crystals, decaying sources — long-term experiments require shared calendars. The technician needs to know when to keep the kit out, when to discard the material, when to expect data collection. A shared spreadsheet or wall planner is enough. Without it, valuable data is lost to disposal or oversight.","reflection":"If any long-term experiment is running right now, is it on a calendar the technician shares? If not, get it there before the next disposal cycle."},{"day":321,"date":"17th November","pearl":"Units carry physics. Encourage students to write units in every line of working, not just the final answer.","exposition":"A line of working without units is a line where the algebra could be wrong without anyone noticing. Encourage students to write units on every line: 5.0 m + 3.0 s would catch itself immediately if the units were visible. The discipline is small; the error-catching is significant. Habituate it early.","reflection":"In tomorrow's worked example, write units on every line. Make the discipline visible."},{"day":322,"date":"18th November","pearl":"Spaced practice beats massed practice. Distribute the difficulty.","exposition":"Spaced practice — reviewing material at increasing intervals — beats massed practice (cramming) for long-term retention. The research is unambiguous. Distribute difficult topics across the year rather than concentrating them in one block. Students experience this as harder in the moment and learn more in the long run; that is the trade-off.","reflection":"Open next half-term's plan. Are the hardest topics concentrated in one block, or distributed? Redistribute one."},{"day":323,"date":"19th November","pearl":"When stuck, ask: \"What do we know? What do we want? What's between them?\" — Pólya never goes out of date.","exposition":"Pólya's framework — what do we know, what do we want, what's between them — is from 1945 and still works. When students are stuck, the question 'what do we know?' lets them list givens. 'What do we want?' clarifies the goal. 'What's between them?' is the meat of problem-solving. The framework is universal; the application is in your repeating it.","reflection":"When a student is stuck tomorrow, walk them through Pólya: what do we know, what do we want, what's between them? Teach the framework explicitly."},{"day":324,"date":"20th November","pearl":"Probe with \"why\" three times before moving on. Surface understanding collapses under three whys.","exposition":"Asking 'why?' once produces a surface answer. Twice produces a more careful one. Three times surfaces whether the understanding is robust. The technique is mildly uncomfortable for students and very revealing. Use it sparingly; it is a diagnostic, not a routine. Three whys tell you whether to move on or to reteach.","reflection":"Ask 'why?' three times in tomorrow's questioning sequence. Notice how often surface understanding collapses by the third."},{"day":325,"date":"21st November","pearl":"Trust the students. Most of them want to learn; some of them want you to make it possible.","exposition":"Most students want to learn. The behaviour that suggests otherwise often reflects something else: tiredness, hunger, family stress, lack of belief. Treating students as fundamentally cooperative — until repeated evidence suggests otherwise — keeps the lab as a place where learning is welcomed. Trust the default; investigate exceptions.","reflection":"Identify the student you secretly do not trust to learn. Plan one moment tomorrow that treats them as if they wanted to. Notice what happens."},{"day":326,"date":"22nd November","pearl":"A clipboard, a stopwatch and a metre rule are the spine of physics teaching. Don't let the digital crowd them out.","exposition":"A metre rule, a stopwatch, a clipboard. With these you can measure g, time a wave, find a centre of mass, sketch a graph in real time. The digital tools amplify but do not replace these fundamentals. Students who can use them confidently — who can write down a measurement and a unit on a clipboard — have a foundation that does not deprecate.","reflection":"When did you last use a clipboard, stopwatch, and metre rule together in a lesson? If digital tools have crowded them out, restore the balance."},{"day":327,"date":"23rd November","pearl":"Thank the technician explicitly when something has gone well. Recognition is part of the job culture.","exposition":"Specific thanks — 'thanks for that emergency prep, the lesson worked' — lands. Generic 'thanks' fades. Acknowledgement is part of the workplace's emotional infrastructure; it is also free, easy, and rare. Build the habit; the technician's working life is happier and the working relationship is stronger.","reflection":"After the next lesson when something went well thanks to prep, send the technician a specific thank-you. Not 'thanks for everything' — name the thing."},{"day":328,"date":"24th November","pearl":"PhET simulations are free, robust, and rigorously tested. Build them into your scheme of work.","exposition":"PhET simulations are produced by the University of Colorado Boulder and are rigorously tested for physical accuracy and pedagogical effectiveness. They run on browsers, are free, and cover most topics in the school curriculum. Embed them in your scheme of work; use them when the physical practical is impossible or as a complement.","reflection":"Pick one PhET simulation that could enrich next month's teaching. Bookmark it now; build it into the scheme of work."},{"day":329,"date":"25th November","pearl":"First-aid box location and contents: check at the start of every term.","exposition":"First-aid box checking is a five-minute job a term: inventory the contents against the recommended list, replace expired items, note where it is. The box no one has opened in five years is the box with no antiseptic when it is needed. Build the check into the start-of-term routine.","reflection":"Open your first-aid box. When did you last check the contents? If you have to guess, do it today."},{"day":330,"date":"26th November","pearl":"A good demo is half theatre, half data. Don't skimp on either half.","exposition":"A demo is half theatre and half data. The theatre — the build-up, the pause, the visible action — sustains attention. The data — measurements, calculations, follow-up questions — sustains learning. Skimping on either reduces the demo to entertainment or to dry observation. Both halves matter; rehearse both.","reflection":"Look at tomorrow's demo. Is the theatre and the data planned in equal measure? Skimping on either reduces the demo to entertainment or to dry observation."},{"day":331,"date":"27th November","pearl":"Vectors are not arrows; arrows are pictures of vectors. Teach the distinction early.","exposition":"A vector is a quantity with both magnitude and direction; an arrow is a graphical representation of one. Conflating them produces students who think every quantity 'is' an arrow, including some that are not. The distinction is subtle but real; teach it carefully. Some students will need to hear it three times before it lodges.","reflection":"When did you last teach the difference between a vector and an arrow? If never, plan five minutes this fortnight."},{"day":332,"date":"28th November","pearl":"Read outside physics. Literature, history, anthropology. They make you a better teacher of physics, paradoxically.","exposition":"Literature, history, anthropology give you context for the physics you teach. A Russian student understands the Cold War context of Soviet physics; a literature-reading teacher knows where Schrödinger's cat sits in cultural history. The cross-pollination makes you a better teacher, paradoxically — your physics becomes richer because it is not the only thing you think about.","reflection":"Pick one book outside physics you have read this year. If none, choose one for the holidays. The cross-pollination will surprise you."},{"day":333,"date":"29th November","pearl":"Don't conflate 'precise' with 'accurate'. Precise is repeatability; accurate is closeness to true value.","exposition":"Precision is repeatability; accuracy is closeness to truth. A miscalibrated balance reading 5.213 g, 5.214 g, 5.212 g is precise but inaccurate. A worn ruler giving 5.0 cm, 5.5 cm, 4.8 cm is accurate on average but imprecise. Students conflate these constantly. Teach the distinction explicitly with examples.","reflection":"In tomorrow's measurement lesson, build in one example of precise-but-inaccurate and one of accurate-but-imprecise. Make the distinction concrete."},{"day":334,"date":"30th November","pearl":"Liquid nitrogen: vented containers only, gloves, face shield, well-ventilated room.","exposition":"Liquid nitrogen vapour is a real asphyxiation hazard in confined or unventilated spaces, because it displaces oxygen quietly and without warning. Vented containers only, gloves, face shield, and a well-ventilated room — these are the absolute baseline. Build the routine before the demo; the consequences are too severe to improvise.","reflection":"Before your next LN₂ demo, verify ventilation, gloves, face shield, and the absence of sealed containers. Verify each, not assume each."},{"day":335,"date":"1st December","pearl":"Mentoring a newer teacher will teach you more than any course.","exposition":"Mentoring a newer teacher forces you to articulate what you usually do by instinct. The act of explaining 'why I do it this way' surfaces your own thinking and improves it. The mentor learns at least as much as the mentee. Volunteer when asked; you will be better for it.","reflection":"Is there a newer colleague you could mentor — or learn from — this term? Make the offer this week."},{"day":336,"date":"2nd December","pearl":"Power supplies live where they live for a reason. Don't reorganise the prep room without asking.","exposition":"Power supplies are positioned where they are for reasons — proximity to circuits, distance from water, accessibility to the technician. Reorganising them without consulting the technician undoes design decisions you may not have understood. Ask before moving; the answer may surprise you and prevent a rework.","reflection":"When did you last move a piece of kit in the prep room without asking? If recently, walk back and check if the move helped or hindered."},{"day":337,"date":"3rd December","pearl":"Don't stay late every night. A tired teacher is a worse teacher.","exposition":"A tired teacher misses misconceptions, mismarks work, snaps unnecessarily. Sleep is professional infrastructure, not personal luxury. Going home at a reasonable hour most days is not a sign of low commitment; it is what makes high commitment sustainable. Defend your evenings; the lessons benefit.","reflection":"Did you stay late three nights this week? What did you produce that you would not have produced rested? Be honest about the answer."},{"day":338,"date":"4th December","pearl":"Always ask: \"What could we change to improve this experiment?\" — and reject \"do more repeats\" as a default answer.","exposition":"'Do more repeats' is the lazy answer to 'how could we improve this experiment?' It addresses random uncertainty only and ignores everything else. Push for better answers: longer timer scale, less parallax, smaller systematic errors, different range. The question is more valuable than the easy answer it commonly receives.","reflection":"When students next suggest 'do more repeats' to improve an experiment, push back. Demand a different answer: smaller systematic errors, better range, finer instrument."},{"day":339,"date":"5th December","pearl":"Hold on to the moments: the lab-coat selfie, the rocket that flew further than predicted, the student who finally got it.","exposition":"The student selfie in a lab coat, the rocket that flew further than the calculation predicted, the moment a previously stuck student says 'oh, I see' — these are the rewards of teaching. Hold on to them; they sustain you through the bureaucratic years. Build a folder of moments. Reread it on the difficult days.","reflection":"Open your folder of moments — the rocket flight, the lab-coat selfie, the student who finally got it. If you don't have one, start it today."},{"day":340,"date":"6th December","pearl":"Address ethnic imbalance in physics too. CV Raman, Subrahmanyan Chandrasekhar, Chien-Shiung Wu, Katherine Johnson, Mae Jemison. Make their work part of the course.","exposition":"CV Raman discovered the Raman effect; Chandrasekhar derived the white-dwarf mass limit; Chien-Shiung Wu disproved parity conservation; Katherine Johnson computed the trajectories that put Americans on the Moon; Mae Jemison was the first Black woman in space. Their work belongs in the syllabus, in the examples, in the room — not as supplements but as standard physics.","reflection":"When did your scheme of work last include CV Raman, Chandrasekhar, Chien-Shiung Wu, Katherine Johnson, or Mae Jemison? If never, fix that in the next topic."},{"day":341,"date":"7th December","pearl":"A formula sheet is a crutch unless students know what each symbol means physically.","exposition":"A formula sheet without understanding is a list of symbols. F = qvB sin θ means nothing unless students know that v is the velocity of the charge, B is the magnetic field strength, θ is the angle between them. Teach the meaning of each symbol; the sheet then becomes a memory aid, not a crutch. Without this, students copy formulae they cannot deploy.","reflection":"Open your formula sheet. Could your students explain the meaning of every symbol on it physically? If not, that is what to teach before the next assessment."},{"day":342,"date":"8th December","pearl":"Spillage protocols differ by chemical. Don't improvise; consult the sheet.","exposition":"Chemical spillage protocols vary by substance: alkali on skin, acid on the bench, mercury on the floor, organic solvent everywhere. The correct response differs and the wrong response can worsen the situation. Consult the safety data sheet or local equivalent; do not improvise. Build a quick-reference card and keep it in the lab.","reflection":"When did you last review chemical spillage protocols? Plan to read them this week; do not improvise when the moment arrives."},{"day":343,"date":"9th December","pearl":"Trust the curriculum, but don't worship it.","exposition":"The curriculum is a useful framework but not a sacred text. Within its constraints, you make choices about emphasis, pacing, examples, depth. Trusting it for structure while shaping it for your students is the professional position. Worshipping it produces robotic teaching; ignoring it produces incoherent teaching. Hold both at once.","reflection":"Where do you most depart from the curriculum because you know your students better? Be honest. Where do you stick to it from habit rather than judgement?"},{"day":344,"date":"10th December","pearl":"Build a 'no opt-out' culture: if a student passes, return to them after another answers.","exposition":"If a student answers 'I don't know' and you move on, you teach them that 'I don't know' is a successful exit. If you return to them after another student provides the answer — 'now you've heard Maya, can you put it in your own words?' — you teach them that participation is non-optional. No opt-out; just deferred contribution.","reflection":"Identify a student who consistently passes on questions. Plan the next time you'll return to them after another student answers — and rehearse what you'll say."},{"day":345,"date":"11th December","pearl":"Subject knowledge plus subject love plus relentless kindness — the rest is technique.","exposition":"The technical skill of teaching is real and worth developing. But knowing the subject, loving the subject, and treating students with kindness — these are the foundations. Everything else is technique built on these. New teachers worry about technique; experienced teachers know the foundations matter most. Get the foundations right; the technique compounds.","reflection":"Of the three foundations — knowledge, love, kindness — which is currently strongest in your teaching? Which is thinnest? Plan one act this week on the thinnest."},{"day":346,"date":"12th December","pearl":"Different students need different things; equity is not uniformity.","exposition":"Equity is not uniformity. A student needing extra time, a worked example, a different starting point, or a more challenging extension is not getting an advantage; they are getting what they need to engage with the same physics. Plan for variation deliberately; the alternative is to teach as if all students were one student.","reflection":"Pick one student whose needs differ from the class default. Have you planned for them in tomorrow's lesson, or are you hoping uniformity will work?"},{"day":347,"date":"13th December","pearl":"Catch them being good. Three positive comments for every corrective one.","exposition":"Three positive comments for every corrective one is roughly the ratio that maintains a positive classroom climate. Without the positives, the corrections feel personal; with them, the corrections feel like coaching. Make 'catch them being good' a daily discipline. The room shifts within weeks; the relationships shift within terms.","reflection":"Track your ratio tomorrow: positive comments to corrective ones. Aim for three to one. Notice the room."},{"day":348,"date":"14th December","pearl":"Career progression doesn't have to mean management. Some of the best teachers stay teachers their whole lives.","exposition":"Some excellent teachers move into management to seek progression; some stay in the classroom for thirty years and become better and better. Both paths are honourable. Career progression does not require moving away from teaching. The teacher who stays is irreplaceable in their classroom; the head of department may be replaceable.","reflection":"If you've felt pressured to move into management, examine the pressure. Some of the best teachers stay teachers their whole lives. Is that one of your options?"},{"day":349,"date":"15th December","pearl":"Symbols deserve definitions. \"Let v be...\" is the first line of professional physics.","exposition":"'Let v be the velocity of the trolley, measured in metres per second'. The defining sentence is the first line of any quantitative analysis. Students who write equations without defining symbols write equations that may or may not be wrong; nobody can tell. Drilling the habit of definition produces professional physics writing.","reflection":"Write the first line of tomorrow's worked example: 'Let v be...'. Define every symbol before deploying it."},{"day":350,"date":"16th December","pearl":"Never plan a 60-minute lecture. Even university doesn't get away with that anymore.","exposition":"A 60-minute lecture exceeds the attention span of the audience by approximately 50 minutes. Even at university, this is increasingly recognised. Schools have known it longer. Break up direct instruction with questions, tasks, pair-share, demos, breaks. The lecture is a small part of the lesson, not the whole.","reflection":"If your lesson plan has more than fifteen minutes of direct instruction, break it up before tomorrow. The attention span is not yours; it is theirs."},{"day":351,"date":"17th December","pearl":"Range and interval matter more than students think. Five points clustered near the origin tells you nothing.","exposition":"Five data points clustered between 5 and 10 N tell you the relationship near that range and nothing elsewhere. Real investigations need a wide range and well-spaced intervals. Teach students to plan the range before the readings: 'what is the smallest value you can use? The largest? How many points should be between them?' The data quality depends on these decisions.","reflection":"Before the next practical, plan the range of the independent variable. Smallest? Largest? How many points between? The data quality depends on these decisions."},{"day":352,"date":"18th December","pearl":"If you cannot estimate the answer in your head before solving, the problem is harder than you think.","exposition":"A problem you cannot estimate is a problem harder than you realise. The estimate forces you to identify which physics applies and roughly how the answer should behave. If no estimate comes, something fundamental is missing. Stop and find what it is before grinding through algebra; otherwise the algebra produces an unmoored answer.","reflection":"Set yourself one problem from tomorrow's homework. Can you estimate the answer before solving? If not, the problem is harder than you thought."},{"day":353,"date":"19th December","pearl":"Discrepant events are pedagogically gold. The Cartesian diver, the Mpemba effect, the chain fountain — leave students with questions.","exposition":"Discrepant events are demonstrations where the result contradicts expectation. The Cartesian diver (denser than water but floats), the Mpemba effect (hot water can freeze faster than cold), the chain fountain (loops itself above the container). They are pedagogical gold because the cognitive dissonance forces engagement. Use them to motivate inquiry; let students leave with the question, not the answer.","reflection":"Build one discrepant event into the next half-term — Cartesian diver, Mpemba effect, chain fountain. Leave students with the question, not the answer."},{"day":354,"date":"20th December","pearl":"Beware the 'perfect graph' from a simulation. Real data is messy; teach students to expect it.","exposition":"A simulation produces a graph cleaner than any real experiment. Students who learn from clean data are derailed by the messiness of their own. Always show real data alongside simulations; teach students to expect noise, outliers, drift. The cleaner the simulation looks, the more deliberate you need to be about preparing students for reality.","reflection":"Next time you show a simulation, follow it with real data on the same phenomenon. Watch students absorb the difference in noise level."},{"day":355,"date":"21st December","pearl":"Track your wellbeing as carefully as your scheme of work. Burnout is a curriculum issue.","exposition":"Burnout is not personal failure; it is a curriculum issue. The teacher who burns out has, almost always, been over-asked or under-supported by their environment. Track your wellbeing as you track your scheme of work. Notice the warning signs: sleeplessness, irritability, dread of Sundays. Act on them early; the system that depleted you will not save you.","reflection":"Track your wellbeing this week as deliberately as you track your scheme of work. Sleep, mood, dread of Mondays. The signs reveal themselves to the attention you give them."},{"day":356,"date":"22nd December","pearl":"Beware the cult of busyness. Slow lessons can be the deepest.","exposition":"A slow lesson with two ideas explored deeply often produces more learning than a fast lesson with eight ideas touched lightly. Busyness is not depth. Students remember the moment they finally understood, not the moment they were told. Plan for depth; resist the curricular pressure to cover at all costs.","reflection":"Plan one slow lesson next week — two ideas, explored deeply. Resist the curricular pressure to cover at all costs."},{"day":357,"date":"23rd December","pearl":"Sentence stems support extended writing: \"This shows that...\", \"In contrast...\", \"This is because...\"","exposition":"'This shows that...'. 'In contrast...'. 'This is because...'. Sentence stems give students a starting structure for extended writing. Build a bank of stems suited to physics: 'evidence for this is...', 'an exception to this is...', 'this can be derived from...'. Students who internalise these stems write better physics; the stems become invisible scaffolding.","reflection":"Build a bank of sentence stems for tomorrow's extended writing — 'this shows that', 'an exception is', 'evidence for this is'. Display them."},{"day":358,"date":"24th December","pearl":"Crocodile clips, banana plugs, terminal connectors — each in their own bin. Mixed is unusable.","exposition":"Crocodile clips in one bin, banana plugs in another, terminal connectors in a third. Mixed in one drawer, every connector grab takes a minute of sorting. Separated, every connector grab takes a second. The labour of initial sorting pays for itself within the first practical of the next term. Build the storage; defend it.","reflection":"Walk to the connectors drawer. Are crocodile clips, banana plugs, and terminal connectors separated, or mixed? Separate them this week."},{"day":359,"date":"25th December","pearl":"Small angle approximations: sin θ ≈ tan θ ≈ θ (in radians), cos θ ≈ 1 − θ²/2. Teach when and why, not just what.","exposition":"Small-angle approximations make pendulums tractable, simple harmonic motion intelligible, optics solvable. The condition — θ ≤ 0.1 rad or so — and the consequences — sin θ ≈ θ, cos θ ≈ 1 − θ²/2 — must be taught explicitly. Students who use them without knowing when they apply produce wrong answers in regimes where they fail. Teach when and why, not just the algebraic substitution.","reflection":"When did your scheme last meet small-angle approximations explicitly — when sin θ ≈ θ, when it doesn't? Plan a lesson if not recent."},{"day":360,"date":"26th December","pearl":"Variables first: dependent, independent, control. Force this language until it's automatic.","exposition":"Dependent, independent, controlled. The three variables of an experiment, and the language students must use precisely. Drill it from the first practical: 'what's the independent variable?' 'What are you controlling?' Until students reach for this language automatically, their experimental design is hazy. The vocabulary is the design.","reflection":"After tomorrow's investigation, ask three students: which variable is dependent, which independent, which controlled? Listen to the fluency."},{"day":361,"date":"27th December","pearl":"Drop the myth that science progresses linearly. It zigzags, doubles back, and forgets things for centuries.","exposition":"Phlogiston was once mainstream chemistry. The aether was once the medium of light. Continental drift was dismissed for fifty years. Science is not a steady accumulation; it is a wandering, sometimes-stumbling process of revision. Telling this story to students prepares them for the messiness of real science — and for the possibility that current dogmas will, too, be revised.","reflection":"Tell your class one story this fortnight where science changed its mind — phlogiston, continental drift, the steady-state universe. Science is not linear; teach that."},{"day":362,"date":"28th December","pearl":"Technicians know things teachers don't — about kit, about students, and often about safer ways to do an experiment. Listen.","exposition":"Technicians know the kit, the safety quirks, and often the students. They have seen the previous version of this practical, the safer alternative, the variant that works better. Listen to them. Their input is not subordinate to teaching judgement; it is parallel expertise. Departments that listen to technicians have safer labs and better lessons.","reflection":"When did the technician last offer you a safer or better version of a practical? If never, you may be missing an opportunity to listen."},{"day":363,"date":"29th December","pearl":"Bounce a question. A student answers; ask the next student whether they agree, and why. The room learns to listen.","exposition":"A student answers; the next student is asked to agree or disagree, with reasons. The room learns that listening to peers is required, not optional. Bouncing questions also models genuine disagreement: physics is not a series of pronouncements but a series of arguments. Build the practice; the discussion culture follows.","reflection":"In tomorrow's discussion, after a student answers, bounce: 'do you agree, and why?' Build the listening culture."},{"day":364,"date":"30th December","pearl":"Ask the technician what they want from you. The answer is almost always: notice, lead time, and a thank you.","exposition":"Ask the technician what they want from you. The answer almost always includes: notice them as a colleague, give lead time on requests, and say thank you. The technician's job has invisible parts; acknowledging these makes the working life better for both of you. The conversation is short; the difference is large.","reflection":"Ask the technician this week: what do you want from me? Then deliver on the answer, not the answer you assumed they'd give."},{"day":365,"date":"31st December","pearl":"Twitter (X) and Bluesky have lively physics teacher communities. They will give you a demo idea, a chemistry tip, and a laugh on the same scroll.","exposition":"Physics teacher communities online — Twitter (X), Bluesky, Threads, specialist forums — are vibrant. A scroll surfaces a new demo idea, a corrected misconception, a wry observation about a Year 10 class. Engage as much as suits you; lurk if that's better. The community amplifies what every department's CPD budget cannot.","reflection":"Which online physics-teacher community do you find most useful? If 'none', try one this week. If you already engage, take stock of what you give back."}]
</script>

<script>
(function() {
  // Parse data
  var dataEl = document.getElementById('pearls-data');
  var pearls = JSON.parse(dataEl.textContent);

  // Elements
  var dayEl = document.getElementById('day-number');
  var dateEl = document.getElementById('date');
  var pearlEl = document.getElementById('pearl');
  var reflectionEl = document.getElementById('reflection');
  var expositionEl = document.getElementById('exposition');
  var expositionLabel = document.getElementById('exposition-label');
  var revealBtn = document.getElementById('reveal-btn');
  var anotherBtn = document.getElementById('another-btn');
  var shareLink = document.getElementById('share-link');

  function pickRandom() {
    return pearls[Math.floor(Math.random() * pearls.length)];
  }

  function pickByDay(n) {
    var match = pearls.filter(function(p) { return p.day === n; });
    return match.length ? match[0] : null;
  }

  function getRequestedDay() {
    // Support ?day=N in the query string
    var params = new URLSearchParams(window.location.search);
    var raw = params.get('day');
    if (raw === null) return null;
    var n = parseInt(raw, 10);
    if (isNaN(n) || n < 1 || n > 365) return null;
    return n;
  }

  function hideExposition() {
    expositionEl.hidden = true;
    expositionLabel.hidden = true;
    revealBtn.textContent = 'Reveal exposition';
    revealBtn.setAttribute('aria-expanded', 'false');
  }

  function showExposition() {
    expositionEl.hidden = false;
    expositionLabel.hidden = false;
    revealBtn.textContent = 'Hide exposition';
    revealBtn.setAttribute('aria-expanded', 'true');
  }

  function render(entry) {
    dayEl.textContent = 'Day ' + entry.day + ' of 365';
    dateEl.textContent = entry.date;
    pearlEl.textContent = entry.pearl;
    reflectionEl.textContent = entry.reflection;
    expositionEl.textContent = entry.exposition;
    hideExposition();

    // Update share link
    var base = window.location.origin + window.location.pathname;
    shareLink.href = base + '?day=' + entry.day;

    // Track current entry for share button
    shareLink.dataset.day = entry.day;
  }

  // Reveal button toggles exposition visibility
  revealBtn.addEventListener('click', function() {
    if (expositionEl.hidden) {
      showExposition();
    } else {
      hideExposition();
    }
  });

  // Draw another
  anotherBtn.addEventListener('click', function() {
    var entry = pickRandom();
    render(entry);
    // Clear ?day= from URL when re-rolling
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
    // Scroll to top of the article for visibility
    document.querySelector('.pearl-page').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // Share link copies to clipboard if possible, otherwise lets the browser navigate
  shareLink.addEventListener('click', function(e) {
    if (navigator.clipboard && shareLink.href) {
      e.preventDefault();
      navigator.clipboard.writeText(shareLink.href).then(function() {
        var original = shareLink.textContent;
        shareLink.textContent = 'Link copied!';
        setTimeout(function() { shareLink.textContent = original; }, 1500);
      }).catch(function() {
        // Fallback: just navigate
        window.location.href = shareLink.href;
      });
    }
  });

  // Initial render: honour ?day=N if present, otherwise pick random
  var requested = getRequestedDay();
  var initial = requested ? (pickByDay(requested) || pickRandom()) : pickRandom();
  render(initial);
})();
</script>

</body>
</html>
