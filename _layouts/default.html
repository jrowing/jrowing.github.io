<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Joe Rowing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>

<nav>
  <a href="{{ '/' | relative_url }}" class="nav-logo">J<span>.</span>Rowing</a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}#about">About</a></li>
    <li><a href="{{ '/' | relative_url }}#projects">Projects</a></li>
    <li><a href="{{ '/resources/' | relative_url }}">Resources</a></li>
    <li><a href="{{ '/planner/' | relative_url }}">Planner</a></li>
    <li><a href="{{ '/cv/' | relative_url }}">CV</a></li>
    <li><a href="https://jrowing.substack.com" target="_blank" rel="noopener">Substack ↗</a></li>
    <li><a href="https://www.linkedin.com/in/jrowing/" target="_blank" rel="noopener">LinkedIn ↗</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <p>© {{ 'now' | date: "%Y" }} Joe Rowing &nbsp;·&nbsp;
    <a href="https://www.linkedin.com/in/jrowing/">LinkedIn</a> &nbsp;·&nbsp;
    <a href="https://jrowing.substack.com">Substack</a>
  </p>
</footer>

<script>
  var dropdown = document.getElementById('resources-dropdown');
  var trigger  = dropdown.querySelector('a');

  // Toggle open on click
  trigger.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });

  // Close when clicking anywhere else
  document.addEventListener('click', function() {
    dropdown.classList.remove('open');
  });

  // Stop clicks inside the menu from closing it
  dropdown.querySelector('.dropdown-menu').addEventListener('click', function(e) {
    e.stopPropagation();
  });
</script>

</body>
</html>
