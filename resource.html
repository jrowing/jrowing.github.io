<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Joe Rowing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  {% include styles.html %}
  <style>
    .resource-header {
      background: var(--ocean);
      padding: 5.5rem 3rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .resource-header a {
      color: var(--coral);
      text-decoration: none;
      font-size: 0.82rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .resource-header a:hover { text-decoration: underline; }
    .resource-header h1 {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      margin-top: 0.75rem;
      font-style: italic;
    }
    .resource-body {
      max-width: 820px;
      margin: 0 auto;
      padding: 3.5rem 2rem 5rem;
    }
    .resource-body h2 {
      font-family: 'Playfair Display', serif;
      color: var(--ocean);
      font-size: 1.6rem;
      margin: 2rem 0 0.75rem;
    }
    .resource-body h3 {
      font-family: 'Playfair Display', serif;
      color: var(--reef);
      font-size: 1.2rem;
      margin: 1.5rem 0 0.5rem;
    }
    .resource-body p { color: #374151; line-height: 1.75; margin-bottom: 1rem; }
    .resource-body ul, .resource-body ol {
      color: #374151; line-height: 1.75;
      padding-left: 1.5rem; margin-bottom: 1rem;
    }
    .resource-body a { color: var(--reef); }
    .resource-body table {
      width: 100%; border-collapse: collapse; margin: 1.5rem 0;
      font-size: 0.9rem;
    }
    .resource-body th {
      background: var(--ocean); color: white;
      padding: 0.6rem 1rem; text-align: left;
      font-family: 'DM Mono', monospace; font-weight: 400;
    }
    .resource-body td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .resource-body tr:nth-child(even) td { background: var(--foam); }
    .resource-body code {
      font-family: 'DM Mono', monospace;
      background: var(--foam);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
    }
    .resource-body pre {
      background: var(--ocean);
      color: rgba(255,255,255,0.85);
      padding: 1.2rem 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    .resource-body pre code { background: none; padding: 0; color: inherit; }
    footer {
      background: #07192e;
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }
    footer a { color: var(--coral); text-decoration: none; }
  </style>
</head>
<body>
  {% include nav.html %}

  <div class="resource-header">
    <a href="{{ '/' | relative_url }}">← Back to jrowing.com</a>
    <h1>{{ page.title }}</h1>
  </div>

  <div class="resource-body">
    {{ content }}
  </div>

  <footer>
    <p>© {{ 'now' | date: "%Y" }} Joe Rowing &nbsp;·&nbsp;
      <a href="{{ '/' | relative_url }}">Home</a> &nbsp;·&nbsp;
      <a href="{{ '/#resources-section' | relative_url }}">All Resources</a>
    </p>
  </footer>
</body>
</html>
