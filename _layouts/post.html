---
layout: default
---
<div class="page-wrap">
  <a href="/blog.html" class="back-link">← Blog</a>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <span class="post-date">{{ page.date | date: "%d %B %Y" }}</span>
    {% if page.tags %}
      <div class="project-tags" style="margin-top:10px;">
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      </div>
    {% endif %}
  </div>
  {{ content }}
</div>
