name: Build Resource Index

on:
  push:
    branches: [main]
    paths:
      - 'resources/**'
      - '.github/workflows/build-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate resources/index.json
        run: |
          python3 - <<'EOF'
          import os, json, re

          resources_dir = "resources"
          output = []

          for fname in sorted(os.listdir(resources_dir)):
              if not fname.endswith(".html"):
                  continue

              path = os.path.join(resources_dir, fname)

              # Try to extract <title> tag, fall back to filename
              with open(path, encoding="utf-8", errors="ignore") as f:
                  content = f.read()

              match = re.search(r"<title>(.*?)</title>", content, re.IGNORECASE | re.DOTALL)
              if match:
                  title = match.group(1).strip()
              else:
                  # Convert filename to title: my-cool-resource.html → My Cool Resource
                  title = os.path.splitext(fname)[0].replace("-", " ").replace("_", " ").title()

              output.append({"file": fname, "title": title})

          with open(os.path.join(resources_dir, "index.json"), "w") as f:
              json.dump(output, f, indent=2)

          print(f"Written {len(output)} resource(s) to resources/index.json")
          for item in output:
              print(f"  • {item['file']} → {item['title']}")
          EOF

      - name: Commit index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/index.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: rebuild resources/index.json [skip ci]"
          git push
