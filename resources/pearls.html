rd May","pearl":"Plan with a colleague. Two heads halve the workload and double the quality.","exposition":"Two teachers planning the same scheme of work produce a better scheme than either alone, in less than twice the time. Different misconceptions are spotted, different examples are surfaced, different demos are remembered. Find a colleague; defend the planning time; treat it as core, not extra. The lessons improve for both classes.","reflection":"Who in your department could you plan a lesson with this week? Send the message before the day ends."},{"day":124,"date":"4th May","pearl":"Celebrate Nobel announcements. Live, every October. It signals that physics is alive.","exposition":"Nobel Prizes are announced in early October. Watching the live announcement — even ten minutes of it — turns physics into news. Discuss the work in the next lesson. Show photographs of the laureates. The signal that physics is alive, ongoing, and includes living people may be the most important you send all year.","reflection":"Diarise the next Nobel announcement. Plan a five-minute slot to discuss it with your class the morning after."},{"day":125,"date":"5th May","pearl":"Demonstrations build relationships as much as they build understanding. Don't underestimate the smile factor.","exposition":"A great demo is also a moment of shared delight. The pendulum that hangs forever after a deceptively short release; the Magdeburg hemispheres students cannot pull apart. The smiles are part of the learning, not separate from it. Students who associate physics with delight find delight in physics; that motivates everything later.","reflection":"Recall a demo you ran recently. Did the class smile? If not, was the demo for understanding only, or could it also have been for delight?"},{"day":126,"date":"6th May","pearl":"Scientific notation is the natural notation of physics. Make calculator decimals look amateurish by comparison.","exposition":"6.022×10²³ is a number you can write and reason about. 602200000000000000000000 is an embarrassment to scientific discourse. Insist on scientific notation: it conveys precision, magnitude, and physical sense all at once. Calculator output in long form should be reformatted by the student before being committed to paper.","reflection":"Open your last set of marked work. How many students wrote 0.00000000034 rather than 3.4×10⁻¹⁰? Make the next standard correction systematic."},{"day":127,"date":"7th May","pearl":"Always have a \"plus one\" task ready for fast finishers. Not more of the same — something deeper.","exposition":"A worksheet of identical questions extended to twenty-five is not extension; it is busywork. A genuine 'plus one' takes the same idea further: a limit case, a related real-world application, a connection to a future topic. Have one prepared for every lesson; the fast-finishers will deepen their understanding, not just be occupied.","reflection":"What 'plus one' extension is ready for tomorrow's lesson? If you don't have one, the fast finishers will set their own — usually worse than your version."},{"day":128,"date":"8th May","pearl":"Use original papers when accessible: Newton's apple metaphor in the Principia, Einstein on Brownian motion, Rutherford on alpha scattering.","exposition":"Newton wrote the Principia in Latin. Einstein wrote on Brownian motion in German. Rutherford wrote about alpha scattering in clear English. Translations exist; excerpts are short. Reading an original — even a paragraph — shifts physics from a finished textbook to a conversation among real people that students can join.","reflection":"Pick one paragraph from a primary source — Newton, Faraday, Einstein, Rutherford. Read it aloud this fortnight. Watch the class lean in."},{"day":129,"date":"9th May","pearl":"Tier 3 vocabulary (terms specific to physics) needs explicit teaching. Tier 2 (general academic words) often does too — 'derive', 'infer', 'analyse'.","exposition":"Tier 3 vocabulary — 'resistance', 'flux', 'momentum' — needs explicit definition the first time it appears. Tier 2 vocabulary — 'derive', 'infer', 'analyse', 'comment' — is often more overlooked, and often more frequently the failure mode in exams. Pre-teach both. Display the running glossary; expect students to use it.","reflection":"List five Tier 2 verbs that show up in exam questions: derive, infer, analyse, comment, justify. When did you last teach them explicitly?"},{"day":130,"date":"10th May","pearl":"Approximation is not laziness; it is the heart of theoretical physics.","exposition":"Approximations — small angle, low velocity, large N, weak field — are not laziness. They are the act of identifying what matters in a problem and what does not. The physicist who can spot 'this term is negligible because…' is doing the central act of theory. Treat approximations with the same seriousness as the exact calculation; sometimes more.","reflection":"Plan tomorrow's hardest topic. Where in it could you say 'in this regime, we can neglect...'? That neglect is the lesson, not a shortcut."},{"day":131,"date":"11th May","pearl":"Etymology helps: 'isotope' from 'same place', 'photon' from 'light', 'kinetic' from 'motion'. The Greek and Latin pay dividends.","exposition":"Greek and Latin roots open up technical vocabulary. 'Iso-tope' is 'same place' in the periodic table. 'Photo-electric' is 'light-electric'. 'Tele-scope' is 'see far'. A two-minute etymological aside lodges the word in long-term memory more firmly than a definition. Build a habit of unpacking new terms by their parts.","reflection":"Pick three technical terms in tomorrow's lesson. Find one root for each. Tell the class the etymology before the definition."},{"day":132,"date":"12th May","pearl":"Ferromagnetic small parts (iron filings, paper clips, ball bearings) in lidded containers. Magnets find them anyway.","exposition":"Iron filings, paper clips, small ball bearings — anything magnetic — should live in lidded containers, ideally with a labelled magnetic strip inside. Loose magnets find them across a bench in a way that suggests intentionality. Containment is the difference between a kit you can teach with and one you have to clear up.","reflection":"Walk past your magnet store. Are ferromagnetic small items in lidded containers? Or are they drifting toward the magnets again?"},{"day":133,"date":"13th May","pearl":"Reuse problems with one variable changed. Familiarity reveals understanding.","exposition":"A familiar problem with one variable changed is the cheapest diagnostic in teaching. Students who 'understood' the original may freeze on the variant; those who genuinely understood will solve it quickly. The variation surfaces the difference between memorisation and understanding without an explicit test.","reflection":"After your next worked example, change one variable and ask students to redo. Watch which students freeze and which adapt."},{"day":134,"date":"14th May","pearl":"If a student says \"my experiment didn't work,\" reply: \"All experiments work. What did this one tell you?\"","exposition":"'My experiment didn't work' usually means 'the result was not what I expected'. But the result is data. 'What did this one tell you?' redirects students from disappointment to inquiry. Some of the most interesting physics has come from exactly this attitude — Roentgen's X-rays, Penzias and Wilson's cosmic background.","reflection":"Next time a student says 'my experiment didn't work', reply 'what did it tell you?' Plan it now, so the words are ready."},{"day":135,"date":"15th May","pearl":"Curiosity is the syllabus. Everything else is scaffolding.","exposition":"Curiosity is the unstated syllabus of every good physics teacher. The exam board's specification matters; cultivating wonder matters more. Students who leave your classroom curious will keep learning physics for life; students who leave with the syllabus and no curiosity will leave physics at the exam-room door.","reflection":"Of the lessons you taught last week, which one most nurtured curiosity? Which one most blunted it? Rebalance for next week."},{"day":136,"date":"16th May","pearl":"Rearranging equations is a skill. Teach it explicitly with pure-maths fluency before applying it to physics contexts.","exposition":"Rearranging E = mc² for m, or v = u + at for t, requires fluency with algebra that is not always present. Teach rearrangement as a pure-mathematical skill first, then drill it in physical contexts. Students who can do this without thinking can focus on the physics; students who cannot are perpetually trapped in the algebra.","reflection":"How fluent are your students in rearranging equations purely algebraically? If a non-physics rearrangement task would defeat them, that is the gap."},{"day":137,"date":"17th May","pearl":"Define carefully: weight is not mass, heat is not temperature, voltage is not current, energy is not power.","exposition":"Weight is the gravitational force on a mass; mass is the property of having inertia. Heat is energy in transit; temperature is the measure of thermal kinetic energy. Voltage is the energy per charge; current is the flow of charge. The conflations are common and corrosive. Define carefully and require students to use the words correctly.","reflection":"Which conflation does your class most struggle with — heat and temperature, voltage and current, mass and weight? Address it explicitly this week."},{"day":138,"date":"18th May","pearl":"Always identify the dependent variable in a graph. \"y against x\" is incomplete; what's the physics?","exposition":"'Plot y against x' is geometric advice without physical content. 'Plot velocity against time' tells students what the line will mean. Once the physics is identified, the gradient and area become physical quantities (acceleration, displacement) rather than mathematical abstractions. Always identify what the variables are physically.","reflection":"Look at the last graph you drew on the board. Did you say 'y against x' or did you name the physical quantities? The naming is the lesson."},{"day":139,"date":"19th May","pearl":"Share Schemes of Work with the technician at the start of each term. They can flag clashes and plan stock.","exposition":"Schemes of work shared at the start of term let the technician forecast stock levels, plan rare reagent purchases, and warn you of clashes when two classes want the same kit on the same day. The conversation in advance prevents the panic the morning of the lesson. Make it part of the start-of-term routine.","reflection":"When did the technician last see your scheme of work for the term ahead? If not recently, share it before the next planning meeting."},{"day":140,"date":"20th May","pearl":"If in doubt, don't do it. The lesson can be rescued. A student cannot.","exposition":"If you have doubt about a practical's safety — not anxiety, but reasoned doubt — pause it. Substitute a video, a simulation, a calculation. The lesson can be reshaped; an injury cannot be undone. The instinct to soldier through because the timetable says so has produced too many incidents. Trust the doubt.","reflection":"Of the practicals on your schedule for this term, which one are you slightly uneasy about? Trust the unease — substitute or rethink before the lesson."},{"day":141,"date":"21st May","pearl":"Calculus is intuitive when motivated physically. Velocity is the rate of change of position. Force is the rate of change of momentum. Begin with the physics.","exposition":"Velocity is dx/dt. Force is dp/dt. The derivative is the natural language for change, and physics is the science of change. Introducing calculus through these concrete physical statements — before any reference to limits — gives students intuition first and rigour later. The maths follows the physics, not the other way around.","reflection":"Plan tomorrow's calculus introduction by starting with motion, not limits. Where does the physical motivation live in your scheme?"},{"day":142,"date":"22nd May","pearl":"QR codes on equipment can link to setup videos. The technician will thank you.","exposition":"A QR code on a piece of apparatus linking to a one-minute setup video saves the technician (and you) from repeating the same instruction every term. Build the video once; the QR code outlasts the apparatus. The technician will thank you, and supply teachers will be functional rather than lost.","reflection":"Pick one piece of apparatus that needs a setup tutorial every term. Could you make a one-minute video and a QR code this week?"},{"day":143,"date":"23rd May","pearl":"Use real data, even messy data, for graphing practice. Idealised data hides the skills students need.","exposition":"A perfectly clean set of data points lying exactly on a line teaches students that they have done it 'right'. Real data is messy; the skill of inferring the line through messy data is what professional physics looks like. Use real, slightly messy data sets. The skill of dealing with noise is more transferable than the skill of finding a line through five clean points.","reflection":"When did you last use real, messy data in a graphing lesson? Idealised data hides the very skills students need at A-level."},{"day":144,"date":"24th May","pearl":"Datalogging produces too many points. Teach students to sample, smooth, and ignore noise sensibly.","exposition":"A datalogger produces a thousand points; the eye sees noise. Teach students to sample (every tenth point), smooth (rolling average), and ignore obvious artefacts (start-up transient, sensor drop-out). These are the same skills used in observational astronomy, particle physics, and medical imaging. They scale.","reflection":"After your next datalogging practical, ask students to sample, smooth, and ignore obvious artefacts. Watch what they keep and what they discard."},{"day":145,"date":"25th May","pearl":"Energy is conserved; intuition is not. Track both.","exposition":"Conservation laws survive intuitive failures. The bouncing ball seems to lose energy; the energy went into sound, heat, slight deformation. Always tracking where energy goes — even the small parts — builds physical realism. Energy 'lost' is a placeholder for 'we did not look hard enough'. Students who internalise this avoid a lifetime of casual reasoning errors.","reflection":"In tomorrow's lesson, can you track every joule from source to final state? If not, that is where the next teaching point lives."},{"day":146,"date":"26th May","pearl":"Show students published data sets — LIGO chirps, CMB temperature maps, exoplanet light curves. Authenticity matters.","exposition":"LIGO chirps are public; CMB temperature maps are public; exoplanet light curves are on the NASA Exoplanet Archive. Show them. Print them. Have students plot them. The data is real, the discoveries are recent, and the analysis is within reach. Authenticity beats reconstructed examples every time.","reflection":"Show your class one real data set this fortnight — a LIGO chirp, an exoplanet light curve, the CMB. Then ask: what does this look like?"},{"day":147,"date":"27th May","pearl":"Read aloud from Feynman occasionally. The Lectures, Surely You're Joking, QED — pick a paragraph.","exposition":"Feynman wrote like he taught: vividly, with delight, and without condescension. A paragraph from the Lectures on the wobbling plate, or from Surely You're Joking on bongo drums and the Manhattan Project, lands differently from a textbook. Reading aloud is part of the magic: pacing, emphasis, voice.","reflection":"Pick a passage from Feynman and read it aloud next week. Notice which students sit up."},{"day":148,"date":"28th May","pearl":"Failure is part of the story. The aether, phlogiston, caloric — wrong ideas taught us a lot.","exposition":"The aether was a careful, mathematically sophisticated theory that turned out to be wrong. Phlogiston was its chemical sibling. Caloric was the thermal one. Telling the story of these failures shows students that 'wrong' theories are still serious science — they were the best understanding of their day. Physics is a moving frontier, not a finished encyclopedia.","reflection":"When did you last tell students about a wrong theory — aether, phlogiston, caloric? Wrong theories teach how science works."},{"day":149,"date":"29th May","pearl":"Coats off. Long coats and Bunsens are a fire investigation waiting to happen.","exposition":"A long coat near a Bunsen catches a sleeve; the lab coat is suddenly a fire. Coats off (or buttoned tight), sleeves up, before any flame is lit. Build the routine before the first lesson with flames; do it every time. The vigilance is required because the failure mode is fast.","reflection":"Before tomorrow's flame lesson, brief: coats off, sleeves up, hair tied back. Watch yourself do it the same way every time."},{"day":150,"date":"30th May","pearl":"Teach significant figures by example, not by rule. Students absorb how you write more than what you say.","exposition":"If you write 2.34567 throughout your example, students will too. If you write 2.35 (3 sig fig), they will start to imitate. Significant figures are absorbed by exposure to professional practice, not by rule. The rule is short; the modelling has to be constant.","reflection":"Look at your own working on the board this week. Do you write to 3 sig figs or 7? Whatever you write, they will imitate."},{"day":151,"date":"31st May","pearl":"Mini-whiteboards make every student answer every question. They are the cheapest assessment tool ever invented.","exposition":"A mini-whiteboard means every student in the class produces an answer at the same time, every time. The teacher scans, sees the misconception spread across the room, addresses it in real time. The cost is minimal — laminated A5 sheets, dry-wipe markers — and the diagnostic power exceeds anything more elaborate.","reflection":"If you don't have a class set of mini-whiteboards, order them today. The diagnostic gain in every lesson dwarfs the cost."},{"day":152,"date":"1st June","pearl":"Gradients have units. So do areas under curves. Reinforce this every time.","exposition":"The gradient of a velocity-time graph has units of m s⁻¹ / s = m s⁻². That is acceleration. The unit derivation shows the physical meaning automatically. Train students to derive the gradient's units before interpreting it; the interpretation then follows. Same for areas under curves.","reflection":"After the next gradient calculation, write the units of the gradient on the board. Treat the gradient as a physical quantity with units, not a bare number."},{"day":153,"date":"2nd June","pearl":"If you must use a flame, brief on hair tied back, sleeves up, and clear desks before you light a match.","exposition":"Pre-flame routine: hair tied back, sleeves up (or buttoned), nearby items cleared, gas tap checked. Brief before lighting, every time. Students who go through this routine twenty times will not skip it on the twenty-first, because it is invisible by then; students who skip it occasionally will be the ones with the singed eyebrow.","reflection":"Before your next flame lesson, walk the room and clear papers, books, and hair-hazards. Make the routine visible to students."},{"day":154,"date":"3rd June","pearl":"Grades printed on returned work make feedback invisible. Hold the grade until the feedback is read.","exposition":"A grade announced before the feedback is read means the feedback is not read. The number is everything; the comments are noise. Withhold the grade. Make the feedback comprehensible without the number. After students have processed it (and perhaps redrafted), reveal the grade. The signal-to-noise of feedback transforms.","reflection":"Try withholding the grade on the next returned work. Reveal it only after students have read and responded to the feedback. Notice the difference in engagement."},{"day":155,"date":"4th June","pearl":"Bunsen tubing checked for splits termly. Old tubing fails embarrassingly.","exposition":"Bunsen tubing perishes. A split fills the room with gas. Inspect every term — a quick squeeze runs along the length, a visual scan for cracks. The minute of inspection prevents the minute of emergency evacuation. The technician usually leads this; teachers can do the spot checks.","reflection":"Has Bunsen tubing been checked this term? Squeeze along its length once. The minute is small; the failure mode is not."},{"day":156,"date":"5th June","pearl":"An order-of-magnitude estimate should precede any calculation. Numbers without expectation breed errors without detection.","exposition":"Calculator output of 4.7×10⁻¹⁵ for the mass of a person is a calculator that has been mistreated. The mistreatment is invisible without an order-of-magnitude estimate. Build the habit: 'before I solve, I expect…'. The expectation does not need to be precise; it needs to be present.","reflection":"On the next problem you set, ask students to estimate the answer before solving. Watch how often the estimate catches the calculator slip."},{"day":157,"date":"6th June","pearl":"If you can't draw it, you can't explain it.","exposition":"Drawing a phenomenon forces commitment to a model. Where do the field lines go? Which direction is the force? What does the wave look like at this instant? A student who cannot draw it is a student who has not formed a physical picture. The diagram is the test of understanding, not its illustration.","reflection":"Pick the next physical situation you will teach. If you cannot draw it from memory, plan to learn the drawing first."},{"day":158,"date":"7th June","pearl":"Mark for the next lesson, not for the bookshelf.","exposition":"Marking for the bookshelf — neatly, exhaustively, post-hoc — is for inspection. Marking for next lesson — quickly, focused on what students need to do differently — is for teaching. The audience matters. If the comment will not change behaviour by the next lesson, the comment is theatre.","reflection":"Look at the marking you did last week. Will any of it change what students do next lesson? If not, that was bookshelf marking."},{"day":159,"date":"8th June","pearl":"Geometry is more important than students think. Cross-sectional area, surface-to-volume ratio, solid angles — they reward reasoning.","exposition":"Geometric reasoning underpins so much physics: solid angles in flux, cross-sectional areas in resistance, surface-area-to-volume ratios in cooling. Students who reach for diagrams and geometric arguments before equations often solve problems faster. Teach the geometric habit alongside the algebraic.","reflection":"When did your scheme of work last lean on geometric reasoning — solid angles, cross-sections, surface-to-volume? Pick one and weave it into the next topic."},{"day":160,"date":"9th June","pearl":"Confidence is not the same as competence. Tend to both, with the quieter students first.","exposition":"A confident student who is wrong sometimes does worse than a hesitant one who is right. Confidence is a separate variable from competence and needs tending separately. Build both — but for the quieter students, do confidence first; they often have the competence already and need only to believe it.","reflection":"Identify the student in your class who is confidently wrong. They need separate handling from the hesitantly right. Plan tomorrow with both in mind."},{"day":161,"date":"10th June","pearl":"Visit other teachers' lessons when you can. Five minutes of someone else's teaching is worth an hour of CPD.","exposition":"Five minutes in another teacher's lesson reveals techniques you would never have read about: a way of standing, a way of asking, a way of waiting. The visits do not need to be formal observations. Walk past, drop in for a moment, talk later. The professional grows in conversation with colleagues, not in isolation.","reflection":"When did you last observe a colleague's lesson for even five minutes? Diarise one this fortnight."},{"day":162,"date":"11th June","pearl":"Don't let students carry boiling water across the room. Move the heat to the water, not the water to the heat.","exposition":"A student carrying a beaker of hot water across the room is a future scald. The physics — bring the heat to the water — is also good safety practice. Set up Bunsens at the bench; bring water in flasks with handles; never under any circumstance encourage students to walk with hot apparatus. The risk is high and the alternative is easy.","reflection":"Look at your next heat-water practical. Are students walking with hot water? If yes, reverse the design — bring heat to the water."},{"day":163,"date":"12th June","pearl":"Wait time after a question should feel slightly uncomfortable. That's how you know it's working.","exposition":"Wait time after a question should be uncomfortable for you, not for students. The first three seconds feel awkward; by ten seconds you have probably caught everyone who needs the time. Filling silence rescues no one and trains everyone to wait for the rescue. Hold the silence; the answers come.","reflection":"Time your wait time after questions tomorrow. Aim for five seconds before saying anything. Hold your nerve."},{"day":164,"date":"13th June","pearl":"EAL learners need wait time, visual support, and bilingual glossaries when appropriate. They do not need easier physics.","exposition":"English as an Additional Language students need more time, visual scaffolds, and (where possible) bilingual glossaries for key physics terms. They do not need watered-down physics; the cognitive content can stay full. The language is a separate access issue from the conceptual one; treat it as such.","reflection":"Identify any EAL learners in your class. Do they have bilingual glossary support for tomorrow's terminology? Build one if needed."},{"day":165,"date":"14th June","pearl":"Discussions of uncertainty deserve at least as much lesson time as taking the readings.","exposition":"Taking the readings is the easy part. Interpreting them — what does this uncertainty mean? Is the trend significant? Could a different design reduce noise? — is the physics. Spend at least as much lesson time on the uncertainty analysis as on the readings themselves. The latter is the routine; the former is the science.","reflection":"Look at the time you allocated for the next practical. Is at least half of it for uncertainty analysis, or is uncertainty an afterthought?"},{"day":166,"date":"15th June","pearl":"Misconceptions are not mistakes; they are coherent alternative theories. Treat them with respect, then dismantle them carefully.","exposition":"A misconception is not a gap; it is a model. The student has constructed an internally consistent picture in which 'heavy things fall faster' or 'current is used up'. Dismantling requires engagement with the model itself, not just assertion of the correct version. Listen to the model; predict where it will fail; show that failure carefully.","reflection":"Pick a common misconception you fight every year. Treat it tomorrow as a coherent alternative theory — listen first, dismantle second."},{"day":167,"date":"16th June","pearl":"Write the lesson objective on the board, then come back to it at the end. Did you actually do it?","exposition":"An objective on the board at the start, and revisited at the end, makes the lesson's purpose visible. 'Did we do it?' becomes a closing question students can answer. The discipline of writing a single sentence to encapsulate the lesson's purpose is also a discipline for the teacher: if you cannot, the lesson is not focused enough.","reflection":"Will tomorrow's objective be visible on the board for the whole lesson? If not, write it on a card and stick it up."},{"day":168,"date":"17th June","pearl":"A box marked 'broken' is not storage. Either fix it, recycle it, or bin it.","exposition":"A 'broken' box is a graveyard with hopes attached. Items that have been there a year are not going to be fixed. Decide at acquisition: fixable in a week, or recyclable now. The middle category — 'might fix it someday' — devours storage and morale. Be ruthless; the prep room thanks you.","reflection":"Open the 'broken' box in your prep room. What has been there over a year? Either fix it, recycle it, or bin it before the term ends."},{"day":169,"date":"18th June","pearl":"Always have a \"minus one\" task ready for students who are lost. Not easier work — different work.","exposition":"A struggling student handed easier work learns that the teacher does not believe in them. Different work — a different angle on the same idea, a more concrete starting point, a model to copy and adapt — keeps them in the lesson. The standard is the same; the route is different. Plan the routes alongside the lesson.","reflection":"What 'minus one' alternative — different work, not easier work — will you have ready for the struggling student in tomorrow's lesson?"},{"day":170,"date":"19th June","pearl":"Standard solutions dated when prepared. Solutions older than a year are usually wrong, not just suspect.","exposition":"Many standard solutions degrade in months. A solution dated when prepared can be assessed for fitness; an undated solution is suspect by default. The labelling is the technician's domain mostly, but the dating discipline benefits everyone. A six-month-old NaOH may no longer be 1 M.","reflection":"Walk through the chemistry shelves the technician maintains. Are standard solutions dated? If not, that is a conversation rather than a complaint."},{"day":171,"date":"20th June","pearl":"Don't dumb down for SEND students. Scaffold up.","exposition":"'Dumbing down' for students with Special Educational Needs reveals what the teacher thinks they cannot do. Scaffolding up — keeping the standard, adding supports, breaking the task into stages — reveals what they can. Many students with diagnosed needs do excellent physics when scaffolded; they do not need an easier subject.","reflection":"Pick one SEND student. Are you scaffolding up or dumbing down? The difference is in the standard, not the support."},{"day":172,"date":"21st June","pearl":"Aim to be the teacher a former student remembers fondly twenty years later.","exposition":"Twenty years from now, some former student will tell another adult about the physics teacher who changed something. The exact lesson rarely matters; the relationship and the manner do. Aim to be that teacher. The mechanism is unromantic — kindness, expertise, high expectations, consistency — but the outcome is real.","reflection":"Picture a former student who might describe you fondly in twenty years' time. What did you do for them? Could you do it more often?"},{"day":173,"date":"22nd June","pearl":"Calibrated masses: store as sets. A set with a missing 50 g is worse than no set.","exposition":"A calibration mass set with a missing 50 g cannot calibrate. Worse, it gives systematically wrong results until the discrepancy is noticed. Sets stored together, checked at the start of term, used and returned together. Singletons drift; sets persist.","reflection":"Walk to the calibration mass set. Is it complete? A set with a missing 50 g calibrates nothing."},{"day":174,"date":"23rd June","pearl":"Time how long things actually take. You will discover you over-plan by 40%.","exposition":"Most teachers overestimate what students can do in a lesson. Time a real lesson, measure how long each phase took, and learn. You will discover that the 'quick' starter took twelve minutes, the 'main task' overran by eight, and the plenary disappeared. Realistic timing makes lessons better; idealistic timing makes lessons stressful.","reflection":"After tomorrow's lesson, time each phase and compare with the plan. If you over-plan by 40%, you are not alone — but it does need fixing."},{"day":175,"date":"24th June","pearl":"Predict-Observe-Explain. Always make students commit to a prediction in writing before the demo runs.","exposition":"Predict — Observe — Explain. The student must commit to a prediction in writing before the demo runs. The prediction makes the observation meaningful: surprise becomes pedagogical. Without prediction, demos become entertainment. With it, every demo is an experiment in the student's mind.","reflection":"In tomorrow's demo, will you make students write a prediction first? If not, the demo is a magic trick rather than physics."},{"day":176,"date":"25th June","pearl":"Don't turn your back on a Bunsen lesson, ever. Stand where you can see all flames at once.","exposition":"A Bunsen lesson with thirty students has thirty potential ignition points. Standing where you can see all of them — usually the back wall, or a careful slow walk — is non-negotiable. Marking work, looking at a screen, having a side conversation — these are for non-flame parts of the lesson. The flame demands attention.","reflection":"During your next Bunsen lesson, plan where you'll stand. Can you see every flame at once? If not, redesign the bench layout or the lesson."},{"day":177,"date":"26th June","pearl":"You will not see most of the seeds you plant grow. Plant them anyway.","exposition":"Some of the lessons that mattered most to you, you only realised mattered decades later. Some of the lessons that mattered most to your students will work the same way. The plant-and-leave model of teaching is unsatisfying in the short term and the only realistic model in the long term. Keep planting.","reflection":"Name a student you taught five years ago whose growth you never witnessed. Most of your influence will work like that. Plant anyway."},{"day":178,"date":"27th June","pearl":"Always tell the technician what the experiment is for. Aims matter to prep choices.","exposition":"A practical aimed at 'demonstrating resistance vs length' needs different precision than one aimed at 'finding the resistivity of constantan'. Tell the technician the aim, not just the apparatus list. They can suggest a different wire, a better range of lengths, a more reliable ammeter. The aim shapes the prep.","reflection":"For your next practical, write the aim on the prep request, not just the apparatus. Notice if the technician's response shifts."},{"day":179,"date":"28th June","pearl":"Code in the classroom: Python on a Raspberry Pi or a chromebook can model an oscillator, simulate Brownian motion, or solve a differential equation. A little code goes a long way.","exposition":"Twenty lines of Python can simulate a damped oscillator, draw the phase portrait, or solve a problem that has no analytic solution. Building this once with a class shifts physics from 'problems we can solve algebraically' to 'problems we can solve computationally'. The latter is closer to working physics.","reflection":"Could you write twenty lines of Python to simulate one phenomenon in your scheme? If yes, do it. If no, learn this term."},{"day":180,"date":"29th June","pearl":"Begin every lesson with a phenomenon, not a definition.","exposition":"Beginning with a phenomenon — a demo, a question, an observation — primes students to want the definition. Beginning with the definition asks them to memorise a label for something they have not encountered. The order matters. Phenomenon, then puzzle, then concept, then formalism.","reflection":"Will tomorrow's lesson start with a phenomenon or a definition? If a definition, change the order before you teach."},{"day":181,"date":"30th June","pearl":"Calculator policy: a department set, charged and tested, for assessments. Borrowing on the day costs marks.","exposition":"A class set of calculators, charged the night before, accessed only at assessments, removes the lottery of 'who remembered theirs'. Borrowing from a friend on the morning of an exam costs marks: an unfamiliar interface adds time and errors. The departmental set is a small investment with large protective value.","reflection":"Does your department have a set of calculators charged and tested? If not, who would benefit from leading on this — and how would you support them?"},{"day":182,"date":"1st July","pearl":"Don't let interactive whiteboards replace the chalkboard. Slow drawing is slow thinking, and slow thinking is good thinking.","exposition":"Interactive whiteboards make slick presentations; chalkboards (or whiteboards used as such) make slow thinking. The pace of physical writing is the pace at which students can think alongside. A demonstration of working built up move-by-move is more useful than the same working appearing instantly on a slide.","reflection":"Reach for the chalk or marker tomorrow rather than the slide. Notice how the pace of writing on the board shifts the pace of student thinking."},{"day":183,"date":"2nd July","pearl":"Eye protection at all sources of risk: heating, projectiles, springs under tension, glassware under stress, chemicals, UV.","exposition":"Eye protection is the cheapest and most reliable safety equipment in a lab. Heating, projectiles, springs under tension, glassware under stress, chemicals, UV — every category has caused eye injuries in schools. The rule is simple: when there is even a low probability of something flying, goggles are on. Build the routine until it is automatic.","reflection":"Run through tomorrow's lesson and list every moment that needs eye protection. Are goggles within reach at each? If not, fix the geography."},{"day":184,"date":"3rd July","pearl":"When the day is hard, remember: you are teaching people how the universe works. That is an extraordinary thing to be paid to do.","exposition":"On the hardest days, a long view helps. You are professionally entrusted with explaining the universe to the next generation. The job is not a customer-service interaction; it is a transmission of a tradition that goes back to Galileo. Sometimes the day is a slog; the underlying privilege is real. Hold both at once.","reflection":"On the hardest day this week, remember: you are explaining the universe to the next generation. Write down one moment that made this true today."},{"day":185,"date":"4th July","pearl":"AI tools (LLMs included) can plan, illustrate, and explain — but they cannot do practicals, and they hallucinate physics. Teach students to verify.","exposition":"Large language models can plan a lesson, generate practice questions, and explain concepts — sometimes well, sometimes with confident errors. They cannot do a practical. Treat them as a starting point and a checking tool, not an authority. Teach students to verify outputs against reliable sources; the skill of verification is the new literacy.","reflection":"How does your scheme of work address LLMs? If silently, you have outsourced the teaching of verification to chance. Plan one explicit lesson this term."},{"day":186,"date":"5th July","pearl":"Use exam-board mark schemes verbatim with students. The wording matters as much as the physics.","exposition":"Exam-board mark schemes are oddly worded for a reason: they reward specific phrases that flag specific reasoning. 'The induced emf is proportional to the rate of change of flux linkage' scores; 'voltage goes up when the magnet moves' may not. Show students the mark schemes; teach them to write to them. It is the genre of the exam, and they have to learn it.","reflection":"Pull up the mark scheme for a recent exam question. When did you last show it, verbatim, to your class? They cannot write to a target they cannot see."},{"day":187,"date":"6th July","pearl":"Read aloud occasionally. Hearing physics is different from reading it.","exposition":"Reading aloud — a paragraph from a textbook, a passage from a paper, a quotation from a famous physicist — engages a different cognitive channel. Hearing physics rather than reading it surfaces rhythm and emphasis that the eye misses. Use it sparingly but deliberately; the variation in mode itself sustains attention.","reflection":"Find a paragraph of physics worth reading aloud and put it in tomorrow's lesson. Notice the change of register."},{"day":188,"date":"7th July","pearl":"Self-assessment with a mark scheme teaches the marking criteria. Peer assessment teaches diplomacy.","exposition":"Self-assessment with a mark scheme teaches students what marks reward. Peer assessment additionally teaches them diplomacy: how to deliver criticism in a way the recipient can use. Both are real adult skills. Build both into your scheme of work, with clear protocols so they do not collapse into vague mutual approval.","reflection":"After the next assessment, try self-assessment with the mark scheme. The student who applies the rubric learns the rubric."},{"day":189,"date":"8th July","pearl":"A simulation is not a substitute for an experiment. It is a complement.","exposition":"PhET simulations can do things experiments cannot: change g, remove friction, see fields. But the simulation is also clean in a way that real apparatus never is. Use simulations to extend the physical experiment, not to replace it. Students who only encounter idealised setups will be derailed by the first real one.","reflection":"Which PhET simulation could replace twenty minutes of pure-board teaching this fortnight? Build it in."},{"day":190,"date":"9th July","pearl":"Half-metre rule: distance from source to demonstrator for closed sources. Tongs, never fingers.","exposition":"Closed radioactive sources: tongs to handle, half a metre minimum from the body, never directly handled with fingers. The protection is geometric: distance reduces dose by the inverse square law. Teach the inverse square as you teach the protocol. The two reinforce each other.","reflection":"When did you last hand tongs to a student rather than allowing fingers near a sealed source? The protocol is yours to model."},{"day":191,"date":"10th July","pearl":"Today's physicists are real people. Show videos, news, podcasts. The community is not just historical.","exposition":"Living physicists matter. A two-minute clip of a researcher describing their current work, a podcast snippet, a news story — these make 'physicist' a present-tense profession rather than a Victorian portrait. Students who see this can imagine themselves into it. Curate a few accessible examples; rotate them through the year.","reflection":"Name one living physicist whose work you've shown your class this term. If you can't, find a two-minute clip for next week."},{"day":192,"date":"11th July","pearl":"Brief the technician on which student groups have additional needs. They can prepare accordingly.","exposition":"Some students need pre-warning before changes of pace; some have visual impairments that need larger fonts on a worksheet; some have allergies relevant to the materials. Briefing the technician (with appropriate confidentiality) lets them prepare accordingly. The trust this builds with both students and technicians is large.","reflection":"Are the technicians briefed on which students in your class need additional care or adjustments this term? If not, schedule the conversation."},{"day":193,"date":"12th July","pearl":"Limit cases are your best diagnostic. \"What happens when m → 0? When θ → 90°?\"","exposition":"Limit cases test understanding fast. 'What happens to the period of a pendulum as L goes to zero?' 'What happens to the field of a uniformly charged plane as you go to infinity?' Students with rote knowledge fumble; students with physical intuition reach for the answer. Make limit cases routine in your questioning.","reflection":"In tomorrow's lesson, build in one limit-case question: 'what happens when m goes to zero?' or similar. The students who can answer have understood; the others surface."},{"day":194,"date":"13th July","pearl":"Use a visualiser for live working, live marking, and live demonstrations. It's the cheapest pedagogical upgrade available.","exposition":"A visualiser is a top-down camera connected to the projector. It lets you mark a single student's work in front of the class, model annotation, or show a small piece of apparatus close up. The cost is modest and the pedagogical leverage enormous. Once you have one, you wonder how you taught without it.","reflection":"If you don't have a visualiser, push the department to acquire one. If you do, are you using it for live student work, or only for static slides?"},{"day":195,"date":"14th July","pearl":"Keep a demo log: what you tried, what worked, what didn't, photos of the set-up. Future-you and your colleagues will thank present-you.","exposition":"A demo log — text and photos — captures what no instruction sheet does: what actually worked, in your lab, on your kit. When you return to a demo a year later, future-you needs the notes that current-you has. Build the log in a shared document; the department compounds the knowledge across teachers and years.","reflection":"Start a demo log this week. Note what you tried, what worked, photos. Future-you will thank present-you within a year."},{"day":196,"date":"15th July","pearl":"Show Maxwell's original equations (all 20 of them) before the modern four. Beauty hides in the modern version.","exposition":"Maxwell wrote twenty equations in eight variables. Heaviside compressed them into four in vector form. Showing students both — the original and the streamlined — reveals that mathematical beauty is not given; it is achieved through reformulation. The condensation is itself a piece of physics work worth showing.","reflection":"Show your class Maxwell's twenty equations next time you teach electromagnetism, then collapse them into four. The compression is itself a piece of physics."},{"day":197,"date":"16th July","pearl":"Build in a pause every ten minutes. Attention is renewable but not infinite.","exposition":"Attention is bounded. After about ten minutes of dense input, retention drops sharply. A pause — a question, a turn-and-talk, a brief individual task — resets attention. Plan the pauses; do not improvise them. Students concentrate better when they trust there will be a break.","reflection":"Look at tomorrow's lesson plan. Where are the pauses every ten minutes? If they aren't there, attention will collapse before the bell."},{"day":198,"date":"17th July","pearl":"Pendula and clamp stands: stored upright in racks, not in piles. Piles tangle.","exposition":"Clamp stands stored in piles tangle. Pendulum bobs in the wrong drawer mix. Racks — vertical, labelled, sized — let students self-serve and return. The technician's time is freed from re-sorting; the lesson's start-up time falls dramatically. Storage furniture is one of the highest-leverage investments a department can make.","reflection":"Walk to your clamp-stand storage. Are they upright in racks or in piles? The first time you reorganise it, the technician will know you mean business."},{"day":199,"date":"18th July","pearl":"Five-minute starter, twenty-minute development, twenty-minute task, ten-minute consolidation, five-minute exit. Adapt, but always have a shape.","exposition":"A lesson shape — starter, development, task, consolidation, exit — is not a recipe but a scaffold. Adapt freely, but always have a shape. Lessons without shape feel improvised because they are; students feel the lack of trajectory and disengage. A clear shape lets you bend it without losing the class.","reflection":"Write tomorrow's lesson in five phases — starter, development, task, consolidation, exit. If you cannot, the shape will collapse mid-lesson."},{"day":200,"date":"19th July","pearl":"If you can do a demo with a ruler, a coin and a piece of string, do it that way before reaching for the kit.","exposition":"Some of the best demonstrations need nothing more than a ruler, a coin, and a piece of string. A pendulum from a string and a 1p; a transverse wave along a tensioned string; a centripetal force experiment with a coin on a spinning piece of card. The constraint forces clarity, and the everyday materials say: physics is in the world, not in the kit.","reflection":"Plan one demo for next week using only items from your kitchen drawer. The constraint will clarify the physics."},{"day":201,"date":"20th July","pearl":"A risk assessment is a living document, not a tick-box. Annotate it as the lesson reveals new risks.","exposition":"A risk assessment that lives on a shelf is a document. A risk assessment annotated with what actually went wrong in the lesson — 'students underestimated the heat of the hot plate; added a separate brief next time' — is a working document. Update it after each lesson; the next teacher reading it inherits real experience.","reflection":"Open your most-used risk assessment. Has it been annotated this term? If untouched, it is no longer living."},{"day":202,"date":"21st July","pearl":"Algebra before numbers. Solve for the unknown symbolically, then substitute. Dimensions catch errors before they propagate.","exposition":"Substituting numbers early hides the structure of the answer. Working symbolically until the last step lets you check dimensions, take limits, and spot cancellations. The numerical substitution at the end is mechanical; the algebra before it is physics. Drill this practice until it is the default.","reflection":"After your next algebra-heavy problem, ask students to solve symbolically first and substitute last. Watch how often the symbolic solution catches errors."},{"day":203,"date":"22nd July","pearl":"Read the CLEAPSS (or national equivalent) guidance for every new practical. Yes, every one.","exposition":"CLEAPSS guidance is updated as new evidence and new incidents are reviewed. The procedure you ran last year may have been amended. Reading the current guidance for every new (or annually repeated) practical is twenty minutes that protects students and you. It is also where to find better methods you would not otherwise discover.","reflection":"When did you last consult CLEAPSS for a 'standard' practical? If 'never', this term has new guidance — review one."},{"day":204,"date":"23rd July","pearl":"Tomorrow, do one small thing better than you did today. That is the entire profession.","exposition":"Career-long teacher development is not built on heroic transformations; it is built on small, deliberate improvements. One thing better, one lesson at a time. The compound effect across a career is enormous. The pressure to be perfect immediately is its own obstacle; the discipline of marginal improvement is the answer.","reflection":"Name one thing in your teaching you will do better tomorrow than today. Just one. Write it down before you leave the room."},{"day":205,"date":"24th July","pearl":"Logging software (Vernier, Pasco, IOLab) saves time. Cap the time saved with extra time on analysis.","exposition":"Sensors and dataloggers — Vernier, Pasco, IOLab — collect more data faster than students can with stopwatches. The time saved should not be reclaimed as 'one more activity'; reinvest it in analysis. The bottleneck in school physics is rarely data collection. It is what students do with the data afterwards.","reflection":"If you use a datalogger, ask: is the extra time being reinvested in analysis, or absorbed by another activity? Be honest."},{"day":206,"date":"25th July","pearl":"Two trolleys are better than one. The come-in trolley and the go-out trolley should not cross paths.","exposition":"One trolley for what comes in, one for what goes out. They do not cross paths; nothing fresh gets confused with something used. The technician unloads the 'in' trolley confident that its contents are returned; the 'out' trolley is prepped and untouched. The dual-trolley discipline removes a common source of friction.","reflection":"Set up two trolleys for the next double practical — in and out. Notice how much friction disappears."},{"day":207,"date":"26th July","pearl":"Return apparatus clean, sorted, and in the correct trays. The technician's time is finite; respect it.","exposition":"Returning a kit clean, sorted, and in the correct trays takes three minutes that prevent thirty minutes of sorting in the prep room. The same physics applies to your colleagues: a department that returns kit well is a department whose lessons start on time. Hold the standard; insist on it with students at the pack-down.","reflection":"Walk through the kit return from your last practical. Were trays sorted, cables coiled, glassware clean? If not, brief the class differently next time."},{"day":208,"date":"27th July","pearl":"If a demo involves anything above 50 V, treat it as live: barriers, signage, and isolation switches.","exposition":"Above 50 V dc or 30 V ac, the body's resistance becomes the relevant factor and shocks can be lethal. Treat such circuits as live: physical barriers between students and exposed conductors, signage, an isolation switch you can reach, and no work on the circuit while energised. The rule is unambiguous; the discipline is its application.","reflection":"Look at the next high-voltage demo. Are barriers, signage, and isolation in place? If you have to think about it, the answer is probably no."},{"day":209,"date":"28th July","pearl":"Systematic errors do not shrink with repeats. Random errors do. Students conflate these constantly.","exposition":"Repeating a measurement averages out random error but not systematic error. A miscalibrated ammeter reading 5% high will read 5% high every time. Students who repeat and average without distinguishing the error types are doing busy-work, not error analysis. Teach the distinction early; reinforce it relentlessly.","reflection":"Ask three students tomorrow to define systematic error versus random error. Most will conflate them. Plan the re-teach for next week."},{"day":210,"date":"29th July","pearl":"Reflect once a week. Without reflection, ten years' experience is one year's experience repeated ten times.","exposition":"Reflection — a quiet half-hour at week's end, journal in hand — converts experience into improvement. Without it, the same lesson is repeated with the same flaws indefinitely. 'Ten years of experience' can be one year repeated ten times, or it can be ten years of compounded growth. The difference is reflection.","reflection":"Block thirty minutes this Friday for reflection. Write five sentences in your journal. Do this for ten weeks and you will not recognise the December version of yourself."},{"day":211,"date":"30th July","pearl":"Stopwatches: a numbered set. \"Whose is whose\" becomes pointless after one term, but accountability remains.","exposition":"A set of numbered stopwatches lets you identify the one that drifts, the one that is dropped, the one that has been borrowed and not returned. It also subtly conveys accountability: the watch is part of someone's responsibility for the lesson. Numbering is a one-off effort; the discipline runs on its own thereafter.","reflection":"Walk to your stopwatch drawer. Are they numbered? If not, do it this week — one piece of tape per watch, one number."},{"day":212,"date":"31st July","pearl":"The slope of a graph has units. Treat the slope as a derived quantity, not as a number.","exposition":"Treating the gradient as 'the number 9.81' loses the physics. The gradient of v against t is 9.81 m s⁻², a derived quantity with units that confirm the interpretation. Force students to write the units on the gradient; the unit-check will catch errors that the numerical value alone hides.","reflection":"After the next gradient calculation, ask a student: 'what are the units of the gradient?' If they hesitate, you have your re-teach."},{"day":213,"date":"1st August","pearl":"Praise specifically. \"Maya, lovely careful pouring there\" teaches a generation of students how to pour.","exposition":"'Lovely careful pouring there, Maya' tells everyone in the class what careful pouring looks like. 'Good job' tells no one. Specific praise is also harder to fake — students sense the difference. Use specificity as a teaching tool: name the behaviour you want to multiply, and you will see it multiplied.","reflection":"After tomorrow's lesson, identify one specific thing you praised. 'Lovely careful pouring there, Maya' lands. 'Well done' does not."},{"day":214,"date":"2nd August","pearl":"Make groupwork roles explicit: experimenter, recorder, time-keeper, presenter. Rotate them.","exposition":"Without explicit roles, group work collapses to one student doing the work and the others watching. Explicit roles — experimenter, recorder, time-keeper, presenter — distribute the cognitive load. Rotate them across practicals so every student practises every role. The skills are real and transferable.","reflection":"For your next group work, assign roles in writing: experimenter, recorder, time-keeper, presenter. Rotate them by month."},{"day":215,"date":"3rd August","pearl":"Reference experiments — the speed of sound, g by free fall, resistivity of a wire — are skill anchors. Repeat them across the course.","exposition":"Some experiments — measuring g by free fall, the speed of sound, the resistivity of a wire — anchor a course. Repeating them at different points lets students see their own improvement. The first attempt was clumsy; the third is professional. The anchor experiments are also a useful framework when designing assessment.","reflection":"Which experiment in your course do students see only once? Pick the most skill-rich and plan a return visit later in the year."},{"day":216,"date":"4th August","pearl":"Dyslexic students benefit from cream paper, sans-serif font, and clean uncluttered diagrams. These help everyone.","exposition":"Cream paper, sans-serif fonts, generous spacing, uncluttered diagrams — design choices that help dyslexic students also help everyone else. The principle is universal design: optimisations for the most-affected group often benefit the whole population. Apply it to handouts, slide design, and the visual environment of the lab.","reflection":"Open your most-used worksheet. Could a dyslexic student read it without strain? If not, redesign it for the whole class."},{"day":217,"date":"5th August","pearl":"Build routines: in, set up, work, pack down, out. Routines remove decision-fatigue.","exposition":"Lab routines — entry, kit collection, set-up, work, pack-down, exit — that are explicit and consistent remove the small decisions that drain cognitive bandwidth. Students who do not have to wonder 'what do I do now?' have more bandwidth for thinking about the physics. Build the routines deliberately in the first weeks of term.","reflection":"Walk into your lab tomorrow as if it were a new class. What routine is missing? Build it in by Friday."},{"day":218,"date":"6th August","pearl":"Assessment criteria belong in student-facing language. \"Apply the conservation of momentum to two-body collisions\" — yes. \"AO2.3a\" — no.","exposition":"'Apply the conservation of momentum to two-body collisions' is what the student needs to do. 'AO2.3a' is a code only examiners understand. Student-facing language for assessment criteria empowers students to self-assess and target their effort. The code is for the spreadsheet; the language is for learning.","reflection":"Look at your assessment criteria. Are they in student-facing language, or in exam-board codes? Translate one of them this week."},{"day":219,"date":"7th August","pearl":"Avoid 'guess what the teacher is thinking' questions. They reward telepathy, not physics.","exposition":"'What was I thinking?' is not a question; it is a punishment. Questions whose answer requires reading the teacher's mind teach students that learning is a guessing game. Frame questions so they can be answered by reasoning from the physics: 'what would conservation of energy tell us here?' Reasoned answers; not guesses.","reflection":"Replay a recent question that fell flat. Was the answer in the textbook, or only in your head? Reframe it next time so the answer is reachable."},{"day":220,"date":"8th August","pearl":"A practical is not a recipe. If students can finish without thinking, the practical isn't doing its job.","exposition":"A practical that students can finish without thinking — follow steps 1 to 7 — is a recipe, not an investigation. Inject decision points: 'choose your own range', 'decide how many repeats', 'justify your method'. The cognitive load shifts from procedure-following to thinking. The thinking is the practical.","reflection":"Open your next practical brief. Can students finish it without thinking? If yes, build in one decision point — range, repeats, method — before the lesson."},{"day":221,"date":"9th August","pearl":"Plan plenaries you'd actually want to do. \"What three things did you learn?\" is a tired ritual.","exposition":"'What three things did you learn today?' produces three vague answers and dead silence after the third. Plenaries that genuinely consolidate — a problem applying the lesson's concept, a structured comparison, a quick prediction for tomorrow — are worth planning. The end of the lesson is when memory is shaped; do not waste it on ritual.","reflection":"Write tomorrow's plenary now. Is it a real consolidation or a tired ritual? If 'what three things did you learn?', replace it."},{"day":222,"date":"10th August","pearl":"A demo without a follow-up calculation is a magic trick.","exposition":"A demo followed by 'wasn't that cool?' is entertainment. A demo followed by 'now calculate the period of the pendulum we just watched' is physics. The calculation locks the observation into formal reasoning. Both halves matter: the demo opens the question, the calculation closes it.","reflection":"Look at your next demo. What calculation could follow it? If none, the demo is decoration; build one in."},{"day":223,"date":"11th August","pearl":"End on a question, not a conclusion. Let them leave thinking.","exposition":"Ending a lesson with a conclusion closes the inquiry. Ending with a question — 'so why didn't the heavier ball fall faster?' — leaves students with cognitive momentum. They go to their next class, or home, with physics still running. The unfinished thought is more powerful than the resolved one.","reflection":"Plan tomorrow's lesson to end on a question, not a conclusion. Decide now what the question will be."},{"day":224,"date":"12th August","pearl":"Stand at the door at the start of every lesson. The lesson begins when you make eye contact, not when the bell rings.","exposition":"Standing at the door at the start of every lesson positions you as host, not as gatekeeper. You see who arrives, in what state, with what mood. Brief greetings, eye contact, a smile — the relational currency of the lesson is built here. The class is calmer because you have already taken its temperature.","reflection":"Where will you stand at the start of tomorrow's lesson? If the answer is 'at my desk', stand at the door instead. Notice the difference."},{"day":225,"date":"13th August","pearl":"Use a 'pair–share–compare' before whole-class discussion. Quiet students need the airspeed.","exposition":"Direct whole-class discussion privileges the loud and the confident. Pair-share first lets quiet students rehearse an answer in safety; share-with-another-pair extends the rehearsal. By the time the discussion reaches the room, every student has an answer ready. The structure costs three minutes; the change in participation is dramatic.","reflection":"For tomorrow's discussion, build in pair-share before whole-class. The quiet students will arrive with answers; the loud ones will have to listen."},{"day":226,"date":"14th August","pearl":"End-of-lesson pack-down is non-negotiable. Three minutes invested saves twenty for the next teacher.","exposition":"Three minutes of pack-down — kit returned to trays, bench wiped, chairs in — saves twenty minutes for the next teacher. The lesson does not end at the bell; it ends when the lab is ready for the next class. Treat this as a non-negotiable phase; budget for it; insist on it.","reflection":"Run the next pack-down as a timed three-minute routine. Brief it like a fire drill. Watch how the next teacher's lesson is changed."},{"day":227,"date":"15th August","pearl":"Run a physics club, even if only six students come. Three of them might become physicists.","exposition":"A physics club of six students will produce one future Nobel laureate exactly never. It may produce three future physics graduates and a network of relationships that last decades. The labour-to-benefit ratio is excellent. Run it light: a regular slot, a planned topic, snacks. Sustainability matters more than ambition.","reflection":"If you don't already run a physics club, what would it take to start one next term? A slot, six students, snacks. That is enough."},{"day":228,"date":"16th August","pearl":"Take students outside the classroom when you can. Science museums, observatories, working physics labs at universities.","exposition":"Field trips to science museums, observatories, university laboratories — these are formative in a way classroom lessons cannot be. Students see physics as a place adults go to work. The bureaucratic friction of school trips is real; the impact justifies it. Build at least one significant visit into the year.","reflection":"Diarise one external visit — museum, observatory, university — for this academic year. The barrier is starting; the impact is long."},{"day":229,"date":"17th August","pearl":"Don't compare your behind-the-scenes to someone else's social media reel.","exposition":"Social media shows other teachers' best moments curated. Your daily reality includes the parents' email, the difficult lesson, the lost equipment. Comparing your full experience to others' edited highlights produces only despair. The honest comparison — your good days to their good days — is more truthful and less corrosive.","reflection":"Pick the social media account that most makes you feel inadequate. Mute it for a fortnight. Notice what you do with the reclaimed attention."},{"day":230,"date":"18th August","pearl":"When the textbook is wrong (and it sometimes is), say so. Students need to see that physics is a living craft.","exposition":"Textbooks have errors. Diagrams reverse polarities; explanations oversimplify to falsehood; old values of constants persist after updates. When you spot one, say so. Students see physics as a craft of careful examination rather than a closed canon. This builds critical reading rather than passive trust.","reflection":"Identify one textbook error you've spotted this term. Will you tell your class? If not, what does silence teach them about science?"},{"day":231,"date":"19th August","pearl":"Trailing cables: tape down or reroute. The most common lab injury is a trip, not a burn.","exposition":"Trailing cables — across walkways, between benches — are the single most common source of injuries in school labs. Tape down, route along walls, use overhead reels where possible. The fall trip is not glamorous, but it is what actually injures students. Walk the room with this in mind every term.","reflection":"Walk the lab now. Are any cables across walkways? Tape them down or reroute them. The most common lab injury is a trip."},{"day":232,"date":"20th August","pearl":"If you feel yourself getting angry, breathe before you speak. Anger never improves a lab.","exposition":"Anger in a lab is rarely useful. The instinct is real; the action should be deferred. A breath, a step back, a quieter voice. The student you would have shouted at responds better to the calm version, and you are not left with an apology owed. Build the habit; the lab will be safer and better.","reflection":"Recall a recent moment of frustration in the lab. Did you breathe before speaking, or speak first? Practise the order tomorrow."},{"day":233,"date":"21st August","pearl":"Use names. \"Yousef, goggles on please\" works better than \"goggles on, the lot of you.\"","exposition":"'Goggles on, the lot of you' addresses no one. 'Yousef, goggles' addresses a person. The named instruction is harder to ignore — for Yousef, for the student next to him, for everyone listening. Use names consistently; the lab becomes a room of people, not a mass.","reflection":"In tomorrow's lesson, use first names for every safety instruction. Notice the difference in compliance."},{"day":234,"date":"22nd August","pearl":"Always have a follow-up to a correct answer. Right answers are not the end of thinking.","exposition":"Right answers are not the end of thinking. 'Good — now, why?' or 'what would change if the mass doubled?' extends the inquiry. The student who got the right answer has earned the deeper question; the rest of the class learns from the deeper conversation. Resist the urge to move on.","reflection":"When a student gives a correct answer tomorrow, have your follow-up question ready before they speak. Right answers are the start of thinking, not the end."},{"day":235,"date":"23rd August","pearl":"Bell jar with a balloon, monkey-and-hunter, the falling chimney, the rotating stool with weights — there is a reason these demos have survived. Use them.","exposition":"Some demonstrations have survived a century in physics teaching because they work, repeatedly, on humans of all ages. The bell jar with the balloon, the monkey-and-hunter, the falling chimney that breaks because the bottom decelerates faster than the top, the rotating stool with weights. They are canon; use them.","reflection":"Pick one canonical demo — bell jar with balloon, monkey-and-hunter, falling chimney. When did you last teach it? Build it back in this term."},{"day":236,"date":"24th August","pearl":"Don't write what they can write themselves. Underline the error and ask them to find it.","exposition":"Writing the correction in the student's book teaches them what your handwriting looks like. Underlining the error and prompting them to find it teaches them what their thinking looks like when wrong. The labour of correction belongs to the student; your job is to point.","reflection":"On your next marking pass, underline errors without writing the correction. Force students to find what is wrong themselves."},{"day":237,"date":"25th August","pearl":"Seating plans matter. The two students you'd never sit together should be the two you sit furthest apart.","exposition":"Seating plans are not pastoral; they are pedagogical. The two students who whisper through the lesson should be on opposite sides of the room. The student who needs the board enlarged sits at the front. The seating plan made by chance becomes a seating plan made deliberately. The lesson runs better.","reflection":"Look at your seating plan. Is it from chance, or by design? Move two students tomorrow with a reason in mind."},{"day":238,"date":"26th August","pearl":"Set up class kits in trays, one tray per pair. Counting at the end takes thirty seconds.","exposition":"A tray per pair, items counted into it at the start, counted back at the end. Thirty seconds at issue, thirty at collection. Missing items found before the class leaves the room rather than in the rubble at the end of the day. The discipline is small; the savings in time and stress are large.","reflection":"For tomorrow's practical, set up trays per pair. Count contents in at issue, out at collection. The thirty seconds save the next teacher twenty minutes."},{"day":239,"date":"27th August","pearl":"Some lessons will fail. Some weeks will fail. Show up the next day anyway.","exposition":"Some lessons will fail. The set-up will misfire, the class will be in a difficult mood, the demo will not work. The professional response is not despair but return: show up tomorrow with a plan. Resilience in teaching is the willingness to be average sometimes without retiring as a result.","reflection":"Recall the lesson from last week that did not work. What was your reaction the next morning — return with a plan, or avoid the topic? Choose return."},{"day":240,"date":"28th August","pearl":"If you smell smoke, evacuate first, diagnose later.","exposition":"If you smell smoke, the order is evacuate, then diagnose. The fire-and-evacuation instinct rewards immediacy. The Macondo, the Grenfell, the Bradford City — all have in their post-mortems some version of 'they tried to assess before evacuating'. Get students out; investigate from outside.","reflection":"If a fire alarm went off in your next lesson, do students know to leave immediately, no questions? If you've never drilled it, plan to."},{"day":241,"date":"29th August","pearl":"No drinks at lab desks. Even water. Especially water near electronics.","exposition":"Water near electronics has a way of escaping its container. A drink bottle in a bag is far safer than one on the bench. Make the rule absolute: no drinks at lab desks, ever. The exception erodes the rule; the rule prevents the spill that ruins kit or shocks a student.","reflection":"Walk the lab tomorrow. Are there water bottles on benches near electronics? If yes, you've absorbed an exception that should be a rule."},{"day":242,"date":"30th August","pearl":"Get to know the other science teachers. Borrowing and lending kit, ideas, and demos is the lifeblood of a department.","exposition":"The other science teachers in your department are the most valuable peer group you have. They have similar students, similar kit, similar problems. Lending demos, sharing markschemes, discussing the lesson over a coffee — these conversations are how the department actually improves. Invest in them.","reflection":"Send one short message this week to a science colleague you don't usually talk to. Borrow or lend something — a demo, a worksheet, an idea."},{"day":243,"date":"31st August","pearl":"Subscribe to Physics Education and the Physics Teacher journals. Even browsing them in the staffroom shifts your thinking.","exposition":"Physics Education (UK) and The Physics Teacher (US) are journals written by teachers for teachers. The articles are practical, the demos are tested, the ideas are recent. Even casual browsing in the staffroom shifts thinking. A departmental subscription is a small investment with continual returns.","reflection":"When did you last read an article in Physics Education or The Physics Teacher? If not recently, browse one issue in the staffroom this fortnight."},{"day":244,"date":"1st September","pearl":"Don't narrate over the moment. Let the demo speak first, then unpack it.","exposition":"Narrating over a demo — 'now I'm doing X, and look, Y is happening' — fills the silence in which students could have observed. Let the demo speak. Show first; ask 'what did you see?' second; explain third. The order matters because perception precedes interpretation.","reflection":"After tomorrow's demo, count how many seconds you stayed silent before speaking. Aim for ten. Let the demo land before you explain it."},{"day":245,"date":"2nd September","pearl":"Teach the question before the answer. Physics is a method, not a textbook.","exposition":"Teaching the question — 'what would we need to measure to answer this?' — is teaching the method. Teaching the answer alone produces students who know facts. The method is what is transferable; the facts are what is examined. Both matter, but the method is the deeper investment.","reflection":"Replace one 'the answer is...' with 'how would we measure that?' in tomorrow's lesson. Notice which students reach for design rather than recall."},{"day":246,"date":"3rd September","pearl":"Glassware on lower shelves, lightweight items higher. Heavy things shouldn't fall on heads.","exposition":"Glassware falls when shelved too high or too crowded. Heavy items fall worse. Storage with mass and fragility in mind — heavy and breakable low, lightweight and unbreakable high — reduces both the frequency and the consequence of accidents. The hierarchy is not pedantry; it is engineering.","reflection":"Walk to your glassware shelves. Heavy and breakable on the bottom, lightweight and unbreakable on top? If reversed, fix it this week."},{"day":247,"date":"4th September","pearl":"If you change your mind about a practical, tell them as soon as you decide, not when they wheel it in.","exposition":"If you decide the morning of the lesson that the practical needs to be different — different chemicals, different range, different apparatus — tell the technician as soon as the decision is made. They may already have set up; the rework matters. A 7 am email is better than a 9 am surprise.","reflection":"If you change a practical the morning of the lesson, do you email the technician? If you wing it, the relationship is fraying invisibly."},{"day":248,"date":"5th September","pearl":"Aristotle was wrong, but he was not stupid. Treat the history of ideas with respect.","exposition":"Aristotle's physics described the world he could observe, carefully and systematically. It was wrong about important things, but it was also a serious intellectual achievement. Dismissing it teaches students that scientists who turn out to be wrong were stupid; the opposite is closer to the truth. Be respectful as you correct.","reflection":"Tell your class one Aristotle was-wrong-but-not-stupid story this term. Treat the history of ideas with the seriousness it deserves."},{"day":249,"date":"6th September","pearl":"Never apologise for mathematics. Apologise only for opaque mathematics.","exposition":"Apologising for the mathematics — 'sorry, this gets a bit equation-heavy' — tells students that the maths is alien to the physics. The maths is the physics in its precise form. What deserves apology is opaque mathematics: poor notation, unmotivated manipulation, lazy explanation. Apologise for opacity, never for rigour.","reflection":"Listen for yourself apologising for the maths tomorrow. If you catch it, replace the apology with: 'this is where the physics gets precise.'"},{"day":250,"date":"7th September","pearl":"Graphs are a language. Translation between graph, equation, and word is the literacy of physics.","exposition":"Graph, equation, word: any concept worth knowing should be expressible in all three. The skill of translating between them is the literacy of physics. Equation to word: 'this tells us…'. Word to graph: 'sketch what we expect…'. Graph to equation: 'what relationship fits this?' Cycle through routinely.","reflection":"Plan one lesson this fortnight where students cycle through graph, equation, and word for the same idea. Translation is the literacy of physics."},{"day":251,"date":"8th September","pearl":"If a student is silly with apparatus, the apparatus goes away — calmly and without negotiation.","exposition":"A student who is misusing apparatus has shown they cannot be trusted with it this lesson. The apparatus goes away; the student continues from the textbook or a substitute task. No negotiation, no shouting, no public lesson on respect. Calm consistency teaches more than escalation.","reflection":"When a student misused apparatus this term, did you remove the kit calmly, or escalate? Plan the calm version for next time."},{"day":252,"date":"9th September","pearl":"Approximation skills matter more than calculation skills. Order-of-magnitude reasoning is the working physicist's superpower.","exposition":"Order-of-magnitude reasoning — 'roughly how many photons per second from a 60 W bulb?' — is the physicist's working tool. It is more important than the precise calculation it replaces, because it gives you an answer when none is available and a check when one is. Drill it; reward it; use it.","reflection":"Set one order-of-magnitude question for tomorrow's class. 'How many photons per second from a 60 W bulb?' Then check whether anyone can answer."},{"day":253,"date":"10th September","pearl":"Bulbs and LEDs: test stocks at the start of each term. A blown bulb mid-lesson eats five minutes.","exposition":"A bulb that fails mid-demo derails the lesson. Five minutes of testing at the start of term — turning each bulb on, replacing the dead ones — costs the technician an hour and saves many hours over the term. The same applies to batteri
