<script id="pearls-data" type="application/json">
[{"day":1,"date":"1st January","pearl":"Lasers, class 2 or above: signage on the door, key control, defined beam path, terminated beam.","exposition":"Class 2 lasers (≤1 mW) are present in most school physics departments, and their blink-reflex protection is easily defeated by a curious child holding the source still. The four controls — door signage, key control, defined beam path along a bench, terminated beam into a matt absorber — turn a casual demonstration into a defensible one. Make these visible to students, not hidden; the visibility is itself the lesson.","reflection":"When did you last check the laser key was on your person and the warning sign on the door? If you cannot remember, walk the lab now and audit."},{"day":2,"date":"2nd January","pearl":"Tell stories. Galileo on the leaning tower, Newton and the plague year, Faraday and the bookbinder's apprentice — stories make physics human.","exposition":"Galileo dropping balls (probably never literally from the tower), Newton's plague year of miracles, Faraday rising from a bookbinder's bench — these stories work because they connect a face to an equation. Students remember Faraday because they once heard he could not afford university. The story is not a sweetener; it is the encoding that makes the physics stick later, when the equation is the only thing left on the page.","reflection":"Which physicist's story do you tell best, and which one do you tell because you should rather than because you love it? Replace the second with one you actually find moving."},{"day":3,"date":"3rd January","pearl":"Spreadsheets are an experimental tool. Teach SLOPE(), STDEV(), and how to plot a graph from raw data.","exposition":"A spreadsheet is laboratory glassware for the digital age. Students who can write =SLOPE(B2:B11,A2:A11) and =STDEV(C2:C11) are doing physics, not IT. Teach them how to enter raw readings, calculate derived quantities in adjacent columns, and plot with axis labels and units. They will use these skills in any quantitative field. The IT department teaches Excel; you teach what to do with it.","reflection":"Could every student in your top set write a SLOPE() formula by hand? If not, where in the scheme of work does the gap live, and what would close it?"},{"day":4,"date":"4th January","pearl":"Sand bucket for alkali metals and burning magnesium. Water is the wrong answer.","exposition":"Alkali metals and burning magnesium continue to burn under water (or worse, explode when sodium meets it). A sand bucket smothers them. Have the bucket present and visible whenever these materials are out — not in the prep room, not in a cupboard. The act of placing the bucket on the bench is itself a safety message students absorb without instruction.","reflection":"Walk to the prep room: is the sand bucket where you would reach for it under stress, or where it was put when the lab was built?"},{"day":5,"date":"5th January","pearl":"Stock chemicals are not infinite. Replace items that run low and flag rare reagents weeks ahead.","exposition":"The chemistry side of physics — copper sulfate for electrolysis, magnesium ribbon for combustion, iron filings for fields — runs out quietly. The technician spots this; you do not, until the morning of the lesson. Building a weekly habit of glancing at stock levels (or reading the technician's running list) prevents the avoidable disaster of a planned practical that cannot run.","reflection":"Of the chemicals and consumables you used last term, which are you running quietly low on right now? Email the technician before the end of the day."},{"day":6,"date":"6th January","pearl":"Most students will not become physicists. All of them deserve to be taught as if they might.","exposition":"Around 5% of physics students go on to read it at university; far fewer become professional physicists. Teaching only for that minority impoverishes the lesson for everyone. The student who becomes a nurse, an electrician, a teacher, a citizen voting on energy policy — all of them deserve a real physicist's perspective. The selectivity comes later; in your classroom, the door is wide.","reflection":"Think of one student you've half-given-up on. What would tomorrow's lesson look like if you taught it as though they could become a physicist?"},{"day":7,"date":"7th January","pearl":"Loan calculations to the technician for novel set-ups (mass on a rotating arm, current through a coil). They often catch mistakes before pupils get hurt.","exposition":"A teacher might design a novel circuit, a new rotational set-up, or an unusual energy chain, and not realise that the current would blow a fuse or the mass would slip off the rotating arm. Technicians have seen variations of nearly everything. A two-minute calculation check before the practical converts a potential incident into a smooth lesson. Their time invested saves a lot of yours.","reflection":"When did you last hand a calculation to the technician for sanity-checking before a novel practical? If the answer is 'never', that's worth examining."},{"day":8,"date":"8th January","pearl":"Hot plates and Bunsens: 'hot' signs, cool-down routine, never left unattended.","exposition":"Hot apparatus does not announce itself once switched off. A 'hot' card on the bench while cool-down happens prevents the casual hand. A cool-down routine — five minutes before packing, mats stay on, signs stay up — saves burns. Never leave a flame unattended, not even for a quick board-rub: it is precisely the moment when something will tip over.","reflection":"Is there a 'hot' card you can reach in five seconds? If not, make one today. The lesson where you need it will be the lesson you do not."},{"day":9,"date":"9th January","pearl":"Diagram literacy is a skill. Teach how to read a circuit diagram, a free body diagram, a ray diagram, explicitly.","exposition":"Students who fail in physics often fail at the diagram, not the algebra. Circuit symbols, free body diagrams, ray diagrams are visual languages with conventions: arrows mean direction, dotted lines mean construction, and so on. Teaching this literacy directly — five minutes on what each line means — prevents months of confusion later. Do not assume diagrams are self-explanatory; they are dense with convention.","reflection":"Which diagram convention do your students fumble most — circuit symbols, free body arrows, ray diagrams? Plan five minutes of explicit diagram-literacy teaching this fortnight."},{"day":10,"date":"10th January","pearl":"Don't dump leftover practicals on the technician between lessons. Take the trolley back yourself.","exposition":"A trolley of glassware, residual chemicals, and dirty Bunsens left in the lab is a quiet message: 'this is your problem now'. The technician will clear it, but at the cost of trust. Walk the trolley to the prep room yourself. The thirty seconds of effort pays back in a relationship that runs on cooperation rather than resentment.","reflection":"After your next practical, observe yourself: who actually takes the trolley back? If it's never you, change that this week."},{"day":11,"date":"11th January","pearl":"Build in retrieval practice every lesson. Five questions on last week, last month, last term.","exposition":"Memory leaks. The Ebbinghaus forgetting curve is brutal: without retrieval, half of a lesson is gone within a day. Build the start of each lesson around quick recall — last lesson, last week, last term. Mix the time horizons. The questions are short, low-stakes, often unmarked: the act of remembering is the point. You will be astonished by how much sticks.","reflection":"Pick three facts you taught a fortnight ago. Could your class recall them now under pressure? Test it on Monday and listen to the silence."},{"day":12,"date":"12th January","pearl":"Issue and collect: count out, count back, every lesson. Missing items found at issue, not at collection.","exposition":"The 'lost ammeter' is rarely lost; it is in someone's bag or on someone's bench. If you count out the kit at issue and count back at collection, you catch the missing item while the class is still in front of you. Missing items found at issue (a tray of five voltmeters, only four present) save you from an inventory crisis next week.","reflection":"Pick a kit you'll use this week and write the issue/collection count on a sticky note. Count out, count back. Notice how the count changes the lesson's tone."},{"day":13,"date":"13th January","pearl":"Physics is not common sense; it is uncommon sense. Be honest about that on day one.","exposition":"Physics asks students to believe that heavy objects fall at the same rate as light ones, that energy is more fundamental than force, that empty space can ripple. None of this is common sense. Be candid: 'the universe is counterintuitive and we are going to develop your physical intuition deliberately.' Honesty about difficulty gives students permission to struggle, which they need.","reflection":"What did you tell your class on day one about how hard physics would be? Was the message honest? If a student looked at your face during the introduction, what did they read?"},{"day":14,"date":"14th January","pearl":"Past papers are training, not assessment. Mix them in throughout, not just at the end.","exposition":"Past papers used as a once-a-year crisis review teach panic. Used regularly — one or two questions woven into homework — they teach the genre. Students learn what an examiner asks for, how to allocate time, what counts as a six-mark answer. By the time the real exam arrives, the format is invisible to them; only the physics is in their hands.","reflection":"Look at next week's homework. How many of the questions are past-paper items in disguise? Aim for at least one in every set; you'll see the dividend by exam season."},{"day":15,"date":"15th January","pearl":"Ionising radiation lessons happen with film badges and a dosimeter check. Document it.","exposition":"Sealed sources used responsibly are safe, but the documentation is not optional. Film badges or electronic dosimeters worn, sources signed out from the lead pot, recorded times of use, supervised handling with tongs. The paper trail is your protection if something is ever questioned. It also models the regulatory culture of working with radiation, which is real and important.","reflection":"When did you last check the radioactive-source log and the dosimeter calibration? Build the next check into your diary now."},{"day":16,"date":"16th January","pearl":"Mark a small sample deeply, not every book superficially.","exposition":"Marking thirty books superficially yields ticks and 'good work', and tells no one anything. Marking five books in depth — diagnosing the misconception, suggesting the next step, leaving the student something to do — changes those five students' next two weeks. Rotate the sample. Over a term, every student gets a deep mark; over a half-term, every misconception surfaces.","reflection":"Of the books you mark this week, which five will you mark deeply? Pick them now, before the routine sweeps the choice away."},{"day":17,"date":"17th January","pearl":"Never publicly humiliate a student. The lab is small; resentment is large.","exposition":"The lab is a small room and students remember. Public humiliation — a sarcastic comment, a roll of the eyes, mockery of a wrong answer — destroys the trust that makes risk-taking possible. Students who fear ridicule do not ask questions; students who do not ask questions do not learn physics. Critique the work in private; protect the student in public.","reflection":"Recall the last time you used sarcasm or a sharp tone with a struggling student. What did you protect by doing so, and what did you cost?"},{"day":18,"date":"18th January","pearl":"Always ask: \"Is this answer reasonable?\" before \"Is this answer right?\"","exposition":"A common mistake is to write down a calculator output of 4.7×10⁻²³ kg for the mass of a person and not notice. Order-of-magnitude reasonableness is a check that almost no calculator failure survives. Build it as the first question after every numerical answer: 'is this the size of thing we expected?' Sometimes the answer reveals a misplaced decimal, sometimes a profound misconception.","reflection":"After the next calculation lesson, ask three students: 'is that answer reasonable?' How many can justify the answer's order of magnitude rather than just its digits?"},{"day":19,"date":"19th January","pearl":"Never accept \"I don't know\" as a final answer. \"What might it be?\" or \"Where would you start?\"","exposition":"'I don't know' ends the cognitive transaction; 'where would you start?' opens it. The follow-up is not punishment; it is scaffolding. 'What do you know about this kind of problem? What units would the answer be in? What's the smallest case you can solve?' Students who never learn to start without an answer in mind grow into adults who do not begin.","reflection":"Of the students who said 'I don't know' to you last week, how many got a follow-up question? Decide what your reply will be next time before the moment comes."},{"day":20,"date":"20th January","pearl":"Cite the CLEAPSS or local equivalent guidance code on your risk assessment. Technicians can check it instantly.","exposition":"CLEAPSS (or your country's equivalent) is the authority. Citing the relevant code on your risk assessment lets the technician check that you are using the recommended version of the procedure — and lets them flag your design when guidance has been updated. It also protects you institutionally if something goes wrong. The reference is one extra line; the protection is large.","reflection":"Open your most-used risk assessment. Is the CLEAPSS code visible at the top, or buried? If buried, move it."},{"day":21,"date":"21st January","pearl":"The Aristotelian instinct (force causes motion) is in every student. Newton has to be earned, not announced.","exposition":"Aristotle's intuition — that pushing causes moving, ceasing to push causes stopping — describes everyday life accurately because of friction. Newton's first law (inertia) contradicts daily experience. Students often pass the Force Concept Inventory only after months of careful unpicking. Announcing 'F=ma' on day one bypasses the misconception; it does not displace it. Plan for the conceptual battle, not the algebraic substitution.","reflection":"What is the most stubborn Aristotelian belief in your current class — that force causes motion, that mass affects fall rate, that heavier means slower? Plan the demo that confronts it."},{"day":22,"date":"22nd January","pearl":"Teach error analysis from the very first practical, not as an end-of-course chore.","exposition":"Treat the first practical as the first errors lesson. 'How precise is your ruler?' 'What's the smallest change in time you can measure?' 'How would you estimate the uncertainty in this measurement?' Treating uncertainty as essential rather than terminal builds physicists from the outset. The student who first encounters errors in Year 12 is a student who first encounters physics in Year 12.","reflection":"When in this year's scheme does error analysis first appear? If it's after the third practical, you've already taught students that uncertainty is optional."},{"day":23,"date":"23rd January","pearl":"Practical write-ups should follow the structure: aim, prediction, method, results, analysis, evaluation, conclusion. Variation kills clarity.","exposition":"Aim, prediction, method, results, analysis, evaluation, conclusion. The same skeleton across every write-up reduces decision fatigue and exposes the variation that matters: what changed, what was measured, what was inferred. Departments that drift between formats teach students to manage formats; departments that hold to one format teach students to do physics within it.","reflection":"Look at the last three practical write-ups your class produced. Did they follow a single structure, or three? The variation is yours to fix."},{"day":24,"date":"24th January","pearl":"A great question is one that you yourself find interesting to think about.","exposition":"Bored teachers ask bored questions. The interesting question — one with a genuine answer you would like to know, an angle you have not seen, an unsolved feature — is contagious. Students sense when the question is yours rather than from a worksheet. They lean in. Make a habit of asking yourself: would I want to think about this for the next ten minutes?","reflection":"Plan tomorrow's lesson and name the question you yourself find most interesting in it. If there isn't one, you have not finished planning."},{"day":25,"date":"25th January","pearl":"Required practicals deserve more than one go. Skill is built by repetition, not by ticking a box.","exposition":"A required practical is not a checkbox to be ticked once. Skills — measuring with a micrometer, taking a thermistor curve, balancing a beam — are built by repetition. Build the same practical into a different lesson three months later. The same students who fumbled the first time will surprise you with how quickly the second attempt goes. That is the skill, not the box.","reflection":"Of last year's required practicals, which did you teach exactly once? Schedule a return visit for one of them this term."},{"day":26,"date":"26th January","pearl":"Linearise stubborn relationships: log–log for power laws, log-linear for exponentials. Once linear, the gradient tells a story.","exposition":"y = kxⁿ becomes log y = log k + n log x. y = Ae^(kx) becomes ln y = ln A + kx. Once a relationship is linearised, the gradient is the physics: n is the exponent, k is the rate. Students who can linearise have a tool they will use through university and beyond. Drill the algebra until the manoeuvre is automatic.","reflection":"When did you last linearise a non-linear relationship with your students? If it has been months, plan the lesson — the skill rusts fast."},{"day":27,"date":"27th January","pearl":"Stay close to the research front in one area you love. Students see passion, even if they don't see the equations.","exposition":"You cannot know every modern physics development, but you can know one. A teacher who watches LIGO announcements, reads exoplanet papers, follows neutrino physics — their lessons carry the voltage of someone who is genuinely curious. Pick the area you love; let the enthusiasm be visible. Students do not need the equations to feel the difference.","reflection":"Which contemporary area of physics excites you, and have your students heard you say so this term? Mention it on Monday."},{"day":28,"date":"28th January","pearl":"Differentiate by question, not by worksheet. The same problem can hold easy and hard within it.","exposition":"The same question — 'a ball is thrown at 15 m s⁻¹ at 30° to the horizontal; find the range' — can be answered numerically by some students and extended into 'why is 45° the optimal angle on flat ground?' by others. Differentiate within the task, not by giving easier tasks to weaker students. Ceiling-raising helps everyone; floor-lowering helps no one.","reflection":"Look at next week's tasks: do the harder questions live inside the same problem, or only at the end on a separate sheet? Restructure one."},{"day":29,"date":"29th January","pearl":"Never write 'see me' on a book without a date. Float dates die.","exposition":"'See me' without a date floats in the marker's intent and sinks in the student's memory. 'See me by Friday' is actionable. The student knows when, you know when, and the conversation actually happens. Floating expectations are not expectations; they are wishes.","reflection":"Skim your last marked set of books. How many 'see me' notes are without dates? Resolve to date every one from now on."},{"day":30,"date":"30th January","pearl":"Goggles for the teacher too. You model what you tolerate.","exposition":"The teacher who goggles up at the front signals that goggles are part of the work. The teacher who does not signals that goggles are for students. You are the model for what professional practice looks like in this room. The students who watch you most are not the loud ones; they are the future technicians and researchers absorbing the norms.","reflection":"In your last practical lesson, were your own goggles on? If not, you taught a more powerful lesson about goggles than any words could."},{"day":31,"date":"31st January","pearl":"Report breakages immediately and in writing, not at the end of term in a heap.","exposition":"A broken or chipped piece of glassware is a future accident if left in circulation. Written reports — slip, email, dedicated log — leave a trail the technician can act on. Verbal reports drift. End-of-term avalanches of breakage forms are worse than nothing, because no one can repair the term that has passed.","reflection":"When did you last walk through the prep room counting chipped or cracked glassware? Do it this week and report it in writing."},{"day":32,"date":"1st February","pearl":"Don't plan lessons; plan learning. They are not the same.","exposition":"A lesson plan describes what you will do. A learning plan describes what changes inside the students' heads. The difference is in the verb: 'students will' rather than 'I will'. A lesson can run perfectly and produce no learning; a slightly chaotic lesson can produce a great deal. Plan for the second.","reflection":"Read your last lesson plan. Are the verbs about you or about the students? If they are about you, rewrite three of them."},{"day":33,"date":"2nd February","pearl":"Mains electricity demos: residual current device, isolation switch, signage. No exceptions.","exposition":"Mains demonstrations — electromagnetic induction at full voltage, large transformers, mains-rated motors — require defence in depth. Residual current devices trip in milliseconds, isolation switches give a definitive off, signage warns the curious. None of these are optional; their cost is small and their value is your career and a student's life.","reflection":"If you teach mains demos, name the location of your RCD and isolation switch. If you hesitated, find them now."},{"day":34,"date":"3rd February","pearl":"Use 'one minute papers' at the end of lessons: 'what stuck, what's stuck?' Read them; act on them.","exposition":"'What stuck?' tells you what is being retained. 'What's stuck?' tells you where the lesson failed. Three minutes of writing on a slip at the end of a lesson, collected at the door, gives you a richer diagnosis than a half-term test. The condition is that you read them and respond, even briefly, the next lesson. Otherwise they are theatre.","reflection":"Try a one-minute paper at the end of tomorrow's lesson: 'what stuck, what's stuck?' Decide now what you'll do with the answers."},{"day":35,"date":"4th February","pearl":"Mark the anniversaries: Newton's birthday, the first Moon landing, the discovery of the Higgs. A small board display each week ties physics to time.","exposition":"On Tycho Brahe's birthday, a quick mention of his Uraniborg observatory; on Newton's, the apple story and its limits. The board display turns history into rhythm. Students realise physics is something humans have been doing for millennia and are still doing today. The display takes ten minutes a week and reshapes how they relate to the subject.","reflection":"What anniversary does this week mark in physics history? Find one and build a five-minute board display around it."},{"day":36,"date":"5th February","pearl":"Lock the lab when unsupervised, even for two minutes. \"Two minutes\" is when accidents happen.","exposition":"Two minutes to grab a folder. Two minutes to take a call. Two minutes is exactly enough for a student to try the Van de Graaff, or pour something interesting into something else. Lock the door whenever the room is unsupervised. The annoyance is small; the avoided incident is invisible but real.","reflection":"When you step out of the lab — to fetch printouts, to take a call — do you lock the door? If sometimes, that is the same as never."},{"day":37,"date":"6th February","pearl":"If the graph isn't a straight line, can you linearise? Teach this manoeuvre relentlessly.","exposition":"Most physics relationships are non-linear, but most teaching tools (graph paper, gradient extraction, eye estimates) work best on lines. Linearising is the bridge. T² against L for a pendulum gives a line whose gradient is 4π²/g. Drill this until students reach for it whenever they see a curve. It is one of the most powerful manoeuvres in school physics.","reflection":"Take your most recent practical with a curved relationship. Could your students linearise it without help? If not, plan the bridge."},{"day":38,"date":"7th February","pearl":"Interleave topics. A pure mechanics block followed by a pure electricity block produces fragile knowledge.","exposition":"Six weeks of mechanics, then six weeks of electricity, creates students who can recall mechanics for the mechanics exam and electricity for the electricity exam. Interleave — a few mechanics questions in the electricity homework, vice versa — and you build durable knowledge. The teaching feels less neat; the learning is stronger. Trust the evidence over your aesthetic.","reflection":"Look at the next half-term's planning. Is mechanics in one block and electricity in another? Interleave one topic into the other this week."},{"day":39,"date":"8th February","pearl":"Worked examples reduce cognitive load. Use them generously before independent practice.","exposition":"A worked example shows the goal, the chosen tools, the order of moves, the form of the answer. It frees working memory to focus on understanding. After two or three, fade the support: leave gaps for students to fill, then remove the example entirely. Cognitive load research is one of the few areas where the lab and the classroom agree decisively.","reflection":"When did you last walk students through a fully worked example before independent practice? Plan one for the next hard topic."},{"day":40,"date":"9th February","pearl":"Echoing a student's correct answer robs them of authority. Let it land.","exposition":"If you repeat the student's correct answer to the class, you have just told everyone whose answer counts. The student who answered fades; the teacher's voice is the one that 'really' said it. Let the answer stand. 'Tell us how you saw that' transfers authority back to the student and to the reasoning, not to your validation.","reflection":"After tomorrow's lesson, listen for yourself echoing a correct answer back. Catch it once; resist it the next time."},{"day":41,"date":"10th February","pearl":"Every drawer labelled. Every label legible from a metre away.","exposition":"Every drawer labelled, every label legible from a metre away. The shelf with eleven coils on it should have eleven labels. Students self-serve faster, technicians find things faster, supply teachers can fill in. The labour of labelling is a one-off; the labour of every missed item, every wrong fetched piece, repeats forever.","reflection":"Walk to the prep room and read a label from a metre away. How many drawers passed the test? Plan the relabelling for what didn't."},{"day":42,"date":"11th February","pearl":"Backup. Then back up the backup. Cloud and local. Lost data is lost lessons.","exposition":"PowerPoints lost the morning of the lesson are a special form of suffering. Use the cloud (school OneDrive, Google Drive) for instant remote access. Keep a local copy on a USB stick or external drive in case the network drops. The combination — cloud and local — survives almost every failure mode. Test the restore once a year.","reflection":"Where is your last week's lesson — cloud, local drive, both? Test one restore now, before you need it under pressure."},{"day":43,"date":"12th February","pearl":"Address gender imbalance in physics from day one. Pictures of women physicists, examples from women's research, women's names in problem texts.","exposition":"Posters of women physicists on the wall, examples drawn from women's research in the questions, names like Marie Curie and Vera Rubin and Lise Meitner in the problem texts. The signal is unmistakable: this room is for you. Boys read these signals too; the message that physics is a male preserve harms them and the discipline. Tackle it from day one.","reflection":"Look at the photographs and posters in your lab. Whose faces are on the walls? Whose are missing?"},{"day":44,"date":"13th February","pearl":"Multiple-choice tests are not lazy. They diagnose misconceptions faster than long-answer questions.","exposition":"A well-written multiple-choice question — with distractors that map to common misconceptions — diagnoses understanding faster than any long-form question. If most of a class chooses option C when the answer is B, you know exactly which misconception to address. Don't dismiss multiple-choice as lazy; the laziness is in the question writing, not the format.","reflection":"Write three multiple-choice questions for your next topic. Make each distractor a real misconception you've heard. Then teach by what they reveal."},{"day":45,"date":"14th February","pearl":"An untidy lab is an unsafe lab. Tidiness is not aesthetic; it is safety.","exposition":"Clutter is friction. A bench piled with the previous class's wires is a bench where this class will not work safely. Tidy at issue, tidy at collection, tidy at the end of the day. Tidiness in a lab is not about aesthetics; it is about being able to find the fire extinguisher and the eyewash bottle without thinking.","reflection":"Walk into your lab as a student would. What is the first thing that looks unsafe? Tidy it today, not next term."},{"day":46,"date":"15th February","pearl":"Always have a 'plan B' demo if the first one fails. Apparatus does not respect lesson plans.","exposition":"Demonstrations fail. The bell jar gasket leaks; the high-voltage power supply trips; the Van de Graaff sweats out in humid weather. Have a back-up demo (or a video) ready. The lesson is not the apparatus; the lesson is the physics. Adapting on the spot also models, importantly, what scientists actually do.","reflection":"What is your plan-B demo for tomorrow's lesson? If you haven't named one, the apparatus has not heard your plan."},{"day":47,"date":"16th February","pearl":"Make the consequence of a broken rule clear before the rule is broken, not after.","exposition":"The first time a student is reprimanded for an action, they should already have known the rule. Pre-empting — 'when we use the laser, no one walks past the bench while it's on' — sets the expectation before it is violated. Rules announced retroactively feel unfair. Rules announced prospectively feel like care.","reflection":"What rule are your students most likely to break in the next practical? Brief them on its consequence before the practical begins."},{"day":48,"date":"17th February","pearl":"Have a quiet word at the end of the lesson, not a loud one during. The audience changes the response.","exposition":"A loud telling-off in front of the class triggers face-saving behaviour; the student doubles down rather than backing down. A quiet word at the door at the end of the lesson, away from the audience, lets the student climb down without losing standing. The behaviour is more likely to change because the conversation is between you and them, not between you and the room.","reflection":"Replay a recent confrontation with a student. Was it loud and public, or quiet and private? Choose the second next time."},{"day":49,"date":"18th February","pearl":"Praise the reasoning, not the result. \"I love how you noticed the symmetry first.\"","exposition":"'Well done, you got the right answer' privileges the destination. 'Well done, you noticed the symmetry of the problem before reaching for the algebra' privileges the route. Students start to imitate routes. Over time, the class develops habits of seeing — symmetry, limit cases, dimensional checks — that pay off long after the specific problem is forgotten.","reflection":"What was the last specific piece of praise you gave for reasoning rather than for a right answer? If you struggle to remember, plan one for tomorrow."},{"day":50,"date":"19th February","pearl":"Pregnant staff and students: confer with the health officer for any chemistry, radiation, or strenuous-apparatus tasks.","exposition":"Some chemistry, some radiation work, some strenuous lifting or apparatus carries non-trivial risk during pregnancy. The health officer (or HR's medical advisor) has the right protocols. Confer early, not at the moment of the lesson. The conversation is straightforward when planned; embarrassing and pressured when improvised.","reflection":"Do you know whether any staff or student in your lab this term needs special arrangements for pregnancy, chemistry, or radiation? Check before the lesson, not during it."},{"day":51,"date":"20th February","pearl":"The rope-and-water analogy for current is useful — until it isn't. Teach the limits explicitly.","exposition":"Water flowing in a pipe to represent current works for series circuits, dries up for parallel, and is misleading for emf as a 'push'. Use the analogy where it works; tell students explicitly where it does not. Students whose mental model breaks silently end up wrong without knowing why. Students whose model breaks loudly know to use another tool.","reflection":"Pick an analogy you use weekly. Where does it break down? Tell your class this week, before the analogy traps them."},{"day":52,"date":"21st February","pearl":"Six-mark questions need a structure. Teach one: claim, evidence, reasoning, exception. Drill it.","exposition":"Six-mark questions are the most marks-per-paper, and students consistently fumble them by writing everything they know. Teach them a structure — claim, evidence, reasoning, exception — and drill it. They are not poetry; they are organised technical writing. Once the structure is internalised, the marks follow.","reflection":"Show your class one of their recent six-mark answers anonymised. Did it have a structure, or was it everything-they-knew? Teach the structure they lacked."},{"day":53,"date":"22nd February","pearl":"Physics has a vocabulary problem, not a difficulty problem. Teach the words explicitly.","exposition":"'Resolve a vector into components' uses three words students may not know. 'Determine the wavelength' is similarly opaque. Pre-teach the vocabulary explicitly: 'resolve', 'derive', 'estimate', 'comment'. Without this, students may understand the physics and still fail the question. The vocabulary is part of the physics for our purposes.","reflection":"List five Tier 3 words from next week's topic. Will you teach them explicitly, or assume students absorb them? Choose deliberately."},{"day":54,"date":"23rd February","pearl":"Encourage estimation drills. \"How heavy is your school bag in newtons?\" \"How many seconds in a year?\" These build physical sense.","exposition":"A student who knows their school bag weighs roughly 30 N is a student with physical intuition. Build the habit with daily one-minute estimations: 'how many joules to lift a litre of milk one metre?' 'How much current in a phone charger?' Estimation is the working physicist's superpower; it tells you when an answer is wrong before checking the algebra.","reflection":"How heavy is your school bag in newtons? Estimate before lifting; check by weighing. Build the habit you want students to build."},{"day":55,"date":"24th February","pearl":"Hands-down questioning involves everyone. Hands-up questioning involves the keenest five.","exposition":"Hands-up rewards the keen and the quick. Most of the class watches. Hands-down — name calls, lollipop sticks, random selection — distributes the cognitive load across the room. Every student has to be ready to answer, so every student thinks. Use it most of the time; reserve hands-up for genuine choice.","reflection":"Run tomorrow's questioning with hands-down for the first ten minutes. Notice who speaks who would not have."},{"day":56,"date":"25th February","pearl":"Cables: bundled by length and type, hung on hooks. A coiled wire takes one second to grab, a tangle takes a minute.","exposition":"A coiled cable, hung on a hook by length and labelled, takes one second to collect. A tangle of three cables in a drawer takes a minute to disentangle. Multiply by every group, every practical, every year. The labour of the original sorting pays for itself within weeks.","reflection":"Are your cables coiled by length on hooks, or in a drawer? The answer reveals how lessons will start this week."},{"day":57,"date":"26th February","pearl":"Colour-blindness matters in physics. Avoid red/green for current/voltage on the same diagram. Use shape or label too.","exposition":"About 8% of boys and 0.5% of girls have some form of red-green colour blindness. A circuit diagram with red for current and green for voltage is unreadable for one student in a typical class of thirty. Use shape, texture, label — not just colour. The principle is broader than colour blindness; it is good design.","reflection":"Look at a circuit diagram you'll use this week. Could a colour-blind student read it as you've drawn it? Add shape or label to the lines that depend on colour alone."},{"day":58,"date":"27th February","pearl":"Teach students to film demos for their own notes. A 10-second clip beats a paragraph of recall.","exposition":"A demo seen once and forgotten is a demo wasted. Encouraging students to film it (with phones, on a clear policy) means they can replay it during revision. The 'cathode ray tube deflection in a magnetic field' is two minutes of magic that becomes a study tool. It also engages students who learn better visually.","reflection":"Allow phones for filming the next demo. Note who chooses to film, and ask them later what they did with the clip."},{"day":59,"date":"28th February","pearl":"Resistance wires: pre-cut into labelled lengths. Saves five minutes per practical, multiplied by every group.","exposition":"If twenty groups each need 30 cm of constantan, that is a teacher with scissors during a lesson, or a technician with a guillotine the previous day. The technician's path is faster, neater, and lets the lesson start on time. Specify pre-cut lengths in your prep request; the saving compounds across every required practical.","reflection":"Are the resistance wires for your next practical pre-cut to labelled lengths? If not, ask the technician — and watch the lesson run faster."},{"day":60,"date":"1st March","pearl":"Your technician is your most important colleague. Learn their name, their working hours, and their preferences in the first week.","exposition":"The technician will know things about the department's kit you will never know. They will catch your mistakes. They will save your lessons. Treat them as a senior colleague from day one: greet them by name, learn their schedule, ask their preferences for prep requests. The investment pays back ten times over the course of a career.","reflection":"Write down your technician's name, hours, and one preference (how they like prep requests). If you cannot fill all three, fix that this week."},{"day":61,"date":"2nd March","pearl":"If a former student comes back to visit, drop everything and welcome them. The visit means more than the lesson you were planning.","exposition":"A former student in the doorway is the rarest gift in teaching. The lesson you were about to deliver can wait two minutes. Welcome them, ask what they are doing now, introduce them to the class — 'this is Aisha; she sat where you're sitting five years ago, now she's reading engineering at Bristol.' The lesson it teaches is irreplaceable.","reflection":"Imagine a former student walking into your lab tomorrow. What would you drop, and what would you make them watch? Plan to drop more than you think."},{"day":62,"date":"3rd March","pearl":"The prep room is not a storeroom for unwanted gifts from retired colleagues. Audit, retain or recycle.","exposition":"Retired colleagues leave odd kit — half-built Tesla coils, eccentric power supplies, mysterious sealed boxes. Take a day each year to audit. Keep the useful; recycle or dispose of the rest properly. A prep room overstocked with obsolete equipment is a prep room where the technician cannot find what is needed today.","reflection":"Open the prep room cupboards. Is there a half-built apparatus from a colleague who left three years ago? Audit, decide, act."},{"day":63,"date":"4th March","pearl":"If you don't know what something is, ask the technician before deciding whether it's junk.","exposition":"The unfamiliar object on the shelf might be a redundant relic or an irreplaceable specialist piece. Ask before you judge. The cost of asking is small; the cost of having thrown away a unique demonstration apparatus is permanent.","reflection":"When did you last almost throw something away and instead ask the technician what it was? If you cannot remember, the technician's expertise is under-used."},{"day":64,"date":"5th March","pearl":"The Van de Graaff is unforgiving. Discharge it carefully, ground yourself, and warn anyone with a pacemaker.","exposition":"Van de Graaff generators store hundreds of kilovolts and discharge through bodies that touch them carelessly. Discharge with an earthed conductor (not a finger), ground yourself, and brief in advance: anyone with a pacemaker or active electronic implant stays well clear. The demo is spectacular precisely because the voltages are real.","reflection":"Before your next Van de Graaff demo, rehearse: discharge tool ready, students briefed, anyone with implants warned. Write the checklist into the lesson plan."},{"day":65,"date":"6th March","pearl":"Display the lesson's question on the board for the whole lesson. Visible focus retains focus.","exposition":"A visible lesson question — 'today we are answering: why does a satellite not fall to Earth?' — frames every activity that follows. Students returning from a side conversation can rejoin the lesson by looking up. The question stays on the board, gets answered (or partially answered) by the end, and connects to the next lesson. Cognitive anchoring matters.","reflection":"Will tomorrow's lesson have a single visible question on the board for the whole hour? Write it now in a sentence."},{"day":66,"date":"7th March","pearl":"If you've never used a piece of apparatus before, ask the technician for a five-minute tutorial before the lesson, not during.","exposition":"The five minutes you spend in the prep room learning how the thermal lance works are five minutes that save you from improvising in front of thirty students. Technicians enjoy these conversations; they would much rather teach you in advance than rescue you mid-lesson. Ask in writing or in person, not during the lesson itself.","reflection":"What piece of apparatus will you next use that you've never set up before? Book a five-minute slot with the technician this week."},{"day":67,"date":"8th March","pearl":"Make the homework an extension of the lesson, not a punishment for it.","exposition":"Homework as 'finish what we didn't' tells students that classwork is the punishment and home is for finishing it. Homework as 'an extension of today's idea into a new context' tells them they are doing physics for its own sake. A short, focused, intrinsically interesting homework beats a long, dull one every time.","reflection":"Look at the homework you set last week. Was it 'finish what we didn't' or a deliberate extension? Be honest, then redesign."},{"day":68,"date":"9th March","pearl":"Sequence by conceptual difficulty, not by chapter order. Textbooks are catalogues, not curricula.","exposition":"Textbooks are organised for breadth and reference, not for learning order. The chapter on magnetism may presume current, but the chapter on current may presume circuits. Sequence by conceptual prerequisites, not by chapter numbers. The textbook becomes a resource your scheme uses, not a script your scheme follows.","reflection":"Take your textbook's chapter order. Now sketch what you'd teach first based on conceptual prerequisites alone. Where do they differ?"},{"day":69,"date":"10th March","pearl":"Use the school's official prep request form, every time, even for one ruler. Verbal requests get lost.","exposition":"Verbal requests vanish. The technician hears 'a few power supplies' and you remember 'thirty power supplies of 12 V, current-limited'. The discrepancy reveals itself the morning of the lesson. The official form is annoying for routine asks, but it eliminates the worst category of miscommunication. Use it consistently and everyone wins.","reflection":"Are your prep requests in writing, even for small items? If you wing it for 'small' asks, you've discovered where things go missing."},{"day":70,"date":"11th March","pearl":"Specify quantities, concentrations, voltages, and quantities-per-group explicitly. \"A class set\" is ambiguous.","exposition":"'Some' is meaningless. 'A class set' is meaningless. 'Fifteen 100 cm³ beakers, six pairs of insulated wires of 50 cm each, three Bunsens per bench' is meaningful. The technician can fulfil meaningful requests. Specifying numbers makes prep efficient and removes the worst source of pre-lesson stress: under-provisioning.","reflection":"Look at your last prep request. Did 'some' or 'a few' appear anywhere? Replace it with a number this week."},{"day":71,"date":"12th March","pearl":"Error bars on every plot. Even rough ones. Especially rough ones.","exposition":"Error bars convert a graph from a picture to a measurement. They tell the reader: this is what we know; this is what we don't. Even rough error bars (half the smallest division) are infinitely better than none. The skill is built by repetition: start with crude estimates in Year 7 and refine through the course.","reflection":"Look at the last graph in your students' books. Were there error bars, even rough? If not, that is the next habit to build."},{"day":72,"date":"13th March","pearl":"Defuse before you confront. Move closer, lower your voice, get curious.","exposition":"The instinct in a confrontation is to face up: louder voice, taller stance, sharper words. The reality is that defusing — moving closer, lowering the voice, asking a question — works far more often. A student who feels heard responds better than a student who feels threatened. The technique takes practice; the dividends are large.","reflection":"Recall a recent confrontation. Did you move closer or step back? Did your voice go up or down? Practise the opposite next time and notice the difference."},{"day":73,"date":"14th March","pearl":"Make the invisible visible. Field lines, forces, currents — draw them on the board even when the diagram already exists in the book.","exposition":"Field lines are invisible until drawn; forces are invisible until labelled; currents are invisible until indicated. Even when a diagram exists in the book, drawing it on the board models the act of making the invisible visible. Students start to do it themselves: drawing what they cannot see is half of physics.","reflection":"In tomorrow's lesson, what will you draw on the board that the textbook already shows? The act of drawing teaches something the print cannot."},{"day":74,"date":"15th March","pearl":"Hazard symbols on every chemical container. If a label has faded, relabel before it bites you.","exposition":"Hazard symbols are easy to ignore until you cannot read them. A faded label on a bottle is a future incident. Relabelling is a five-minute job that saves a real risk. Build a termly inspection into the routine; the technician usually leads on this but a teacher's eye is welcome backup.","reflection":"Walk the chemical shelf. Are any labels faded? Any symbols missing? Relabel one bottle before the day is out."},{"day":75,"date":"16th March","pearl":"Email is not the job. The classroom is the job.","exposition":"Emails breed. By the time you sit at your desk, twenty have arrived; by the time you finish, the next twenty are queued. Email is administration; teaching is the job. Triage ruthlessly, batch responses, protect your planning time. A teacher whose attention is in their inbox is a teacher whose attention is not in the lab.","reflection":"How many emails did you reply to during last week's break? What lesson planning did not happen because of them?"},{"day":76,"date":"17th March","pearl":"Power supplies labelled with max voltage and current in large print. Students do not read the small print.","exposition":"Labelling power supplies with their maximum output prevents the slow-motion disaster of a student dialling up the voltage without realising. Large, legible labels — printed not handwritten, taped not Blu-tacked — survive years of use. Students may not read them carefully; they will read them peripherally, which is enough.","reflection":"Walk to a power supply and read its label from where students stand. Can you see the max voltage and current? If not, the technician wants to know."},{"day":77,"date":"18th March","pearl":"Anticipate the three most likely wrong answers and have responses ready.","exposition":"If you have spent any time teaching a concept, you know the three or four most common wrong answers. Pre-thinking your response means the answer 'velocity is the same as speed' triggers a prepared sequence, not improvisation. The lesson runs faster, the student gets a better explanation, and you do not have to think on your feet about something you have answered fifty times before.","reflection":"For your next hard topic, list the three most common wrong answers. Prepare your response to each before the lesson, not during."},{"day":78,"date":"19th March","pearl":"Tell the story of how concepts were named. \"Electron\", \"quark\", \"black hole\" — the names have histories.","exposition":"'Electron' from Greek for amber, 'quark' from Joyce's Finnegans Wake, 'black hole' coined by Wheeler in 1967. The names have stories. Each story humanises physics — and lodges the term in memory more securely than a definition. Make a habit of pausing on the first occurrence of every new technical word.","reflection":"Tell your class the etymology of one technical word in tomorrow's lesson. Watch which ones lodge it in memory by Friday."},{"day":79,"date":"20th March","pearl":"Quiz at the start of every lesson on last lesson's content. Five questions, two minutes, marks not collected. Retrieval matters more than recording.","exposition":"Five questions at the start. Two minutes. The answers go on a mini-whiteboard, are checked in pairs, and are not collected. The act of trying to remember is what builds memory; the act of being right is secondary. Students who experience daily recall develop a confidence that the content is theirs, not the textbook's.","reflection":"Will tomorrow's lesson start with five questions on last lesson's content? Write them now."},{"day":80,"date":"21st March","pearl":"Walk-around route: have a planned circuit of the lab and stick to it. Every group sees you every five minutes.","exposition":"A planned circuit — back left to back right, down the side, around the front, up the centre — means every group sees you every few minutes. Random meandering means you spend most of the lesson with the keen group and never reach the disengaged one in the corner. Plan the route as carefully as the practical.","reflection":"Sketch the route you walk through the lab during a practical. Does every group sit on the route? If not, redraw it."},{"day":81,"date":"22nd March","pearl":"If you arrive in a department and the technician seems guarded, assume previous teachers earned that. Earn back the trust.","exposition":"Trust is built slowly and broken quickly. A new teacher inheriting a guarded technician should assume good reason. Earn back the trust: prep requests on time, kit returned clean, thanks delivered, listening done. After a term, the relationship is usually warmer than it started. Years of warmth follow.","reflection":"Has your relationship with the technician improved this term, stayed the same, or cooled? Be honest. If cooled, what is one repair you can make this week?"},{"day":82,"date":"23rd March","pearl":"Probability and statistics deserve airtime in physics, especially in quantum and thermal contexts.","exposition":"Probability is foundational in physics: the Maxwell-Boltzmann distribution, half-lives, quantum amplitudes squared. Yet it is often outsourced to maths colleagues. A few well-placed lessons — what is a half-life, statistically? what does standard deviation mean for a measurement? — pay off across the whole course.","reflection":"When do students next meet probability in your scheme of work? If never, you have outsourced part of physics to the maths department."},{"day":83,"date":"24th March","pearl":"The thermal lance, the spinning bicycle wheel, the singing rod — own these set pieces. Make them yours.","exposition":"Some demos are set pieces: practised, polished, story-equipped. The thermal lance through a roof tile, the spinning bicycle wheel rotating the demonstrator on a turntable, the singing rod under longitudinal stress. Make them yours by practising until the timing is dramatic. These are the demos students remember decades later.","reflection":"Name your three set-piece demos. Could you do them tomorrow with the timing of a performer? If not, rehearse the first one."},{"day":84,"date":"25th March","pearl":"Highlight ethics as part of physics. The Manhattan Project, the use of radioactive tracers, dual-use research. Physicists are citizens.","exposition":"Physics is not ethically neutral. The bombs, the surveillance, the climate, the dual-use research — physicists make choices, and have to live with them. Discussing this in class teaches students that scientists are citizens with responsibilities. The lesson on radioactivity that omits Hiroshima is incomplete.","reflection":"Which ethical question in physics does your scheme of work avoid? Build it into the next opportunity rather than leaving it for someone else."},{"day":85,"date":"26th March","pearl":"Subject knowledge is finite. Top it up annually. The Institute of Physics, the ASE, and free MOOCs are gold.","exposition":"What you learned at university about physics in 2010 is partially obsolete by 2030. New experiments, new exoplanets, new constraints on dark matter, new techniques in quantum technology. The Institute of Physics, the Association for Science Education, free MOOCs from MIT and edX — keep the input flowing. One paper or one course per year is enough.","reflection":"Name one professional development input you've had this year. If you have to think, schedule one for this term — a paper, a webinar, a meeting."},{"day":86,"date":"27th March","pearl":"When a student says \"I get it,\" ask them to explain it to the next student. Then you'll know.","exposition":"'I get it' is a feeling, not a state. The student who says it confidently may not be able to explain it. Asking them to teach the next student is a diagnostic: if they cannot explain, they do not know. The asking is also pedagogically valuable for the asker, who consolidates the idea by externalising it.","reflection":"Next time a student says 'I get it', ask them to explain to a neighbour. Notice how often 'I get it' survives translation."},{"day":87,"date":"28th March","pearl":"Analogies are loans you have to repay. Always tell students where the analogy breaks down.","exposition":"The marble-on-a-rubber-sheet analogy for gravity is brilliant — and breaks down because the marble curves the sheet because gravity pulls it down, which is the thing you are trying to explain. Always say so. Analogies are loans. Acknowledging the debt at the start lets students use the analogy without being trapped by it later.","reflection":"Pick your favourite analogy. Tell tomorrow's class where it breaks down — before they discover it themselves."},{"day":88,"date":"29th March","pearl":"Use \"Convince me\" more than \"Show me.\" It demands reasoning.","exposition":"'Show me you understand' invites recitation. 'Convince me' invites reasoning. The shift in language pushes students from retrieving facts to constructing arguments. They have to anticipate your objections, support claims with evidence, handle exceptions. These are the skills the exam wants too, even if the wording is not as direct.","reflection":"In tomorrow's lesson, replace 'show me you understand' with 'convince me'. Notice which students reach for evidence and which retreat."},{"day":89,"date":"30th March","pearl":"Magnets stored with keepers in place. Otherwise they demagnetise — slowly and expensively.","exposition":"A permanent magnet stored without its iron keeper slowly loses field strength. Over a year, a kit can degrade significantly. Keepers in place during storage, magnets paired by polarity, ferromagnetic small items kept clear. The kit lasts longer; the demos remain reliable.","reflection":"Walk to your magnet store. Are keepers in place? If not, your magnets are losing strength while you teach."},{"day":90,"date":"31st March","pearl":"Multiple-choice questions are diagnostic gold if the distractors are written to expose misconceptions.","exposition":"If your distractors are randomly wrong, multiple-choice tests recall. If your distractors are systematically wrong — built around documented misconceptions — multiple-choice tests diagnose. 'Two thirds of the class chose A; A is the impetus misconception' is information you can act on. Write the distractors with the same care as the correct answer.","reflection":"Look at your last multiple-choice quiz. Were the wrong answers random, or were they carefully chosen misconceptions? If random, your distractors are wasted."},{"day":91,"date":"1st April","pearl":"Radioactive sources: log in and log out, lead pot in lead drawer, no source left unsupervised, ever.","exposition":"Radioactive sources are some of the most regulated items in a school. Log in, log out, sealed pot, lead drawer, supervised handling throughout. Never let a source leave the lab without your direct observation; never leave one on a bench during the break. The protocols are not bureaucracy; they are the reason schools are still trusted with sources.","reflection":"Are your sources logged in and out for every lesson, every time? If the log has gaps, you have a documentation problem before you have a safety problem."},{"day":92,"date":"2nd April","pearl":"Spreadsheets predate the calculator in physics teaching. A live-updating graph as students change a variable is more illuminating than a hundred static plots.","exposition":"A spreadsheet with a live graph that updates as students change a single cell is a microcosm of theoretical physics: change a parameter, see what happens. The pendulum's period as L varies, the resistance of a wire as ρ changes — these become tactile. Build a few of these as departmental resources; reuse them every year.","reflection":"Build a spreadsheet for tomorrow's lesson where one cell controls a plot. Notice how the same idea becomes tactile rather than abstract."},{"day":93,"date":"3rd April","pearl":"Build relationships with the local university physics department. Outreach officers love to talk to schools.","exposition":"Universities are usually delighted to host school visits, send outreach officers, or accept queries from teachers. The relationship benefits everyone: schools get expertise and inspiration, universities get future students who are well prepared. Email the outreach officer of your nearest physics department this term. The reply will usually surprise you with its enthusiasm.","reflection":"When did you last email a university outreach officer? Pick one this week and write — the reply will surprise you."},{"day":94,"date":"4th April","pearl":"Anything above 50 V dc or 30 V ac is mains-relevant. Treat it accordingly.","exposition":"The 50/30 V threshold is the line below which mains rules generally do not apply. Above it, you are working with potentially lethal voltages. Treat such circuits as you would mains: isolation, signage, no student access to terminals while live. The threshold matters; teach it explicitly.","reflection":"Of the demos you ran last term, which crossed the 50 V threshold? Were they treated as live circuits, or as routine? Audit and adjust."},{"day":95,"date":"5th April","pearl":"Unit analysis is a check on the algebra. Make it routine.","exposition":"If your equation gives kg·m·s⁻¹ for an energy, your equation is wrong. Unit checking catches errors that algebra alone misses. Make it routine: every equation written, every line of working, every final answer. Build it from the first practical so it is automatic by the exam, when nervous students will skip it without the habit.","reflection":"In tomorrow's worked example, check the units on every line — visibly, in front of the class. Make the habit observable, not internal."},{"day":96,"date":"6th April","pearl":"Cold-call kindly. It signals \"I think you can\" not \"I caught you out.\"","exposition":"Cold-calling — naming a student who has not volunteered — can feel like an ambush or an opportunity, depending on tone. 'Aisha, what would you measure first?' with a warm voice and genuine interest is invitational. The same words barked are punitive. The technique is invaluable; the tone is everything.","reflection":"Try a cold-call tomorrow with the warmest voice you can manage. Notice the difference in the student's response."},{"day":97,"date":"7th April","pearl":"Eyewash station tested termly. If you cannot remember the last test, test it.","exposition":"An eyewash station that has not been tested in a year may not work when needed. Termly testing — a quick rinse to confirm flow and clear water — is one of those small disciplines that protects against the rare catastrophe. If the technician does this, thank them; if not, schedule it yourself.","reflection":"When was your eyewash station last tested? If the answer requires guessing, test it before the next practical."},{"day":98,"date":"8th April","pearl":"Every cohort is its own ecosystem. The lesson that triumphed last year may sink this year. Adjust without nostalgia.","exposition":"The 'amazing' lesson on Tuesday with Class 9A may flop on Wednesday with Class 9B. The reasons are rarely about you. Group dynamics, prior lessons, time of day, what happened at lunch — all matter. Have a planned variant for each lesson, and read the room before deploying it. Resilience, not nostalgia, is the response to a flopping lesson.","reflection":"What lesson worked brilliantly with one class last week and underperformed with another? What was different about the rooms, the moods, the prior lessons?"},{"day":99,"date":"9th April","pearl":"Repeat readings are not optional. Three minimum, more where uncertainty is high.","exposition":"A single reading is a guess. Three readings is a measurement. Five readings give you a meaningful standard deviation. Where uncertainty is high (timing a pendulum by hand, judging a colour change), the number of repeats has to rise. Students who learn this in Year 7 internalise it; those who first meet it at A-level often resist.","reflection":"Look at the last practical results. Were three or more readings standard, or did 'one is enough' creep in? Reinforce the norm tomorrow."},{"day":100,"date":"10th April","pearl":"Frame of reference is a question, not an assumption. Make students declare it.","exposition":"The Earth is moving, the lab is moving, the bench is moving relative to a galaxy moving relative to other galaxies. Frame of reference must be declared before any kinematic statement. 'The ball travels at 5 m s⁻¹ relative to the ground' is precise; 'the ball travels at 5 m s⁻¹' is incomplete. Build the habit early; teach Einstein later.","reflection":"When did you last hear a student make a velocity claim without specifying a frame of reference? Catch the next one and use it as the lesson."},{"day":101,"date":"11th April","pearl":"Keep a teaching journal. Write what worked, what didn't, and one thing to try next time. Five sentences per lesson is plenty.","exposition":"Five sentences after each lesson — what worked, what didn't, one thing to try — adds up to a record that transforms you over years. The act of writing crystallises observations that would otherwise dissipate. Three-year-old entries are humbling and educational. The journal does not need to be elegant; it needs to be honest.","reflection":"Open your teaching journal. When was the last entry? If it has gone fallow, write five sentences about today before you leave the building."},{"day":102,"date":"12th April","pearl":"Whole-class feedback often beats individual marking. One sheet for thirty students, addressing the common errors.","exposition":"Whole-class feedback — one sheet summarising the cohort's common errors and exemplary moves — addresses the same misconceptions thirty times more efficiently than thirty individual comments. It also models for students how to interpret feedback at a systemic level. Reserve individual comments for the specific and irreducible.","reflection":"After your next set of marking, write one whole-class feedback sheet. Notice how much faster — and clearer — it is than thirty individual comments."},{"day":103,"date":"13th April","pearl":"Test the basics, often. \"Can they convert units?\" doesn't go away after Year 7.","exposition":"A Year 12 student who cannot convert millimetres to metres is a Year 12 student who will not solve problems. The basic skills do not consolidate themselves; they need maintenance. Quick unit conversion drills, scientific notation refreshers, basic equation rearrangement — sprinkle these through every term, every year.","reflection":"Pick one Year 7 skill (unit conversion, scientific notation, equation rearrangement). Where in your Year 12 work would it bite if absent? Test it this week."},{"day":104,"date":"14th April","pearl":"Watch for the quiet student who never gets it wrong. They may need more, not less.","exposition":"A student who is always right is either being under-challenged or hiding from harder work. Both deserve a response. Push the level up; offer the harder extension. Some 'easy' students are quietly capable of much more, and never asked. Spot them; offer them the next level.","reflection":"Identify the student in your class who is always right. Have you offered them anything harder this term? If not, find one extension and try it tomorrow."},{"day":105,"date":"15th April","pearl":"Hair tied back, sleeves up, ties tucked. Make this the habit before any flame or rotating apparatus.","exposition":"Long hair finds rotating shafts. Loose sleeves find Bunsen flames. Ties slip into beakers. Build the habit before the moment: at the start of the lesson, the routine pre-flight check. 'Hair, sleeves, ties' becomes shorthand the class internalises. Repeating it daily means you never have to ask, which means it always gets done.","reflection":"Before your next flame practical, name the routine: hair, sleeves, ties. Brief it before lighting. Practise saying it the same way every time."},{"day":106,"date":"16th April","pearl":"Springs and elastic bands store energy. Eye protection. Always.","exposition":"A spring under tension can leave a hand at high speed; an elastic band loosed catches eyes. The energy stored is small compared to a flame, but the geometry of release — concentrated, directed, sudden — makes it dangerous. Eye protection on both sides of the bench is the rule, every time, no exceptions worth their cost.","reflection":"In your next spring or elastic-band practical, are goggles on for the teacher too? Model what you tolerate."},{"day":107,"date":"17th April","pearl":"The nearest fire extinguisher and its type: know where it is, every classroom, every time.","exposition":"A CO₂ extinguisher for electrical fires, dry powder for liquids, water for solids. Knowing the type and location takes thirty seconds and may save a lab. Build it into the start-of-term routine; check yearly that the extinguisher has not migrated. Students will see you check, which is its own message.","reflection":"Walk to your nearest fire extinguisher. What type is it, and what would it suppress? If you guessed, find out for certain today."},{"day":108,"date":"18th April","pearl":"Know your worth. If a school doesn't value you, another one will.","exposition":"Teachers absorb the message that they are lucky to have any job. That message lies. A school that overworks, underpays, or undervalues you can be left. Other schools want excellent physics teachers; the market is real. Knowing your worth is not arrogance; it is professional ground.","reflection":"If your school stopped valuing you tomorrow, where would you go? Knowing the answer is not disloyalty; it is professional ground."},{"day":109,"date":"19th April","pearl":"If you can't summarise the lesson's key idea in one sentence, neither can the students.","exposition":"If the one-sentence summary eludes you in planning, it will elude the students by Friday. Drafting it is a discipline; the friction of compression often reveals that the lesson lacks a centre. Once you have it, post it. Refer back to it. End by checking whether the students have it. The constraint clarifies everything.","reflection":"Write tomorrow's lesson in one sentence: 'students will leave knowing that...'. If you cannot, the lesson is not yet planned."},{"day":110,"date":"20th April","pearl":"Video analysis (Tracker is free and excellent) opens up motion experiments that would be impossible otherwise.","exposition":"Tracker — open-source, well documented — lets students extract real velocity and acceleration data from videos of falling objects, swinging pendulums, or rolling balls. Suddenly the kinematics is not abstract; it is theirs. Build one or two video-analysis lessons into the scheme of work; the skills transfer to every later practical.","reflection":"Download Tracker. Spend twenty minutes analysing a video of a falling ball. Decide which existing practical would gain from the technique."},{"day":111,"date":"21st April","pearl":"Capacitors above 10 µF at high voltage: discharge before storage, label the discharge tool, and leave shorted.","exposition":"A charged capacitor at high voltage is a real shock waiting to happen. Discharge with a designated tool (a resistor between the terminals), label the tool, leave the capacitor shorted in storage. The protocol is simple; the failure mode without it is not. Make this part of the prep routine.","reflection":"Walk to the capacitor store. Are high-voltage units discharged and shorted? If not, that is this week's safety job."},{"day":112,"date":"22nd April","pearl":"The 'who can do physics' message is in the room before you speak. Posters, examples, anecdotes, expectations.","exposition":"The classroom delivers messages before you speak. Are there pictures of women and people of colour doing physics? Are the example problems set in a range of contexts? Do the posters celebrate breadth, not just Einstein? Students read these signals and conclude — correctly — whether physics has been imagined to include them. Curate carefully.","reflection":"Stand at the back of your lab and look around. What does the room say about who belongs in physics? Whose face is missing from the walls?"},{"day":113,"date":"23rd April","pearl":"If the room goes quiet, don't fill it. Silence is thinking.","exposition":"After a question, the temptation to fill silence is overwhelming. Resist. Five seconds, ten seconds, sometimes longer. Students who would never volunteer reach the surface of thought in the silence. The teacher who fills the silence performs the thinking the students should be doing. Hold your nerve; the silence is productive.","reflection":"After your next question to the class, count silently to ten before saying anything more. Notice what comes up in those seconds."},{"day":114,"date":"24th April","pearl":"Replace \"the formula\" with \"a relationship between these quantities\" in your everyday language.","exposition":"'The formula for F=ma' makes physics feel like a list to memorise. 'Force equals mass times acceleration — the heavier the object, the more push to accelerate it the same amount' makes physics a description of reality. Replace 'formula' with 'relationship' or 'equation' in your everyday speech; students begin to think of physics as descriptive rather than incantatory.","reflection":"Listen to yourself during tomorrow's lesson. How often do you say 'the formula'? Try replacing it with 'the relationship' and see whether the language sticks."},{"day":115,"date":"25th April","pearl":"Practical assessment should reward decisions, not just dexterity.","exposition":"Practical assessment that rewards 'did they follow the steps?' produces students who can follow steps. Practical assessment that rewards 'why did they choose that range? Why those repeats? Why that graph?' produces students who can think. Decisions are visible in choices and justifications. Grade the choices.","reflection":"Look at your most recent practical assessment. Did it reward decisions made, or only steps followed? Rewrite one task to make decisions visible."},{"day":116,"date":"26th April","pearl":"If the demo fails publicly, treat it as physics. \"Why didn't it work?\" is a better lesson than the demo itself.","exposition":"When the demo fails publicly — the Van de Graaff sweats out, the bell jar leaks — the temptation is to apologise and move on. Better: turn it into the lesson. 'Why didn't it work? What conditions were wrong?' Students see real diagnostic reasoning. They also see that physics is a process, not a magic show.","reflection":"What will you do if tomorrow's demo fails publicly? If your answer is 'move on quickly', plan instead to make the failure into the lesson."},{"day":117,"date":"27th April","pearl":"A graph with no axis labels is not a graph. Hold the line.","exposition":"Axis labels with quantity and unit are the entry-level professional minimum: 'voltage / V', not 'voltage'. Hold the line every time, even on rough sketches. Students who pass the habit through their schooling carry it into every later quantitative discipline; those who do not are forever explaining their graphs.","reflection":"Open the last graph drawn in students' books. Are quantity and unit on every axis? If not, you have your re-teach."},{"day":118,"date":"28th April","pearl":"Logarithms and exponentials underlie half-life, capacitor discharge, radioactive decay, sound levels. They earn their place.","exposition":"Logarithms and exponentials show up everywhere physical: half-life, capacitor discharge, sound intensity (decibels), the Stefan-Boltzmann law, the Planck distribution. Students who shy away from logs are students who shy away from the mathematical heart of much of physics. Teach the manipulations early and often.","reflection":"When did your students last meet logarithms in physics, rather than maths? If you cannot recall, schedule a half-life or decibel lesson."},{"day":119,"date":"29th April","pearl":"A 'spares' shelf for the dozen things you reach for every week — sticky labels, dry markers, batteries, blank graph paper.","exposition":"A small shelf with twenty common items — labels, dry markers, AA batteries, blank graph paper, a few stopwatches, a stack of mini-whiteboards — eliminates a hundred small lesson interruptions a year. Build it once; restock once a term. The technician may even maintain it for you if you negotiate kindly.","reflection":"Build a 'spares' shelf in your lab — sticky labels, dry markers, batteries, blank graph paper, mini-whiteboards. Restock at the start of every term."},{"day":120,"date":"30th April","pearl":"If a student gets the right answer for the wrong reason, that is still a problem to fix.","exposition":"A right answer for the wrong reason will fail at the next problem. Worse, the student thinks they understand. Probe: 'how did you get there?' If the reasoning is broken, the answer is a coincidence. Diagnose and correct the reasoning while the right answer is still pleasant; otherwise the inevitable later failure will be a mystery to both of you.","reflection":"After the next class question, ask the student who got it right how they got there. If you cannot follow the reasoning, the right answer is provisional."},{"day":121,"date":"1st May","pearl":"Verbal feedback during the lesson is the most effective feedback. Document it lightly, deliver it heavily.","exposition":"A handwritten comment in a book is a delayed echo. A verbal comment as the student works — 'good, now justify that step' — closes the loop in real time. Document lightly afterwards (initial in the margin, two-word note) so the conversation is not lost. The bulk of the teaching happens in the conversation, not the writing.","reflection":"Track yourself in tomorrow's lesson: how many verbal feedback moments did you have? How many made it into a written note? Aim for many of the first, few of the second."},{"day":122,"date":"2nd May","pearl":"Get a student to do the demo when safe. Their hand on the apparatus is worth ten of yours.","exposition":"A student conducting the demo learns more in those ninety seconds than from watching ten such demos. The hand on the apparatus, the sound of it working, the small adjustment they made — these are theirs forever. Plan demos so a student can run them safely. Make it routine, not exceptional.","reflection":"In your next demo, plan which student safely holds which piece of apparatus. Their hand on the kit is worth ten of yours."},{"day":123,"date":"3
