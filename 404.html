---
layout: bare
title: "Page not found"
permalink: /404.html
---

<style>
  .lost-wrap {
    min-height: calc(100vh - 10rem);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
  }
  .lost-depth {
    font-family: 'Playfair Display', serif;
    font-size: clamp(6rem, 20vw, 12rem);
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px var(--reef);
    opacity: 0.15;
    margin-bottom: -2rem;
    user-select: none;
  }
  .lost-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--ocean);
    margin-bottom: 1rem;
  }
  .lost-title em { font-style: italic; color: var(--coral); }
  .lost-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 2.5rem;
    max-width: 400px;
    line-height: 1.7;
  }
  .lost-links {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lost-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.7rem 1.4rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
  }
  .lost-btn-primary { background: var(--ocean); color: #fff; }
  .lost-btn-primary:hover { background: var(--reef); color: #fff; }
  .lost-btn-outline { border: 1.5px solid var(--ocean); color: var(--ocean); }
  .lost-btn-outline:hover { background: var(--ocean); color: #fff; }

  /* Animated bubbles */
  .bubbles {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 100vh;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }
  .bubble {
    position: absolute;
    bottom: -60px;
    border-radius: 50%;
    background: rgba(26,107,114,0.08);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }
</style>

<div class="bubbles" aria-hidden="true">
  <div class="bubble" style="left:10%;width:40px;height:40px;animation-duration:8s;animation-delay:0s;"></div>
  <div class="bubble" style="left:25%;width:20px;height:20px;animation-duration:11s;animation-delay:2s;"></div>
  <div class="bubble" style="left:40%;width:60px;height:60px;animation-duration:9s;animation-delay:1s;"></div>
  <div class="bubble" style="left:55%;width:15px;height:15px;animation-duration:13s;animation-delay:4s;"></div>
  <div class="bubble" style="left:70%;width:35px;height:35px;animation-duration:10s;animation-delay:0.5s;"></div>
  <div class="bubble" style="left:85%;width:25px;height:25px;animation-duration:7s;animation-delay:3s;"></div>
  <div class="bubble" style="left:5%;width:18px;height:18px;animation-duration:12s;animation-delay:5s;"></div>
  <div class="bubble" style="left:60%;width:50px;height:50px;animation-duration:14s;animation-delay:1.5s;"></div>
</div>

<div class="lost-wrap">
  <div class="lost-depth">404</div>
  <h1 class="lost-title">You've gone <em>too deep</em></h1>
  <p class="lost-sub">This page doesn't exist — or it surfaced too fast and got lost on the way up. Check the address or head back to the surface.</p>
  <div class="lost-links">
    <a href="{{ '/' | relative_url }}" class="lost-btn lost-btn-primary">← Back to surface</a>
    <a href="{{ '/#resources-section' | relative_url }}" class="lost-btn lost-btn-outline">Browse resources</a>
  </div>
</div>
