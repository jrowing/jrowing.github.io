name: Fetch Latest Dive

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-dive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch from divelogs.de
        run: |
          python3 - << 'EOF'
          import urllib.request, json, re, datetime, sys

          url = "http://en.divelogs.de/ifr_tglist.php?u=jrowing"
          req = urllib.request.Request(url, headers={
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"
          })

          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  html = r.read().decode("utf-8", errors="ignore")
          except Exception as e:
              print(f"Fetch failed: {e}", file=sys.stderr)
              sys.exit(0)

          # Total dives
          total = None
          m = re.search(r'(\d+)\s+Dives?\s+by', html, re.I)
          if m:
              total = int(m.group(1))

          # First row = latest dive
          row = re.search(r"<tr class='td'>(.*?)</tr>", html, re.S)
          dive = {
              "profile_url": "https://en.divelogs.de/jrowing",
              "fetched": datetime.datetime.utcnow().strftime("%Y-%m-%d"),
              "total_dives": total
          }

          if row:
              cells = re.findall(r"<td[^>]*>(.*?)</td>", row.group(1), re.S)

              def strip(s):
                  return re.sub(r'<[^>]+>', ' ', s).strip().replace('&nbsp;', '').strip()

              if len(cells) >= 5:
                  dive["number"] = strip(cells[0])

                  when = strip(cells[1])
                  dive["date_raw"] = when
                  dm = re.search(r'(\d{2})\.(\d{2})\.(\d{4})', when)
                  if dm:
                      dive["date"] = f"{dm.group(3)}-{dm.group(2)}-{dm.group(1)}"
                      dive["time"] = when.split(',')[1].strip() if ',' in when else None

                  loc_parts = [p.strip() for p in re.split(r'<br\s*/?>', cells[2], flags=re.I)]
                  loc_parts = [re.sub(r'<[^>]+>', '', p).replace('\xa0','').strip() for p in loc_parts if p.strip()]
                  if loc_parts:
                      dive["location"] = loc_parts[0]
                  if len(loc_parts) > 1:
                      dive["divesite"] = loc_parts[1]

                  dive["max_depth"] = strip(cells[3])
                  dive["duration"]  = strip(cells[4])

              # Extract profile polyline points from col6 SVG
              if len(cells) >= 6:
                  poly = re.search(r'<polyline[^>]*points=["\']([^"\']+)["\']', cells[5], re.I)
                  if poly:
                      dive["profile_points"] = poly.group(1).strip()
                  # Also grab original SVG viewbox dimensions
                  svg_dim = re.search(r'<svg[^>]*height=["\'](\d+)["\'][^>]*width=["\'](\d+)["\']', cells[5], re.I)
                  if not svg_dim:
                      svg_dim = re.search(r'<svg[^>]*width=["\'](\d+)["\'][^>]*height=["\'](\d+)["\']', cells[5], re.I)
                  if svg_dim:
                      dive["profile_h"] = int(svg_dim.group(1))
                      dive["profile_w"] = int(svg_dim.group(2))

          with open("_data/latest_dive.json", "w") as f:
              json.dump(dive, f, indent=2)

          print("Saved:", json.dumps(dive, indent=2))
          EOF

      - name: Commit updated dive data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/latest_dive.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update latest dive data [skip ci]"
          git push
