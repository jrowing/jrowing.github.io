---
layout: default
---

<div class="tufte-wrap">
  <div class="tufte-main">
    <a href="{{ '/blog/' | relative_url }}" class="t-back">← blog</a>

    <div class="post-header">
      <div class="post-tags-line">
        {% for tag in page.tags %}
          <span class="post-tag-h">{{ tag }}</span>
        {% endfor %}
      </div>
      <h1 class="page-title">{{ page.title }}</h1>
      <div class="post-meta-line">{{ page.date | date: "%-d %B %Y" }}</div>
      <div class="t-rule"></div>
    </div>

    <div class="t-body">
      {{ content }}
    </div>
  </div>

  <div class="tufte-margin" style="padding-top: 5rem;">
    {% if page.tags.size > 0 %}
    <div class="t-sidenote">
      <div class="t-sidenote-label">Tags</div>
      <div class="t-sidenote-tags">
        {% for tag in page.tags %}
          <span class="t-stag">{{ tag }}</span>
        {% endfor %}
      </div>
    </div>
    {% endif %}

    <div class="t-sidenote">
      <div class="t-sidenote-label">More writing</div>
      <div class="t-sidenote-body">
        <a href="{{ '/blog/' | relative_url }}" style="color:var(--teal);text-decoration:none;">← all posts</a>
      </div>
    </div>
  </div>
</div>
