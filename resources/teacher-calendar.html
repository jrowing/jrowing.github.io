      (_, label, href) => `<a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`);
    return s;
  };

  while (i < lines.length) {
    const line = lines[i];

    // Skip blank lines
    if (/^\s*$/.test(line)) { i++; continue; }

    // Fenced code block ```
    const fenceMatch = line.match(/^```(\w*)\s*$/);
    if (fenceMatch) {
      i++;
      const codeLines = [];
      while (i < lines.length && !/^```\s*$/.test(lines[i])) {
        codeLines.push(lines[i]);
        i++;
      }
      if (i < lines.length) i++; // consume closing fence
      html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
      continue;
    }

    // Heading
    const headMatch = line.match(/^(#{1,6})\s+(.+?)\s*#*\s*$/);
    if (headMatch) {
      const level = Math.min(headMatch[1].length + 2, 6); // demote so md h1 → h3 in cards
      html.push(`<h${level}>${inlineFormat(escapeHtml(headMatch[2]))}</h${level}>`);
      i++;
      continue;
    }

    // Horizontal rule
    if (/^\s*(-\s*-\s*-+|\*\s*\*\s*\*+|_\s*_\s*_+)\s*$/.test(line)) {
      html.push('<hr>');
      i++;
      continue;
    }

    // Blockquote
    if (/^\s*>/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) {
        buf.push(lines[i].replace(/^\s*>\s?/, ''));
        i++;
      }
      html.push(`<blockquote>${inlineFormat(escapeHtml(buf.join(' ')))}</blockquote>`);
      continue;
    }

    // Unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        const m = lines[i].match(/^\s*[-*+]\s+(.*)$/);
        // Strip task-list checkbox if present
        const text = m[1].replace(/^\[\s*[ xX]?\s*\]\s*/, '');
        items.push(`<li>${inlineFormat(escapeHtml(text))}</li>`);
        i++;
      }
      html.push(`<ul>${items.join('')}</ul>`);
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        const m = lines[i].match(/^\s*\d+\.\s+(.*)$/);
        items.push(`<li>${inlineFormat(escapeHtml(m[1]))}</li>`);
        i++;
      }
      html.push(`<ol>${items.join('')}</ol>`);
      continue;
    }

    // Paragraph: collect consecutive non-blank, non-block lines
    const paraLines = [];
    while (i < lines.length && !/^\s*$/.test(lines[i])
        && !/^```/.test(lines[i])
        && !/^#{1,6}\s/.test(lines[i])
        && !/^\s*>/.test(lines[i])
        && !/^\s*[-*+]\s/.test(lines[i])
        && !/^\s*\d+\.\s/.test(lines[i])
        && !/^\s*(-\s*-\s*-+|\*\s*\*\s*\*+|_\s*_\s*_+)\s*$/.test(lines[i])) {
      paraLines.push(lines[i]);
      i++;
    }
    if (paraLines.length) {
      html.push(`<p>${inlineFormat(escapeHtml(paraLines.join(' ')))}</p>`);
    }
  }
  return html.join('');
}

// Deterministic tag color: hash the (lowercased) tag to a hue, derive HSL bg/fg.
// Same tag → same color every time, across sessions and devices.
// 24 evenly-spaced hues, plus small per-bucket lightness/saturation tweaks to
// compensate for HSL's perceptual non-uniformity (yellows/greens look brighter
// than blues/purples at the same lightness).
const TAG_PALETTE = [
  // [hue, lightnessBoost, satBoost]  applied additively to base values
  [0,   0,  0], [15,  0, -2], [30, -3, -3], [45, -5, -5], [60, -8, -8], [75, -5, -5],
  [90, -3, -3], [110,-2, -2], [130, 0,  0], [150, 0,  0], [170, 0,  2], [190, 0,  4],
  [210, 2,  4], [225, 3,  4], [275, 4,  4], [290, 4,  3], [305, 3,  2], [320, 2,  0],
  [335, 0,  0], [350, 0,  0], [200, 1,  3], [240, 4,  3], [120,-1, -1], [160, 0,  0]
];

function tagColors(tag) {
  const s = String(tag).toLowerCase();
  // FNV-1a primary hash...
  let h1 = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) {
    h1 ^= s.charCodeAt(i);
    h1 = Math.imul(h1, 0x01000193) >>> 0;
  }
  // ...DJB2 in reverse for a decorrelated secondary hash.
  let h2 = 5381;
  for (let i = s.length - 1; i >= 0; i--) {
    h2 = ((h2 << 5) + h2 + s.charCodeAt(i)) >>> 0;
  }
  // Splitmix-style finalizer scrambles bits so adjacent inputs map to far-apart palette slots.
  let mixed = (h1 ^ Math.imul(h2, 0x9e3779b1)) >>> 0;
  mixed = Math.imul(mixed ^ (mixed >>> 16), 0x85ebca6b) >>> 0;
  mixed = Math.imul(mixed ^ (mixed >>> 13), 0xc2b2ae35) >>> 0;
  mixed = (mixed ^ (mixed >>> 16)) >>> 0;

  const slot = TAG_PALETTE[mixed % TAG_PALETTE.length];
  const [baseHue, lBoost, sBoost] = slot;

  // Per-tag jitter using secondary hash bits — keeps colors distinguishable
  // even when two tags happen to land on the same palette slot.
  const hueShift = ((h2 >>> 4) % 11) - 5;     // ±5 degrees
  const satJitter = ((h2 >>> 12) % 9) - 4;    // ±4
  const lightJitter = ((h2 >>> 20) % 7) - 3;  // ±3
  const hue = (baseHue + hueShift + 360) % 360;

  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (isDark) {
    const bgSat = Math.max(20, 38 + sBoost + satJitter);
    const bgLight = Math.max(15, 24 + lBoost + lightJitter);
    const fgSat = Math.max(50, 70 + sBoost + satJitter);
    const fgLight = Math.min(90, 78 + lBoost + lightJitter);
    const bdSat = Math.max(20, 32 + sBoost + satJitter);
    const bdLight = Math.max(20, 34 + lBoost + lightJitter);
    return {
      bg: `hsl(${hue}, ${bgSat}%, ${bgLight}%)`,
      fg: `hsl(${hue}, ${fgSat}%, ${fgLight}%)`,
      border: `hsl(${hue}, ${bdSat}%, ${bdLight}%)`,
    };
  }
  const bgSat = Math.max(40, 72 + sBoost + satJitter);
  const bgLight = Math.min(96, 91 + lBoost + lightJitter);
  const fgSat = Math.max(35, 60 + sBoost + satJitter);
  const fgLight = Math.max(20, 30 + lBoost + lightJitter);
  const bdSat = Math.max(30, 52 + sBoost + satJitter);
  const bdLight = Math.min(90, 78 + lBoost + lightJitter);
  return {
    bg: `hsl(${hue}, ${bgSat}%, ${bgLight}%)`,
    fg: `hsl(${hue}, ${fgSat}%, ${fgLight}%)`,
    border: `hsl(${hue}, ${bdSat}%, ${bdLight}%)`,
  };
}

function tagStyleAttr(tag, { active = false } = {}) {
  if (active) {
    // Active filter state — use accent for visual hierarchy regardless of tag
    return 'background: var(--accent); color: white; border-color: var(--accent);';
  }
  const { bg, fg, border } = tagColors(tag);
  return `background: ${bg}; color: ${fg}; border: 1px solid ${border};`;
}

function wireMain() {
  document.getElementById('refresh')?.addEventListener('click', refreshNow);
  document.getElementById('reload-input')?.addEventListener('change', e => {
    handleFileInput(e.target.files);
    e.target.value = '';
  });
  document.getElementById('change-folder')?.addEventListener('click', pickFolder);
  document.getElementById('disconnect')?.addEventListener('click', disconnectFolder);
  document.getElementById('new-entry')?.addEventListener('click', () => openNewEntryModal(state.selectedDate));
  document.getElementById('new-entry-here')?.addEventListener('click', () => openNewEntryModal(state.selectedDate));

  // View toggle
  document.getElementById('view-calendar')?.addEventListener('click', () => {
    state.view = 'calendar';
    render();
  });
  document.getElementById('view-week')?.addEventListener('click', () => {
    state.view = 'week';
    if (!state.summaryWeekStart) {
      state.summaryWeekStart = startOfWeek(state.selectedDate, 1);
    }
    render();
  });
  document.getElementById('view-timeline')?.addEventListener('click', () => {
    state.view = 'timeline';
    render();
  });

  // Week view navigation
  document.getElementById('week-prev')?.addEventListener('click', () => {
    const cur = state.summaryWeekStart || startOfWeek(state.selectedDate, 1);
    const prev = new Date(cur);
    prev.setDate(prev.getDate() - 7);
    state.summaryWeekStart = prev;
    render();
  });
  document.getElementById('week-next')?.addEventListener('click', () => {
    const cur = state.summaryWeekStart || startOfWeek(state.selectedDate, 1);
    const nxt = new Date(cur);
    nxt.setDate(nxt.getDate() + 7);
    state.summaryWeekStart = nxt;
    render();
  });
  document.getElementById('week-this')?.addEventListener('click', () => {
    state.summaryWeekStart = startOfWeek(new Date(), 1);
    state.selectedDate = startOfDay(new Date());
    render();
  });
  // Click a day-column header to select that day
  document.querySelectorAll('.week-day-headers .day-col[data-week-day-index]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.weekDayIndex, 10);
      const weekStart = startOfWeek(state.summaryWeekStart || state.selectedDate, 1);
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      state.selectedDate = startOfDay(d);
      render();
    });
  });
  // Click an event in the week view to open edit modal
  document.querySelectorAll('.week-event[data-entry-id], .week-allday-event[data-entry-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.getAttribute('data-entry-id');
      const entry = state.entries.find(x => x.id === id);
      if (entry) openEditEntryModal(entry);
    });
  });
  // Double-click an empty day column to create a new entry
  document.querySelectorAll('.week-time-grid .day-column[data-date]').forEach(el => {
    el.addEventListener('dblclick', (e) => {
      if (e.target !== el) return; // ignore clicks on event blocks
      if (!state.rootHandle && !state.uploadedFiles) return;
      const d = startOfDay(new Date(el.dataset.date));
      openNewEntryModal(d);
    });
  });

  // Summary panel
  document.getElementById('toggle-summary')?.addEventListener('click', () => {
    state.showSummary = !state.showSummary;
    if (state.showSummary && !state.summaryWeekStart) {
      state.summaryWeekStart = startOfWeek(state.selectedDate, 1);
    }
    render();
  });
  document.getElementById('close-summary')?.addEventListener('click', () => {
    state.showSummary = false;
    render();
  });
  document.getElementById('prev-week')?.addEventListener('click', () => {
    const cur = state.summaryWeekStart || startOfWeek(state.selectedDate, 1);
    const prev = new Date(cur);
    prev.setDate(prev.getDate() - 7);
    state.summaryWeekStart = prev;
    render();
  });
  document.getElementById('next-week')?.addEventListener('click', () => {
    const cur = state.summaryWeekStart || startOfWeek(state.selectedDate, 1);
    const nxt = new Date(cur);
    nxt.setDate(nxt.getDate() + 7);
    state.summaryWeekStart = nxt;
    render();
  });
  document.getElementById('this-week')?.addEventListener('click', () => {
    state.summaryWeekStart = startOfWeek(new Date(), 1);
    render();
  });
  document.getElementById('summary-aggregated')?.addEventListener('click', () => {
    state.summaryMode = 'aggregated';
    render();
  });
  document.getElementById('summary-breakdown')?.addEventListener('click', () => {
    state.summaryMode = 'breakdown';
    render();
  });

  // Tag filter dropdown
  document.getElementById('tag-filter')?.addEventListener('change', (e) => {
    state.filterTag = e.target.value || null;
    render();
  });
  document.getElementById('clear-tag')?.addEventListener('click', () => {
    state.filterTag = null;
    render();
  });

  // Clickable tag pills (in entry cards and timeline)
  document.querySelectorAll('.tag.clickable[data-tag]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation(); // don't trigger the entry-card or timeline-item click
      const tag = el.getAttribute('data-tag');
      state.filterTag = state.filterTag === tag ? null : tag;
      render();
    });
  });

  // Calendar nav (only present in calendar view)
  document.getElementById('prev-month')?.addEventListener('click', () => {
    state.displayedMonth = new Date(state.displayedMonth.getFullYear(), state.displayedMonth.getMonth() - 1, 1);
    render();
  });
  document.getElementById('next-month')?.addEventListener('click', () => {
    state.displayedMonth = new Date(state.displayedMonth.getFullYear(), state.displayedMonth.getMonth() + 1, 1);
    render();
  });
  document.getElementById('today')?.addEventListener('click', () => {
    const t = new Date();
    state.displayedMonth = new Date(t.getFullYear(), t.getMonth(), 1);
    state.selectedDate = startOfDay(t);
    render();
  });
  document.querySelectorAll('.day').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedDate = startOfDay(new Date(el.dataset.date));
      const d = state.selectedDate;
      if (!isSameMonth(d, state.displayedMonth)) {
        state.displayedMonth = new Date(d.getFullYear(), d.getMonth(), 1);
      }
      render();
    });
    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      if (state.rootHandle) {
        const d = startOfDay(new Date(el.dataset.date));
        openNewEntryModal(d);
      }
    });
  });

  // Entry cards (calendar detail pane)
  document.querySelectorAll('.entry-card[data-entry-id]').forEach(el => {
    const open = () => {
      const id = el.getAttribute('data-entry-id');
      const entry = state.entries.find(e => e.id === id);
      if (entry) openEditEntryModal(entry);
    };
    el.addEventListener('click', open);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        open();
      }
    });
  });

  // Timeline items
  document.querySelectorAll('.timeline-item[data-entry-id]').forEach(el => {
    const open = () => {
      const id = el.getAttribute('data-entry-id');
      const entry = state.entries.find(e => e.id === id);
      if (entry) openEditEntryModal(entry);
    };
    el.addEventListener('click', open);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        open();
      }
    });
  });
}

// ---------- New entry modal ----------
async function openNewEntryModal(forDate) {
  let subfolders = [''];
  if (state.rootHandle) {
    try {
      subfolders = await listSubfolders(state.rootHandle);
    } catch (e) {
      console.warn('Could not list subfolders', e);
    }
  } else if (state.uploadedFiles) {
    // Derive subfolders from uploaded file paths
    const set = new Set(['']);
    for (const rec of state.uploadedFiles) {
      const parts = rec.relpath.split('/');
      // skip the root folder name (first part) and the filename (last part)
      for (let i = 1; i < parts.length - 1; i++) {
        set.add(parts.slice(1, i + 1).join('/'));
      }
    }
    subfolders = Array.from(set).sort();
  }

  const isUploadMode = !state.rootHandle && !!state.uploadedFiles;

  const dateStr = `${forDate.getFullYear()}-${pad(forDate.getMonth() + 1)}-${pad(forDate.getDate())}`;
  const now = new Date();
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">New entry</h3>
      </div>
      <div class="modal-body">
        ${isUploadMode ? `
          <div style="background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; color: var(--text-muted); line-height: 1.5;">
            Your browser can't write directly to the folder. The entry will be downloaded as a <code>.md</code> file — drop it into your folder, then click <strong>Reload files</strong> to see it stick.
          </div>
        ` : ''}
        <div class="field">
          <label for="ne-title">Title</label>
          <input id="ne-title" type="text" placeholder="Meeting notes, journal, etc." autocomplete="off">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="ne-date">Date</label>
            <input id="ne-date" type="date" value="${dateStr}">
          </div>
          <div class="field">
            <label for="ne-time">Start time (optional)</label>
            <input id="ne-time" type="time" value="${timeStr}">
          </div>
          <div class="field">
            <label for="ne-end-time">End time (optional)</label>
            <input id="ne-end-time" type="time" value="">
          </div>
        </div>
        <div class="field-hint" id="ne-duration-hint" style="margin-top: -6px;">Set a start time first to enable duration.</div>
        <div class="field">
          <label for="ne-tags">Tags</label>
          <input id="ne-tags" type="text" placeholder="comma-separated, e.g. work, meeting" autocomplete="off">
        </div>
        <div class="field">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal; font-size: 13px; color: var(--text);">
            <input id="ne-repeat" type="checkbox" style="width: auto; margin: 0;">
            Repeat weekly until
          </label>
          <div id="ne-repeat-row" style="display: none; margin-top: 6px;">
            <input id="ne-until" type="date">
            <div class="field-hint" id="ne-occurrence-count" style="margin-top: 4px;">—</div>
          </div>
        </div>
        <div class="field">
          <label for="ne-subfolder">Folder</label>
          <select id="ne-subfolder">
            ${subfolders.map(s => `<option value="${escapeAttr(s)}">${s ? escapeHtml(s) : '(root)'}</option>`).join('')}
          </select>
          <div class="field-hint">${isUploadMode
            ? 'Folder choice is informational only — you decide where to save the download.'
            : 'File saves as <code>yyyy-MM-dd-title-slug.md</code>'}</div>
        </div>
        <div class="field">
          <label for="ne-body">Body (markdown)</label>
          <textarea id="ne-body" placeholder="Write your entry here..."></textarea>
        </div>
        <div class="field">
          <label for="ne-requirements">Requirements (one per line)</label>
          <textarea id="ne-requirements" placeholder="e.g.&#10;projector&#10;handouts&#10;coffee for 8" style="min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;"></textarea>
          <div class="field-hint">Saved as a <code>## Requirements</code> section at the end of the body.</div>
        </div>
        ${renderExtrasSection('ne-extras', [])}
        <p class="modal-error" id="ne-error" style="display: none;"></p>
      </div>
      <div class="modal-footer">
        <button id="ne-cancel">Cancel</button>
        <button class="primary" id="ne-create">${isUploadMode ? 'Download entry' : 'Create entry'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const titleInput = backdrop.querySelector('#ne-title');
  const dateInput = backdrop.querySelector('#ne-date');
  const timeInput = backdrop.querySelector('#ne-time');
  const tagsInput = backdrop.querySelector('#ne-tags');
  const subfolderSelect = backdrop.querySelector('#ne-subfolder');
  const bodyInput = backdrop.querySelector('#ne-body');
  const errorEl = backdrop.querySelector('#ne-error');
  const cancelBtn = backdrop.querySelector('#ne-cancel');
  const createBtn = backdrop.querySelector('#ne-create');
  const repeatCheckbox = backdrop.querySelector('#ne-repeat');
  const repeatRow = backdrop.querySelector('#ne-repeat-row');
  const untilInput = backdrop.querySelector('#ne-until');
  const occurrenceCount = backdrop.querySelector('#ne-occurrence-count');
  const endTimeInput = backdrop.querySelector('#ne-end-time');
  const durationHint = backdrop.querySelector('#ne-duration-hint');
  const extrasContainer = backdrop.querySelector('#ne-extras');
  const requirementsInput = backdrop.querySelector('#ne-requirements');
  wireExtrasSection(backdrop);

  function updateDurationHint() {
    const hasStart = !!timeInput.value;
    const hasEnd = !!endTimeInput.value;
    endTimeInput.disabled = !hasStart;
    if (!hasStart) {
      durationHint.textContent = 'Set a start time first to enable an end time.';
      durationHint.style.color = '';
      return;
    }
    if (!hasEnd) {
      durationHint.textContent = 'Add an end time to record duration.';
      durationHint.style.color = '';
      return;
    }
    durationHint.textContent = formatDurationLabel(timeInput.value, endTimeInput.value);
    durationHint.style.color = '';
  }
  timeInput.addEventListener('input', updateDurationHint);
  endTimeInput.addEventListener('input', updateDurationHint);
  updateDurationHint();

  // Default the "until" date to ~3 months out
  const defaultUntil = new Date(forDate);
  defaultUntil.setMonth(defaultUntil.getMonth() + 3);
  untilInput.value = `${defaultUntil.getFullYear()}-${pad(defaultUntil.getMonth() + 1)}-${pad(defaultUntil.getDate())}`;

  function updateOccurrenceCount() {
    if (!repeatCheckbox.checked || !dateInput.value || !untilInput.value) {
      occurrenceCount.textContent = '—';
      occurrenceCount.style.color = '';
      return;
    }
    const start = new Date(`${dateInput.value}T00:00`);
    const until = new Date(`${untilInput.value}T23:59`);
    if (until < start) {
      occurrenceCount.textContent = 'End date must be on or after the start date';
      occurrenceCount.style.color = '#d24747';
      return;
    }
    const occs = buildOccurrences(start, { kind: 'weekly', until: untilInput.value });
    const weekday = start.toLocaleDateString(undefined, { weekday: 'long' });
    occurrenceCount.textContent = `${occs.length} ${occs.length === 1 ? 'occurrence' : 'occurrences'} — every ${weekday}`;
    occurrenceCount.style.color = '';
  }

  repeatCheckbox.addEventListener('change', () => {
    repeatRow.style.display = repeatCheckbox.checked ? '' : 'none';
    updateButtonLabel();
    updateOccurrenceCount();
  });
  untilInput.addEventListener('input', updateOccurrenceCount);
  dateInput.addEventListener('input', updateOccurrenceCount);

  function updateButtonLabel() {
    const repeating = repeatCheckbox.checked;
    if (isUploadMode) {
      createBtn.textContent = repeating ? 'Download entries' : 'Download entry';
    } else {
      createBtn.textContent = repeating ? 'Create entries' : 'Create entry';
    }
  }

  setTimeout(() => titleInput.focus(), 50);

  function close() {
    backdrop.remove();
    document.removeEventListener('keydown', escHandler);
  }
  function escHandler(e) {
    if (e.key === 'Escape') close();
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submit();
  }
  document.addEventListener('keydown', escHandler);
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) close();
  });
  cancelBtn.addEventListener('click', close);

  async function submit() {
    errorEl.style.display = 'none';
    const title = titleInput.value.trim();
    if (!title) {
      errorEl.textContent = 'Title is required';
      errorEl.style.display = 'block';
      titleInput.focus();
      return;
    }
    if (!dateInput.value) {
      errorEl.textContent = 'Date is required';
      errorEl.style.display = 'block';
      return;
    }

    let recurrence = null;
    if (repeatCheckbox.checked) {
      if (!untilInput.value) {
        errorEl.textContent = 'End date is required for repeating entries';
        errorEl.style.display = 'block';
        untilInput.focus();
        return;
      }
      const start = new Date(`${dateInput.value}T00:00`);
      const until = new Date(`${untilInput.value}T23:59`);
      if (until < start) {
        errorEl.textContent = 'End date must be on or after the start date';
        errorEl.style.display = 'block';
        return;
      }
      recurrence = { kind: 'weekly', until: untilInput.value };

      // Safety check on burst-downloads in upload mode
      if (isUploadMode) {
        const occs = buildOccurrences(start, recurrence);
        if (occs.length > 12) {
          if (!confirm(`This will trigger ${occs.length} downloads. Continue?`)) return;
        }
      }
    }

    const tags = tagsInput.value
      .split(',')
      .map(t => t.trim())
      .filter(Boolean);

    createBtn.disabled = true;
    createBtn.textContent = isUploadMode ? 'Downloading…' : 'Creating…';

    try {
      const result = await createEntry({
        title,
        dateString: dateInput.value,
        timeString: timeInput.value,
        endTimeString: endTimeInput.value,
        tags,
        body: bodyInput.value,
        requirements: parseRequirementsList(requirementsInput.value),
        subfolder: subfolderSelect.value,
        recurrence,
        extraFields: collectExtrasFromContainer(extrasContainer),
      });
      close();
      render();
      if (result.mode === 'downloaded') {
        showToast(result.count > 1
          ? `Downloaded ${result.count} entries — drop them into your folder`
          : `Downloaded ${result.relpath} — drop it into your folder`);
      } else {
        showToast(result.count > 1
          ? `Created ${result.count} entries`
          : `Created ${result.relpath}`);
      }
    } catch (err) {
      console.error(err);
      errorEl.textContent = `Could not create file: ${err.message}`;
      errorEl.style.display = 'block';
      createBtn.disabled = false;
      updateButtonLabel();
    }
  }
  createBtn.addEventListener('click', submit);
}

// ---------- Edit entry modal ----------
async function openEditEntryModal(entry) {
  const isUploadMode = !state.rootHandle && !!state.uploadedFiles;

  const date = entry.date;
  const dateStr = `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
  // Determine if the original had a time component by checking the front-matter date string
  const rawDate = entry.frontMatter.date || entry.frontMatter.created || entry.frontMatter.published || '';
  const hadTime = /\d{1,2}:\d{2}/.test(String(rawDate));
  const timeStr = hadTime ? `${pad(date.getHours())}:${pad(date.getMinutes())}` : '';

  // Pre-fill end time if entry has one
  let endTimeStr = '';
  if (entry.endDate && hadTime) {
    endTimeStr = `${pad(entry.endDate.getHours())}:${pad(entry.endDate.getMinutes())}`;
  }

  const tagsStr = (entry.tags || []).join(', ');

  // Capture extra front-matter fields (anything not in our standard or duration-related set)
  const standardKeys = new Set(['title', 'date', 'tags', 'created', 'published', 'end', 'end_date', 'enddate', 'duration']);
  const extraEntries = Object.entries(entry.frontMatter).filter(([k]) => !standardKeys.has(k.toLowerCase()));

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" role="dialog" aria-labelledby="edit-modal-title">
      <div class="modal-header">
        <h3 id="edit-modal-title">Edit entry</h3>
      </div>
      <div class="modal-body">
        ${isUploadMode ? `
          <div style="background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; color: var(--text-muted); line-height: 1.5;">
            Your browser can't write directly to the folder. Saving will download a replacement <code>.md</code> file with the same name — overwrite the original in your folder, then click <strong>Reload files</strong>.
          </div>
        ` : ''}
        <div class="field">
          <label>File</label>
          <div class="field-hint" style="font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--text-muted); padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); word-break: break-all;">
            ${escapeHtml(entry.relpath)}
          </div>
          <div class="field-hint">Filename stays the same — change the title to update display only, or delete and recreate to rename.</div>
        </div>
        <div class="field">
          <label for="ee-title">Title</label>
          <input id="ee-title" type="text" autocomplete="off" value="${escapeAttr(entry.title)}">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="ee-date">Date</label>
            <input id="ee-date" type="date" value="${dateStr}">
          </div>
          <div class="field">
            <label for="ee-time">Start time (optional)</label>
            <input id="ee-time" type="time" value="${timeStr}">
          </div>
          <div class="field">
            <label for="ee-end-time">End time (optional)</label>
            <input id="ee-end-time" type="time" value="${endTimeStr}">
          </div>
        </div>
        <div class="field-hint" id="ee-duration-hint" style="margin-top: -6px;"></div>
        <div class="field">
          <label for="ee-tags">Tags</label>
          <input id="ee-tags" type="text" placeholder="comma-separated" autocomplete="off" value="${escapeAttr(tagsStr)}">
        </div>
        <div class="field">
          <label for="ee-body">Body (markdown)</label>
          <textarea id="ee-body" style="min-height: 160px;">${escapeHtml(entry.bodyWithoutRequirements ?? entry.body)}</textarea>
        </div>
        <div class="field">
          <label for="ee-requirements">Requirements (one per line)</label>
          <textarea id="ee-requirements" placeholder="e.g.&#10;projector&#10;handouts" style="min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;">${escapeHtml(entry.requirements.join('\n'))}</textarea>
          <div class="field-hint">Saved as a <code>## Requirements</code> section at the end of the body.</div>
        </div>
        ${renderExtrasSection('ee-extras', extraEntries)}
        <p class="modal-error" id="ee-error" style="display: none;"></p>
      </div>
      <div class="modal-footer">
        <button class="danger" id="ee-delete">Delete</button>
        <div style="flex: 1;"></div>
        <button id="ee-cancel">Cancel</button>
        <button class="primary" id="ee-save">${isUploadMode ? 'Download changes' : 'Save changes'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const titleInput = backdrop.querySelector('#ee-title');
  const dateInput = backdrop.querySelector('#ee-date');
  const timeInput = backdrop.querySelector('#ee-time');
  const endTimeInput = backdrop.querySelector('#ee-end-time');
  const durationHint = backdrop.querySelector('#ee-duration-hint');
  const tagsInput = backdrop.querySelector('#ee-tags');
  const bodyInput = backdrop.querySelector('#ee-body');
  const requirementsInput = backdrop.querySelector('#ee-requirements');
  const errorEl = backdrop.querySelector('#ee-error');
  const cancelBtn = backdrop.querySelector('#ee-cancel');
  const saveBtn = backdrop.querySelector('#ee-save');
  const deleteBtn = backdrop.querySelector('#ee-delete');
  const extrasContainer = backdrop.querySelector('#ee-extras');
  wireExtrasSection(backdrop);

  function updateDurationHint() {
    const hasStart = !!timeInput.value;
    const hasEnd = !!endTimeInput.value;
    endTimeInput.disabled = !hasStart;
    if (!hasStart) {
      durationHint.textContent = 'Set a start time first to enable an end time.';
      return;
    }
    if (!hasEnd) {
      durationHint.textContent = 'Add an end time to record duration.';
      return;
    }
    durationHint.textContent = formatDurationLabel(timeInput.value, endTimeInput.value);
  }
  timeInput.addEventListener('input', updateDurationHint);
  endTimeInput.addEventListener('input', updateDurationHint);
  updateDurationHint();

  setTimeout(() => titleInput.focus(), 50);

  function close() {
    backdrop.remove();
    document.removeEventListener('keydown', escHandler);
  }
  function escHandler(e) {
    if (e.key === 'Escape') close();
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submit();
  }
  document.addEventListener('keydown', escHandler);
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) close();
  });
  cancelBtn.addEventListener('click', close);

  async function submit() {
    errorEl.style.display = 'none';
    const title = titleInput.value.trim();
    if (!title) {
      errorEl.textContent = 'Title is required';
      errorEl.style.display = 'block';
      titleInput.focus();
      return;
    }
    if (!dateInput.value) {
      errorEl.textContent = 'Date is required';
      errorEl.style.display = 'block';
      return;
    }

    const tags = tagsInput.value.split(',').map(t => t.trim()).filter(Boolean);
    const extraFields = collectExtrasFromContainer(extrasContainer);

    saveBtn.disabled = true;
    deleteBtn.disabled = true;
    saveBtn.textContent = isUploadMode ? 'Downloading…' : 'Saving…';

    try {
      const result = await updateEntry(entry, {
        title,
        dateString: dateInput.value,
        timeString: timeInput.value,
        endTimeString: endTimeInput.value,
        tags,
        body: bodyInput.value,
        requirements: parseRequirementsList(requirementsInput.value),
        extraFields,
      });
      close();
      render();
      showToast(result.mode === 'downloaded'
        ? `Downloaded ${entry.relpath.split('/').pop()} — overwrite the original`
        : `Saved ${result.relpath}`);
    } catch (err) {
      console.error(err);
      errorEl.textContent = `Could not save: ${err.message}`;
      errorEl.style.display = 'block';
      saveBtn.disabled = false;
      deleteBtn.disabled = false;
      saveBtn.textContent = isUploadMode ? 'Download changes' : 'Save changes';
    }
  }
  saveBtn.addEventListener('click', submit);

  deleteBtn.addEventListener('click', async () => {
    const message = isUploadMode
      ? `Remove "${entry.title}" from the calendar? The original file in your folder won't be deleted — you'll need to remove it manually.`
      : `Permanently delete "${entry.title}"?\n\n${entry.relpath}\n\nThis cannot be undone.`;
    if (!confirm(message)) return;

    saveBtn.disabled = true;
    deleteBtn.disabled = true;
    deleteBtn.textContent = 'Deleting…';
    try {
      await deleteEntry(entry);
      close();
      render();
      showToast(isUploadMode ? 'Removed from calendar' : `Deleted ${entry.relpath}`);
    } catch (err) {
      console.error(err);
      errorEl.textContent = `Could not delete: ${err.message}`;
      errorEl.style.display = 'block';
      saveBtn.disabled = false;
      deleteBtn.disabled = false;
      deleteBtn.textContent = 'Delete';
    }
  });
}

// ---------- Boot ----------
async function boot() {
  render();
  // Try to restore last folder
  try {
    const handle = await loadHandle();
    if (handle) {
      // Don't auto-prompt — show a banner-style refresh button instead
      // We'll attempt silent permission check
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        await loadFromHandle(handle, { firstLoad: true });
        startPolling();
        render();
      } else {
        // User must re-grant. Show a button in the welcome.
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="welcome">
            <div class="welcome-icon">▦</div>
            <h2>Markdown calendar</h2>
            <p>Reconnect to <code>${escapeHtml(handle.name)}</code> to resume live watching.</p>
            <div class="actions">
              <button class="primary" id="reconnect">Reconnect</button>
              <button id="pick-different">Pick different folder</button>
              <button id="forget">Forget</button>
            </div>
          </div>
        `;
        document.getElementById('reconnect').addEventListener('click', async () => {
          if (await verifyPermission(handle, 'readwrite')) {
            await loadFromHandle(handle, { firstLoad: true });
            startPolling();
            render();
          }
        });
        document.getElementById('pick-different').addEventListener('click', pickFolder);
        document.getElementById('forget').addEventListener('click', async () => {
          await clearHandle();
          render();
        });
      }
    }
  } catch (e) {
    console.warn('Could not restore handle', e);
  }
}

window.addEventListener('beforeunload', stopPolling);
// Re-render tag colors when the system color scheme changes
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => render());
}

// ---------- Electron desktop integration ----------
// `window.electronAPI` is exposed by preload.js when running inside the Electron shell.
// In a regular browser it doesn't exist, so all this is a no-op outside the desktop app.
if (window.electronAPI) {
  // Push today's entries to the main process so it can populate the tray menu.
  function syncTodayToTray() {
    const today = startOfDay(new Date());
    const todays = state.entries
      .filter(e => isSameDay(e.date, today))
      .sort(compareEntriesForDay);
    const fmtTime = (d) => d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    const payload = {
      date: `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`,
      entries: todays.map(e => ({
        id: e.id,
        title: e.title,
        time: entryHasTime(e) ? fmtTime(e.date) : '',
        allDay: !entryHasTime(e),
      })),
    };
    window.electronAPI.updateTrayToday(payload);
  }

  // Hook into render() so the tray refreshes whenever entries do.
  // (Simpler than threading IPC through every entry-loading code path.)
  const origRender = window.render || render;
  // We can't reassign `render` if it's a const; instead, watch for entries changes.
  // Easiest: poll the entries-array reference + length once a second. Cheap and simple.
  let lastSig = '';
  setInterval(() => {
    const sig = state.entries.length + ':' + state.fileSignature;
    if (sig !== lastSig) {
      lastSig = sig;
      syncTodayToTray();
    }
  }, 1000);
  // Also sync once at startup after first render
  setTimeout(syncTodayToTray, 500);

  // Tray clicked "Open Markdown Calendar" or chose Go to Today / ⌘T
  window.electronAPI.onNavigateToday(() => {
    const today = new Date();
    state.view = 'calendar';
    state.displayedMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    state.selectedDate = startOfDay(today);
    render();
  });

  // Tray menu item for a specific entry was clicked
  window.electronAPI.onOpenEntry((entryId) => {
    const entry = state.entries.find(e => e.id === entryId);
    if (entry) {
      state.selectedDate = startOfDay(entry.date);
      state.displayedMonth = new Date(entry.date.getFullYear(), entry.date.getMonth(), 1);
      render();
      // Defer modal open until after render has settled
      setTimeout(() => openEditEntryModal(entry), 50);
    }
  });
}

boot();
</script>
